// -----------------------------------------------------
// LIVE ACTUALS ENGINE
// Maps budget categories to real data from other tabs.
// Returns: { actual: number|null, label: string, source: string }
// actual=null means no live data yet → use budgeted as placeholder
// -----------------------------------------------------
function resolveActual(cat, t) {
  const name = (cat.name || '').toLowerCase();

  // -- FOOD: always driven by calcTripFoodCost --
  if (name.includes('food') || name.includes('meal') || name.includes('dining')) {
    const live = calcTripFoodCost(t);
    const hasActuals = (t.parks||[]).some(d =>
      ['breakfast','lunch','dinner','snacks'].some(m => {
        const mc = (d.meals||{})[m];
        return mc && mc.cost !== null && mc.cost !== undefined;
      })
    );
    const allDefaults = !hasActuals;
    return {
      actual: live,
      label: allDefaults ? 'Est. from meal defaults' : 'Live from Itinerary',
      source: 'itinerary',
      isLive: !allDefaults,
      breakdown: buildFoodBreakdown(t),
    };
  }

  // -- HOTEL: sum all hotel leg totalCosts --
  if (name.includes('hotel') || name.includes('resort') || name.includes('lodging')) {
    const legs = (t.hotelLegs || []);
    const withCost = legs.filter(l => l.totalCost !== null && l.totalCost !== undefined && l.totalCost !== '');
    if (withCost.length > 0) {
      const total = withCost.reduce((s,l) => s + (parseFloat(l.totalCost)||0), 0);
      const names = withCost.map(l => l.name || 'Hotel').join(', ');
      return {
        actual: total,
        label: names,
        source: 'hotel',
        isLive: true,
        breakdown: withCost.map(l => `${l.name||'Hotel'}: ${curSym(t)}${(parseFloat(l.totalCost)||0).toLocaleString()}`).join(' · '),
      };
    }
    // Has hotel name but no cost yet
    if (legs.length > 0 && legs[0].name) {
      return { actual: null, label: legs.map(l=>l.name||'Hotel').join(', '), source:'hotel', isLive:false, breakdown:'' };
    }
    return { actual: null, label: '', source:'hotel', isLive:false, breakdown:'' };
  }

  // -- FLIGHTS / OUTBOUND / RETURN --
  if (name.includes('flight') || name.includes('air') || name.includes('outbound') || name.includes('return flight')) {
    return resolveFlightActual(t, 'both');
  }

  // -- LEG 1 TRANSPORTATION (ground: home→airport or airport→resort) --
  if (name.includes('transportation 1') || (name.includes('transport') && !name.includes('transportation 2') && !name.includes('leg 2'))) {
    return resolveTransportActual(t, 'outbound');
  }

  // -- LEG 2 TRANSPORTATION --
  if (name.includes('transportation 2') || name.includes('leg 2')) {
    return resolveTransportActual(t, 'return');
  }

  // -- LIGHTNING LANE / PREMIER ACCESS --
  if (cat.liveSource === 'll' || cat.liveSource === 'pa' || name.includes('lightning') || name.includes(' ll') || name.startsWith('ll ') ||
      name.includes('genie') || name.includes('individual ll') || name.includes('ill') || name.includes('premier')) {
    const totalLL = (t.parks||[]).reduce((s,d) => s + calcDayLLCost(d,t), 0);
    if (totalLL > 0) {
      const days = (t.parks||[]).filter(d=>calcDayLLCost(d,t)>0);
      const breakdown = days.map(d=>{
        const dt = new Date(d.date+'T00:00:00');
        const label = dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        return label+': '+curSym(t)+calcDayLLCost(d,t);
      }).join(' · ');
      return { actual: totalLL, label: 'Live from Itinerary', source: 'itinerary', isLive: true, breakdown };
    }
    return { actual: null, label: t.tripType==='dlp' ? 'No Premier Access selections yet' : 'No LL selections yet', source: 'itinerary', isLive: false, breakdown: '' };
  }

  return { actual: null, label: '', source: 'manual', isLive: false, breakdown: '' };
}

function resolveFlightActual(t, dir) {
  const tr = t.transportation || {};
  const legs = [
    ...((tr.outbound||{}).legs||[]),
    ...((tr.return||{}).legs||[]),
  ].filter(l => l.cost !== null && l.cost !== undefined && l.cost !== '');
  if (legs.length === 0) {
    // No costs — but show airline/flight info if available
    const ob = ((tr.outbound||{}).legs||[])[0] || {};
    const ret = ((tr.return||{}).legs||[])[0] || {};
    const parts = [];
    if (ob.airline) parts.push(ob.airline + (ob.flightNum ? ' ' + ob.flightNum : ''));
    if (ret.airline && ret.airline !== ob.airline) parts.push(ret.airline + (ret.flightNum ? ' ' + ret.flightNum : ''));
    return { actual: null, label: parts.join(' · '), source: 'flights', isLive: false, breakdown: '' };
  }
  const total = legs.reduce((s,l) => s + (parseFloat(l.cost)||0), 0);
  const labels = legs.map(l => `${l.airline||''} ${l.flightNum||''}: ${curSym(t)}${(parseFloat(l.cost)||0).toLocaleString()}`.trim()).join(' · ');
  return { actual: total, label: labels, source: 'flights', isLive: true, breakdown: labels };
}

function resolveTransportActual(t, dir) {
  const tr = t.transportation || {};
  // Check the ground sections
  const groundKey = dir === 'outbound' ? 'ground' : 'groundReturn';
  const flightDir = dir === 'outbound' ? 'outbound' : 'return';
  const ground = tr[groundKey] || {};
  const flightLegs = ((tr[flightDir]||{}).legs||[]);
  const firstLeg = flightLegs[0] || {};

  // Build a descriptive label from what's filled in
  const parts = [];
  if (ground.option && ground.option !== 'Uber / Lyft') parts.push(ground.option);
  if (ground.rentalCompany) parts.push(ground.rentalCompany);
  if (ground.notes) parts.push(ground.notes.split('/')[0].trim()); // first part of notes
  if (firstLeg.airline) parts.push(firstLeg.airline + (firstLeg.flightNum ? ' ' + firstLeg.flightNum : ''));

  // Cost: check ground cost field or flight leg cost
  const groundCost = ground.cost !== null && ground.cost !== undefined && ground.cost !== '' ? parseFloat(ground.cost)||0 : null;
  const flightCost = flightLegs.filter(l => l.cost).reduce((s,l) => s+(parseFloat(l.cost)||0), 0);

  if (groundCost !== null || flightCost > 0) {
    const total = (groundCost||0) + flightCost;
    return { actual: total, label: parts.join(' · ') || (dir==='outbound'?'Outbound':'Return'), source:'transport', isLive:true, breakdown:`${curSym(t)}${total.toLocaleString()}` };
  }

  return { actual: null, label: parts.join(' · '), source:'transport', isLive:false, breakdown:'' };
}

function buildFoodBreakdown(t) {
  const md = t.mealDefaults || blankMealDefaults();
  const days = (t.parks||[]).filter(d => d.park !== 'rest');
  let bk=0, lu=0, di=0, sn=0;
  days.forEach(d => {
    const m = d.meals || {};
    bk += (m.breakfast?.cost ?? md.breakfast);
    lu += (m.lunch?.cost    ?? md.lunch);
    di += (m.dinner?.cost   ?? md.dinner);
    sn += (m.snacks?.cost   ?? md.snacks);
  });
  const sym = curSym(t);
  return `🥞 ${sym}${bk} · 🥙 ${sym}${lu} · 🍽️ ${sym}${di} · 🍦 ${sym}${sn}`;
}

// ── Budget drag to reorder ──
let _budgetDragId = null;
let _budgetDragOver = null;

function budgetDragStart(ev, catId) {
  _budgetDragId = catId;
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', catId);
  // Highlight source row after drag starts
  setTimeout(function(){
    var row = document.querySelector('[data-catid="'+catId+'"]');
    if (row) row.style.opacity = '0.4';
  }, 0);
}
function budgetDragEnd(ev) {
  _budgetDragId = null;
  _budgetDragOver = null;
  // Clean up all highlights
  document.querySelectorAll('tr[data-catid]').forEach(function(r){
    r.style.opacity = '';
    r.style.borderTop = '';
  });
}
function budgetTableDragOver(ev) {
  ev.preventDefault();
  if (!_budgetDragId) return;
  // Find which row we're over
  var target = ev.target;
  while (target && target.tagName !== 'TR') target = target.parentElement;
  if (!target || !target.getAttribute('data-catid')) return;
  var targetId = target.getAttribute('data-catid');
  if (targetId === _budgetDragId) return;
  if (targetId === _budgetDragOver) return;
  // Clear old highlight
  document.querySelectorAll('tr[data-catid]').forEach(function(r){ r.style.borderTop=''; });
  _budgetDragOver = targetId;
  target.style.borderTop = '3px solid #6366f1';
}
function budgetTableDrop(ev) {
  ev.preventDefault();
  document.querySelectorAll('tr[data-catid]').forEach(function(r){ r.style.borderTop=''; });
  if (!_budgetDragId || !_budgetDragOver || _budgetDragId === _budgetDragOver) {
    _budgetDragId = null; _budgetDragOver = null; return;
  }
  var t = trip();
  var cats = (t.budget.categories||[]).slice();
  var fromIdx = cats.findIndex(function(c){return c.id===_budgetDragId;});
  var toIdx   = cats.findIndex(function(c){return c.id===_budgetDragOver;});
  if (fromIdx===-1||toIdx===-1) { _budgetDragId=null; _budgetDragOver=null; return; }
  var moved = cats.splice(fromIdx,1)[0];
  cats.splice(toIdx,0,moved);
  _budgetDragId = null; _budgetDragOver = null;
  patchTrip({ budget: Object.assign({},t.budget,{categories:cats}) }, true);
  render();
}

function buildBudget(t) {
  const cats  = t.budget.categories;
  const sym = curSym(t);
  // Resolve actuals for each category
  const resolved = cats.map(c => ({ cat:c, info: resolveActual(c, t) }));
  // Use actual if available, else budgeted, for totals
  const totalEffective = resolved.reduce((s,{cat,info}) => s + (info.actual !== null ? info.actual : (cat.budgeted||0)), 0);
  const totalB = cats.reduce((s,c)=>s+(c.budgeted||0),0);
  const totalS = cats.reduce((s,c)=>s+(c.spent||0),0);
  const rem    = totalEffective - totalS;
  const hasActuals = resolved.some(({info}) => info.actual !== null && info.isLive);

  return `
    ${!cats.length ? `<div class="tab-hint"><span class="th-icon">💡</span><div><strong>Welcome to Budget!</strong> Add categories for each expense (Hotel, Flights, Food, etc.), set a budget amount, and track what you've paid. Click <em>Add Category</em> below to get started.</div></div>` : ''}
    ${hasActuals ? `<div style="background:#f0fdf4;border:2px solid #22c55e;border-radius:12px;padding:11px 16px;margin-bottom:16px;font-size:13px;color:#15803d;display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">🔗</span>
      <span><strong>Live data connected</strong> — some categories are now pulling real costs from your trip planning. Rows marked <strong>Live</strong> show actual amounts; others still use your budget estimates.</span>
    </div>` : ''}
    <div class="card">

function buildCatRow(c, info, t) {
  // info = { actual, label, source, isLive, breakdown } from resolveActual()
  // If no info passed (e.g. called from elsewhere), use empty
  if (!info) info = { actual: null, label: '', source: 'manual', isLive: false, breakdown: '' };

  const spent      = c.spent || 0;
  const effective  = info.actual !== null ? info.actual : (c.budgeted || 0);
  const owed       = effective - spent;
  const pct        = effective > 0 ? Math.min(spent / effective * 100, 100) : 0;
  const pClass     = owed < 0 ? 'prog-red' : owed < effective * 0.2 ? 'prog-yellow' : 'prog-green';
  const owedColor  = owed < 0 ? '#ef4444' : owed < effective * 0.2 ? '#f59e0b' : '#16a34a';
  const isSpend    = S.ui.spendCatId === c.id;
  const isEdit     = S.ui.editCatId === c.id;
  const txCount    = (c.transactions || []).length;
  const accounted  = c.accountedFor || false;
  const dueDate    = c.dueDate || '';
  const dueFmt     = dueDate ? new Date(dueDate + 'T00:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '—';
  const rowStyle   = `${isSpend||isEdit?'background:#f0f0ff;':''}''}`;
  const isLive     = info.isLive;
  const isHinted   = !isLive && info.label; // has name but no cost yet

  return `
    <tr style="${rowStyle}cursor:default;"
      draggable="true"
      data-catid="${c.id}"
      ondragstart="budgetDragStart(event,'${c.id}')"
      ondragend="budgetDragEnd(event)">
      <td>
        <!-- Row: drag handle + name + badges -->
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="cursor:grab;color:#ccc;font-size:14px;line-height:1;flex-shrink:0;user-select:none;" title="Drag to reorder">⠿</span>
          <div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <span style="font-size:14px;font-weight:700;color:#1a1a2e;">${c.emoji} ${esc(c.name)}</span>
              ${txCount>0?`<span style="font-size:10px;color:#aaa;font-weight:600;">${txCount} payment${txCount!==1?'s':''}</span>`:''}
              ${isLive?`<span style="font-size:10px;font-weight:800;background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:8px;">🔗 Live</span>`:''}
              ${isHinted&&!isLive?`<span style="font-size:10px;font-weight:700;background:#eff6ff;color:#3b82f6;padding:1px 7px;border-radius:8px;" title="${esc(info.label)}">📋 ${esc(info.label.length>22?info.label.slice(0,20)+'…':info.label)}</span>`:''}
            </div>
            <!-- Checkbox toggles on their own line, clearly labeled -->
            <div style="display:flex;align-items:center;gap:12px;margin-top:5px;flex-wrap:wrap;">
              <label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:${accounted?'#16a34a':'#9ca3af'};font-weight:600;white-space:nowrap;">
                <input type="checkbox" ${accounted?'checked':''}
                  onclick="event.stopPropagation();toggleAccountedFor('${c.id}')"
                  style="width:13px;height:13px;cursor:pointer;accent-color:#16a34a;">
                🏦 Bank Cleared
              </label>
              <label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:${c.isDisney?'#ea580c':'#9ca3af'};font-weight:600;white-space:nowrap;">
                <input type="checkbox" ${c.isDisney?'checked':''}
                  onclick="event.stopPropagation();toggleCatDisney('${c.id}')"
                  style="width:13px;height:13px;cursor:pointer;accent-color:#ea580c;">
                🏰 Disney Gift Card
              </label>
            </div>
            ${isLive && info.breakdown ? `<div style="font-size:10px;color:#16a34a;margin-top:3px;">${esc(info.breakdown.length>70?info.breakdown.slice(0,68)+'…':info.breakdown)}</div>` : ''}
          </div>
        </div>
      </td>
      <td class="${dueDate?'':'mb-empty'}" data-l="Due" style="font-size:12px;color:${dueDate?'#374151':'#ccc'};white-space:nowrap;">${dueFmt}</td>
      <td data-l="Budget goal" style="color:${isLive?'#aaa':'#374151'};${isLive?'text-decoration:line-through;font-size:11px;':''}" title="${isLive?'Overridden by live data':'Your budget goal'}">
        ${fmtDual(c.budgeted||0, t)}
      </td>
      <td data-l="Actual / est." style="font-weight:800;color:${isLive?'#15803d':'#4338ca'};" title="${isLive?'From your trip data':'Estimated — no live data yet'}">
        ${isLive?'':'~'}${fmtDual(effective, t)}
        ${!isLive&&info.source!=='manual'?`<div style="font-size:10px;color:#aaa;font-weight:400;">placeholder</div>`:''}
      </td>
      <td data-l="Spent" style="color:${spent>0?'#374151':'#ccc'};">

      <td class="mb-prog" style="min-width:90px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="prog-wrap"><div class="prog-fill ${pClass}" style="width:${pct}%"></div></div>
          <span style="font-size:10px;color:#aaa;white-space:nowrap;">${Math.round(pct)}%</span>
        </div>
      </td>
      <td class="mb-acts" onclick="event.stopPropagation()">
        <div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;">

          <button class="btn btn-xs btn-danger" onclick="deleteCat('${c.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
}

// Build airport select HTML helper
// Airport select uses a registry so we never embed function strings in HTML attributes
const _airportCallbacks = {};
function buildAirportSelect(currentVal, onchangeFn, placeholder) {
  // onchangeFn is a JS expression string like updExtraLeg('outbound',0,0,'origin',this.value)
  // We register a callback keyed by a uid so the HTML only has a simple id reference
  const cbId = 'ap_' + uid();
  // Store as a function that takes a value
  _airportCallbacks[cbId] = function(val) {
    // Build a safe eval with the value substituted
    const expr = onchangeFn.replace(/this\.value/g, JSON.stringify(val));
    try { eval(expr); } catch(e) { console.error('Airport cb error:', e, expr); }
  };
  const isCustom = currentVal && !COMMON_AIRPORTS.some(a=>a.code===currentVal);
  return `
    <select data-apcb="${cbId}" onchange="handleAirportSelect(this)"
      style="padding:9px 11px;border:2px solid #e4e4f0;border-radius:8px;font-family:inherit;font-size:13px;color:#1a1a2e;outline:none;background:#fff;width:100%;">
      <option value="">— Select airport —</option>
      ${COMMON_AIRPORTS.map(a=>`<option value="${a.code}"${currentVal===a.code?' selected':''}>${a.label}</option>`).join('')}
      ${isCustom?`<option value="${currentVal}" selected>✏️ ${currentVal} (custom)</option>`:''}
    </select>
    ${currentVal==='Other'||isCustom?`<input type="text" value="${isCustom?currentVal:''}"
      placeholder="${placeholder||'Airport code or name…'}"
      data-apcb="${cbId}"
      onchange="if(_airportCallbacks['${cbId}'])_airportCallbacks['${cbId}'](this.value);render()"
      style="margin-top:5px;padding:8px 11px;border:2px solid #e4e4f0;border-radius:8px;font-family:inherit;font-size:13px;width:100%;text-transform:uppercase;">`:''}`;
}

function handleAirportSelect(sel) {
  const cbId = sel.getAttribute('data-apcb');
  const val  = sel.value;
  if (cbId && _airportCallbacks[cbId]) {
    _airportCallbacks[cbId](val);
  }
  render();
}

  'Alaska Airlines','Allegiant Air','American Airlines','Avelo Airlines','Breeze Airways',

  'Southwest Airlines','Spirit Airlines','Sun Country Airlines','United Airlines',

];

];

// -- Duration select helper --
function buildDurationSelect(currentVal, maxHours, onchangeStr) {
  const options = [];
  for (let m = 15; m <= maxHours * 60; m += 15) {
    const h = Math.floor(m/60), min = m%60;
    const label = h > 0 ? (min > 0 ? `${h} hr ${min} min` : `${h} hr${h>1?'s':''}`) : `${min} min`;
    const sel = (currentVal && parseInt(currentVal) === m) ? ' selected' : '';
    options.push(`<option value="${m}"${sel}>${label}</option>`);
  }
  return `<select onchange="${onchangeStr}">
    <option value=""${!currentVal?' selected':''}>— Select time —</option>
    ${options.join('')}
  </select>`;
}

// -- Airline select helper --
function buildAirlineSelect(currentVal, onchangeStr) {
  return `<select onchange="${onchangeStr}">
    ${AIRLINES.map(a => {
      if (a.startsWith('—')) return `<option value="" disabled${!currentVal?' selected':''}>${a}</option>`;
      return `<option value="${esc(a)}"${currentVal===a?' selected':''}>${a}</option>`;
    }).join('')}
  </select>`;
}

// -- Trip date range helper --
function tripDateRange(t) { return { min: t.startDate||'', max: t.endDate||'' }; }

// -- Check if a transport section has enough info to enable the planner --
function sectionComplete(t, dir) {
  const sec = t.transportation[dir];
  if (!sec) return false;
  const mode = sec.mode || 'air';
  if (mode === 'air' || mode === 'train') {
    const leg = (sec.legs||[])[0] || {};
    return !!(leg.origin && leg.departTime);
  }
  if (mode === 'drive') return !!(sec.departDate && sec.departTime);
  return false;
}

// -- Auto-detect airport from section --
function getAutoAirport(t, dir) {
  const sec = t.transportation[dir];
  if (!sec) return '';
  const legs = sec.legs || [];
  if (legs[0] && legs[0].origin) return legs[0].origin;
  return '';
}

// -- Auto-detect flight time from section --
function getAutoFlightTime(t, dir) {
  const sec = t.transportation[dir];
  if (!sec) return '';
  const mode = sec.mode || 'air';
  if (mode === 'air' || mode === 'train') {
    const leg = (sec.legs||[])[0] || {};
    return leg.departTime || '';
  }
  if (mode === 'drive') return sec.departTime || '';
  return '';
}

// -- Open the departure planner modal for a given section --
function openDpModal(dir, sectionLabel) {
  const t = trip();
  const autoTime    = getAutoFlightTime(t, dir) || '';
  const autoAirport = getAutoAirport(t, dir)    || '';
  S.dpModal = {
    ...S.dpModal,
    open: true,
    dir,
    planIdx: null,  // null = plan list view
    sectionLabel,
    // Pre-fill defaults from flight data
    flightTime:   autoTime,
    airport:      autoAirport,
    advanceHours: 2,
    driveMinutes: 30,
    bufferMinutes: 15,
    getReadyMins: 60,
    travelers: [],
    planLabel: '',
  };
  render();
}
function openDpPlan(dir, planIdx) {
  const t = trip();
  const plans = t.departurePlans?.[dir] || [];
  // 'new' or null both mean a fresh plan — use 'new' as the sentinel
  const isNew = planIdx === 'new' || planIdx === null;
  const plan  = !isNew && plans[planIdx] ? plans[planIdx] : null;
  const autoTime    = getAutoFlightTime(t, dir) || '';
  const autoAirport = getAutoAirport(t, dir)    || '';
  S.dpModal = {
    ...S.dpModal,
    planIdx: isNew ? 'new' : planIdx,
    flightTime:    plan?.flightTime    ?? autoTime,
    airport:       plan?.airport       ?? autoAirport,
    advanceHours:  plan?.advanceHours  ?? 2,
    driveMinutes:  plan?.driveMinutes  ?? 30,
    bufferMinutes: plan?.bufferMinutes ?? 15,
    getReadyMins:  plan?.getReadyMins  ?? 60,
    travelers:      plan?.travelers      ?? [],
    planLabel:      plan?.planLabel      ?? '',
    isEarlyMorning: plan?.isEarlyMorning ?? true,
  };
  render();
}
function openDpPlanFromSummary(dir, planIdx) {
  const label = dir === 'outbound' ? 'Outbound Flight' : 'Return Flight';
  openDpModal(dir, label);
  // small delay to let openDpModal finish setting state, then switch to edit view
  setTimeout(function() { openDpPlan(dir, planIdx); }, 0);
}
function closeDpModal() {
  S.dpModal.open = false;
  S.dpModal.planIdx = null;
  S.ui.dpTravelerPickerOpen = false;
  render();
}
function toggleDpTraveler(memberId) {
  const travelers = S.dpModal.travelers || [];
  S.dpModal.travelers = travelers.includes(memberId)
    ? travelers.filter(id => id !== memberId)
    : [...travelers, memberId];
  render();
}

// -- Update a field inside the modal (live recalculate) --
function updDpModal(field, val) {
  S.dpModal[field] = val;
  render();
}

// -- Calculate from modal state --
function calcDpModal() {
  const dp = S.dpModal;
  if (!dp.flightTime) return null;
  const [h,m] = dp.flightTime.split(':').map(Number);
  const flightMins    = h*60+m;
  const arriveAirport = flightMins - (dp.advanceHours??2)*60;
  const leaveHome     = arriveAirport - (dp.driveMinutes??0) - (dp.bufferMinutes??0);
  const isEarly       = dp.isEarlyMorning !== false;
  const wakeUp        = isEarly ? leaveHome - (dp.getReadyMins??60) : null;
  return {
    flightDeparts: fmtTime(flightMins),
    arriveAirport: fmtTime(arriveAirport),
    leaveHome:     fmtTime(leaveHome),
    wakeUp:        wakeUp !== null ? fmtTime(wakeUp) : null,
  };
}

// -- "Send to Planner" — locks the result --
function sendDpToPlanner() {
  const dp = S.dpModal;
  const result = calcDpModal();
  if (!result) return;
  const t = trip();

  // Build the plan object
  const members = (t.partyMembers||[]).filter(m=>m.name&&m.name.trim());
  const assignedNames = dp.travelers.length
    ? dp.travelers.map(id => { const m=members.find(mm=>mm.id===id); return m?(m.emoji||'')+(m.name||''):''; }).filter(Boolean).join(', ')
    : 'Everyone';
  const planLabel = dp.planLabel || assignedNames;
  const plan = {
    id: uid(),
    planLabel,
    flightTime:    dp.flightTime,
    airport:       dp.airport,
    advanceHours:  dp.advanceHours,
    driveMinutes:  dp.driveMinutes,
    bufferMinutes: dp.bufferMinutes,
    getReadyMins:  dp.getReadyMins,
    isEarlyMorning: dp.isEarlyMorning !== false,
    travelers:     dp.travelers,
    ...result,
    savedAt: new Date().toLocaleTimeString(),
  };

  // Save to departurePlans
  const departurePlans = JSON.parse(JSON.stringify(t.departurePlans||{}));
  if (!departurePlans[dp.dir]) departurePlans[dp.dir] = [];
  if (dp.planIdx !== null && dp.planIdx !== 'new' && departurePlans[dp.dir][dp.planIdx]) {
    departurePlans[dp.dir][dp.planIdx] = plan; // update existing
  } else {
    departurePlans[dp.dir].push(plan); // add new
  }
  // Also keep legacy lockedResults for backward compat
  S.dpModal.lockedResults[dp.dir] = plan;

  // -- Inject into Run of Show --
  const tr = t.transportation || {};
  const flightLeg = ((tr[dp.dir]||{}).legs||[])[0] || {};
  const depDate = flightLeg.departDate || (dp.dir==='outbound' ? t.startDate : t.endDate) || '';
  const planTag = `auto:dp-${dp.dir}-${plan.id}`;
  const travelerTag = dp.travelers.length ? ` · ${planLabel}` : '';

  if (depDate) {
    // Strip ALL previous departure planner entries for this direction
    // (both legacy format 'auto:dp-outbound' and new 'auto:dp-outbound-planid')
    // Then re-add only the current set of plans fresh
    const existing = (t.rosEntries||[]).filter(e => {
      const notes = e.notes || '';
      // Remove any entry tagged for this direction
      if (notes.startsWith(`auto:dp-${dp.dir}`)) return false;
      // Also remove old-format entries (no plan id suffix)
      if (notes === `auto:dp-${dp.dir}`) return false;
      return true;
    });
    // Re-inject entries for all OTHER existing plans for this direction too
    // so we don't lose them when adding a new plan
    const otherPlans = (departurePlans[dp.dir]||[]).filter(p => p.id !== plan.id);
    const otherEntries = [];
    otherPlans.forEach(op => {
      const opTravelerTag = op.travelers?.length
        ? ` · ${op.planLabel||''}`
        : '';
      const opDate = depDate; // same departure date
      otherEntries.push(
        { id:uid(), date:opDate, time:to24(op.wakeUp),        label:`⏰ Wake Up & Get Ready${opTravelerTag}`,                         notes:`auto:dp-${dp.dir}-${op.id}`, icon:'⏰' },
        { id:uid(), date:opDate, time:to24(op.leaveHome),     label:`🚗 Leave ${dp.dir==='return'?'Resort':'Home'} for Airport${opTravelerTag}`, notes:`auto:dp-${dp.dir}-${op.id}`, icon:'🚗' },
        { id:uid(), date:opDate, time:to24(op.arriveAirport), label:`🏛️ Arrive ${op.airport||'Airport'}${opTravelerTag}`,              notes:`auto:dp-${dp.dir}-${op.id}`, icon:'🏛️' },
        { id:uid(), date:opDate, time:to24(op.flightDeparts), label:`✈️ ${dp.sectionLabel} Departs${opTravelerTag}`,                   notes:`auto:dp-${dp.dir}-${op.id}`, icon:'✈️' }
      );
    });
    const newEntries = [
      ...(dp.isEarlyMorning!==false && result.wakeUp ? [
        { id:uid(), date:depDate, time:to24(result.wakeUp), label:`⏰ Wake Up & Get Ready${travelerTag}`, notes:`${planTag}`, icon:'⏰' },
      ] : []),
      { id:uid(), date:depDate, time:to24(result.leaveHome),     label:`🚗 Leave ${dp.dir==='return'?'Resort':'Home'} for Airport${travelerTag}`, notes:`${planTag}`, icon:'🚗' },
      { id:uid(), date:depDate, time:to24(result.arriveAirport), label:`🏛️ Arrive ${dp.airport||'Airport'}${travelerTag}`,           notes:`${planTag}`, icon:'🏛️' },
      { id:uid(), date:depDate, time:to24(result.flightDeparts), label:`✈️ ${dp.sectionLabel} Departs${travelerTag}`,                notes:`${planTag}`, icon:'✈️' },
    ];
    patchTrip({ departurePlans, rosEntries: [...existing, ...otherEntries, ...newEntries] });
  } else {
    patchTrip({ departurePlans });
  }

  S.dpModal.planIdx = null; // back to list view
  render();
}

function deleteDpPlan(dir, planIdx) {
  if (!confirm('Delete this departure plan?')) return;
  const t = trip();
  const departurePlans = JSON.parse(JSON.stringify(t.departurePlans||{}));
  const plan = departurePlans[dir]?.[planIdx];
  if (!departurePlans[dir]) return;
  // Remove from ROS
  const rosEntries = (t.rosEntries||[]).filter(e => !(e.notes||'').includes(`auto:dp-${dir}-${plan?.id||''}`));
  departurePlans[dir].splice(planIdx, 1);
  patchTrip({ departurePlans, rosEntries }, true); render();
}

  if (locked) {
    return `<button class="dp-locked-badge" onclick="openDpModal('${dir}','${label}')" title="Departure plan locked — click to revise">
      ⏰ Wake: ${locked.wakeUp} · Leave: ${locked.leaveHome} &nbsp;✏️
    </button>`;
  }
  if (complete) {
    return `<button class="dp-clock-btn" onclick="openDpModal('${dir}','${label}')" title="Open departure planner for this flight">
      🕐 When Do I Leave?
    </button>`;
  }
  return `<button class="dp-clock-btn" disabled title="Complete origin airport &amp; departure time first">
    🕐 When Do I Leave?
  </button>`;
}

function buildTransportation(t) {
  const hasAny = !!(t.transportation?.outbound?.legs?.[0]?.origin || t.transportation?.outbound?.legs?.[0]?.departDate);
  const extraOutbound = t.transportation.extraOutbound || [];
  const extraReturn   = t.transportation.extraReturn   || [];
  const transLocked   = t.transportLocked || false;
  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      ${buildLockBtn(transLocked, 'toggleTransportLock', 'Transportation')}
    </div>
    ${transLocked ? `<div style="background:#f0f0ff;border:1px solid #c7d2fe;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#3730a3;font-weight:700;">
      🔒 Transportation locked — <button onclick="toggleTransportLock()" style="background:none;border:none;cursor:pointer;color:#1a1a5e;font-weight:800;font-size:13px;text-decoration:underline;font-family:inherit;">click to unlock</button> to make changes
    </div>` : ''}
    ${!hasAny ? `<div class="tab-hint"><span class="th-icon">💡</span><div><strong>Transportation</strong> — Enter your flights for each group. If part of your party is on a different flight, use <em>＋ Add Separate Flight</em> to add a second booking.</div></div>` : ''}
    ${buildTransSection(t,'outbound','🛫 Outbound Trip')}
    ${extraOutbound.map((sec,i)=>buildExtraTransSection(t,'outbound',i,sec,'🛫 Outbound Trip (Group '+(i+2)+')')).join('')}
    <button class="btn-dashed" style="margin-bottom:16px;" onclick="addExtraFlight('outbound')">
      ＋ Add Separate Outbound Flight (different travelers / booking)
    </button>
    ${buildGroundSection(t,'ground','🏨 Getting to the Resort (Airport → Resort)')}
    ${buildTransSection(t,'return','🛬 Return Trip')}
    ${extraReturn.map((sec,i)=>buildExtraTransSection(t,'return',i,sec,'🛬 Return Trip (Group '+(i+2)+')')).join('')}
    <button class="btn-dashed" style="margin-bottom:16px;" onclick="addExtraFlight('return')">
      ＋ Add Separate Return Flight (different travelers / booking)
    </button>
    ${buildGroundSection(t,'groundReturn','🚗 Getting to the Airport (Resort → Airport)')}
  `;
}

function buildExtraTransSection(t, dir, idx, sec, title) {
  const mode = sec.mode || 'air';
  const members = (t.partyMembers||[]).filter(m=>m.name&&m.name.trim());
  return `
    <div class="card" style="border-left:3px solid #FFD700;">
      <div class="card-header" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span>${title}</span>
        <button class="btn btn-danger btn-sm" onclick="removeExtraFlight('${dir}',${idx})">✕ Remove</button>
      </div>
      ${mode==='air' ? buildExtraAirLegs(t, dir, idx, sec, members) : ''}
    </div>`;
}

            ${(leg.travelers||[]).length ? `
            <div style="display:flex;gap:3px;">
              ${(leg.travelers||[]).map(id=>{const m=(t.partyMembers||[]).find(m=>m.id===id);return m?`<span style="font-size:16px;" title="${esc(m.name)}">${m.emoji||'🧑'}</span>`:'';}).join('')}
            </div>` : ''}

          <div class="fg"><label class="lbl">Flight #</label>
            <input type="text" value="${esc(leg.flightNum)}" placeholder="e.g. AA1234" onchange="updExtraLeg('${dir}',${idx},${i},'flightNum',this.value)"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label class="lbl">Origin</label>${buildAirportSelect(leg.origin,`updExtraLeg('${dir}',${idx},${i},'origin',this.value)`,'e.g. ONT…')}</div>
          <div class="fg"><label class="lbl">Destination</label>${buildAirportSelect(leg.destination,`updExtraLeg('${dir}',${idx},${i},'destination',this.value)`,'e.g. MCO…')}</div>
        </div>
        <div class="form-row">
          <div class="fg"><label class="lbl">Depart Date</label>
            <input type="date" value="${esc(leg.departDate)}" onchange="updExtraLeg('${dir}',${idx},${i},'departDate',this.value)"></div>
          <div class="fg"><label class="lbl">Depart Time</label>
            <input type="time" value="${esc(leg.departTime)}" onchange="updExtraLeg('${dir}',${idx},${i},'departTime',this.value)"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label class="lbl">Arrive Date</label>
            <input type="date" value="${esc(leg.arriveDate)}" onchange="updExtraLeg('${dir}',${idx},${i},'arriveDate',this.value)"></div>
          <div class="fg"><label class="lbl">Arrive Time</label>
            <input type="time" value="${esc(leg.arriveTime)}" onchange="updExtraLeg('${dir}',${idx},${i},'arriveTime',this.value)"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label class="lbl">Seat</label>
            <input type="text" value="${esc(leg.seat)}" placeholder="e.g. 14C" onchange="updExtraLeg('${dir}',${idx},${i},'seat',this.value)"></div>
          <div class="fg"><label class="lbl">Cost (${curSym(t)})</label>
            <input type="number" value="${leg.cost||''}" placeholder="e.g. 420" onchange="updExtraLeg('${dir}',${idx},${i},'cost',parseFloat(this.value)||null)">

        </div>
      </div>`).join('')}
    <button class="btn-dashed" style="margin-top:4px;margin-bottom:8px;" onclick="addExtraLegItem('${dir}',${idx})">
      ＋ Add Connecting Flight Leg

function buildExtraTravelerPicker(leg, dir, groupIdx, legIdx, members) {

               font-family:inherit;font-size:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;">
        ${assigned.length
          ? assigned.map(m=>`<span style="font-size:18px;">${m.emoji||'🧑'}</span><span style="font-weight:700;color:#1a1a5e;">${esc(m.name)}</span>`).join('<span style="color:#aaa;">·</span>')
          : `<span style="color:#aaa;">Assign travelers →</span>`}
        <span style="margin-left:auto;color:#aaa;font-size:11px;">${isOpen?'▲':'▼'}</span>
      </button>
      ${isOpen ? `
      <div style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1000;

                  box-shadow:0 8px 32px rgba(0,0,0,.2);min-width:260px;">
        <div style="font-size:12px;font-weight:800;color:#1a1a5e;margin-bottom:12px;">Who's on this flight?</div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          ${members.map(m=>`
            <button onclick="toggleExtraLegTraveler('${dir}',${groupIdx},${legIdx},'${m.id}')"
              style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
                     border:2px solid ${travelers.includes(m.id)?'#1a1a5e':'#e4e4f0'};
                     background:${travelers.includes(m.id)?'#f0f0ff':'#fff'};
                     cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;text-align:left;">
              <span style="font-size:20px;">${m.emoji||'🧑'}</span>
              <span>${esc(m.name)}</span>

                 padding:8px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;">

function buildTransSection(t, dir, title) {
  const sec  = t.transportation[dir];
  const mode = sec.mode || 'air';
  const label = dir==='outbound' ? 'Outbound Flight' : 'Return Flight';
  return `
    <div class="card">
      <div class="card-header" style="justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span>${title}</span>
        ${buildDpClockBtn(t, dir, label)}
      </div>
      <div class="fg">
        <label class="lbl">Travel Mode</label>
        <div class="toggle-group">
          <button class="tog-btn${mode==='air'?' active':''}" onclick="setMode('${dir}','air')">✈️ Air</button>
          <button class="tog-btn${mode==='drive'?' active':''}" onclick="setMode('${dir}','drive')">🚗 Drive</button>
          <button class="tog-btn${mode==='train'?' active':''}" onclick="setMode('${dir}','train')">🚂 Train</button>
        </div>
      </div>
      ${mode==='air'   ? buildAirLegs(t,dir,sec) : ''}
      ${mode==='drive' ? buildDriveForm(t,dir,sec) : ''}
      ${mode==='train' ? buildTrainLegs(t,dir,sec) : ''}
      ${buildLockedDpSummary(dir)}
    </div>`;
}

// -- Show locked result inside the card --
function buildLockedDpSummary(dir) {
  const t = trip();
  const plans = t?.departurePlans?.[dir] || [];
  // Fall back to legacy lockedResults
  const legacy = S.dpModal.lockedResults[dir];
  if (!plans.length && !legacy) return '';

  const allPlans = plans.length ? plans : [legacy];

  return `
    <div style="margin-top:14px;">
      <div style="font-size:11px;color:#7070a0;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">
        ✅ ${allPlans.length} Departure Plan${allPlans.length!==1?'s':''} Saved
      </div>
      ${allPlans.map((plan, i) => {
        const members = (t.partyMembers||[]).filter(m=>m.name);
        const travelerEmojis = plan.travelers?.length
          ? plan.travelers.map(id=>{const m=members.find(mm=>mm.id===id);return m?m.emoji||'🧑':'';}).join('')
          : '👥';
        return `<div style="background:linear-gradient(135deg,#1a1a5e,#2d2d8f);border-radius:10px;padding:12px 14px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:18px;">${travelerEmojis}</span>
              <span style="font-size:12px;font-weight:800;color:#a0a0e0;">${esc(plan.planLabel||'Plan '+(i+1))}</span>
            </div>
            <button onclick="openDpPlanFromSummary('${dir}',${i})"
              style="font-size:10px;color:#a0a0e0;background:rgba(255,255,255,.1);border:none;border-radius:5px;padding:3px 8px;cursor:pointer;font-family:inherit;">
              Edit
            </button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            ${[['⏰','Wake Up',plan.wakeUp],['🚗','Leave By',plan.leaveHome],['🏛️','At Airport',plan.arriveAirport],['✈️','Departs',plan.flightDeparts]].map(([icon,lbl,val])=>`
              <div style="background:rgba(255,255,255,.07);border-radius:6px;padding:7px 10px;">
                <div style="font-size:9px;color:#7070a0;font-weight:800;text-transform:uppercase;">${icon} ${lbl}</div>
                <div style="font-size:16px;font-weight:900;color:#FFD700;">${val||'—'}</div>
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function buildTravelerPicker(leg, dir, legIdx, members) {
  if (!members.length) return '';
  const travelers = leg.travelers || [];
  const isOpen = (S.ui.travelerPickerKey === dir+'_'+legIdx);

  return `
    <div class="fg" style="position:relative;">
      <label class="lbl">👥 Travelers on this flight</label>
      <button onclick="toggleTravelerPicker('${dir}',${legIdx})"
        style="width:100%;padding:8px 12px;border:2px solid ${assigned.length?'#1a1a5e':'#e4e4f0'};
               border-radius:9px;background:${assigned.length?'#f0f0ff':'var(--white)'};
               font-family:inherit;font-size:13px;cursor:pointer;text-align:left;
               display:flex;align-items:center;gap:8px;transition:all .15s;">
        ${assigned.length
          ? assigned.map(m=>`<span style="font-size:18px;">${m.emoji||'🧑'}</span><span style="font-weight:700;color:#1a1a5e;">${esc(m.name)}</span>`).join('<span style="color:#aaa;">·</span>')
          : `<span style="color:#aaa;">Assign party members →</span>`}
        <span style="margin-left:auto;color:#aaa;font-size:11px;">${isOpen?'▲':'▼'}</span>
      </button>
      ${isOpen ? `
      <div style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1000;
                  background:#fff;border:2px solid #e4e4f0;border-radius:14px;padding:16px;
                  box-shadow:0 8px 32px rgba(0,0,0,.2);min-width:260px;">
        <div style="font-size:12px;font-weight:800;color:#1a1a5e;margin-bottom:12px;">Who's on this flight?</div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          ${members.map(m=>`
            <button onclick="toggleLegTraveler('${dir}',${legIdx},'${m.id}')"
              style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
                     border:2px solid ${travelers.includes(m.id)?'#1a1a5e':'#e4e4f0'};
                     background:${travelers.includes(m.id)?'#f0f0ff':'#fff'};
                     cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;text-align:left;transition:all .12s;">
              <span style="font-size:20px;">${m.emoji||'🧑'}</span>
              <span style="color:${travelers.includes(m.id)?'#1a1a5e':'#555'};">${esc(m.name)}</span>
              ${travelers.includes(m.id)?'<span style="margin-left:auto;color:#1a1a5e;">✓</span>':''}
            </button>`).join('')}
        </div>
        <button onclick="toggleTravelerPicker('${dir}',${legIdx})"
          style="margin-top:12px;width:100%;background:#1a1a5e;color:#FFD700;border:none;border-radius:8px;
                 padding:8px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;">
          ✓ Done
        </button>
      </div>` : ''}
    </div>`;
}

          <div class="fg"><label class="lbl">Depart Date</label>
            <input type="date" value="${esc(leg.departDate)}"
              onchange="updLeg('${dir}',${i},'departDate',this.value)"></div>
          <div class="fg"><label class="lbl">Depart Time</label>
            <input type="time" value="${esc(leg.departTime)}" onchange="updLeg('${dir}',${i},'departTime',this.value)"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label class="lbl">Arrive Date</label>
            <input type="date" value="${esc(leg.arriveDate)}"
              onchange="updLeg('${dir}',${i},'arriveDate',this.value)"></div>
          <div class="fg"><label class="lbl">Arrive Time</label>
            <input type="time" value="${esc(leg.arriveTime)}" onchange="updLeg('${dir}',${i},'arriveTime',this.value)"></div>
        </div>
        <div class="form-row">
          <div class="fg"><label class="lbl">Seat Info (optional)</label>

      <input type="text" value="${esc(sec.destAddress)}" placeholder="e.g. Walt Disney World, Orlando FL" onchange="updTransField('${dir}','destAddress',this.value)"></div>

      <div class="fg"><label class="lbl">Departure Date</label>
        <input type="date" value="${esc(sec.departDate)}" min="${dr.min}" max="${dr.max}"
          onchange="updTransField('${dir}','departDate',this.value)"></div>
      <div class="fg"><label class="lbl">Departure Time</label>
        <input type="time" value="${esc(sec.departTime)}" onchange="updTransField('${dir}','departTime',this.value)"></div>

    <div class="fg"><label class="lbl">Estimated Drive Time</label>

// -- ROS Drag & Drop --
let _rosDragKey = null;
let _rosDragDate = null;
function rosGetEntryEl(el) {
  while (el && !el.getAttribute('data-ekey')) el = el.parentElement;
  return el;
}
function rosDragStart(ev) {
  const el = rosGetEntryEl(ev.target);
  _rosDragKey  = el ? el.getAttribute('data-ekey') : null;
  _rosDragDate = el ? el.getAttribute('data-date') : null;
  if (!_rosDragKey) { ev.preventDefault(); return; }
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', _rosDragKey);
  ev.dataTransfer.setData('application/x-ros-key', _rosDragKey); // fallback
  setTimeout(function(){ if(el) el.classList.add('dragging'); }, 0);
}
let _rosDragOverKey = null;
function rosContainerDragOver(ev) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  const entryEl = rosGetEntryEl(ev.target);
  const key = entryEl ? entryEl.getAttribute('data-ekey') : null;
  if (key === _rosDragOverKey) return; // no change, avoid flicker
  // Clear all previous highlights
  document.querySelectorAll('.ros-entry.drag-over').forEach(el => el.classList.remove('drag-over'));
  _rosDragOverKey = key;
  // Highlight target (but not the dragged item itself or sentinels being dragged onto SOD)
  if (entryEl && key && key !== _rosDragKey) {
    entryEl.classList.add('drag-over');
  }
}
function rosContainerDragLeave(ev) {
  // Only clear if leaving the container entirely
  if (!ev.currentTarget.contains(ev.relatedTarget)) {
    document.querySelectorAll('.ros-entry.drag-over').forEach(el => el.classList.remove('drag-over'));
    _rosDragOverKey = null;
  }
}
function rosContainerDrop(ev, date) {
  ev.preventDefault();
  document.querySelectorAll('.ros-entry.drag-over').forEach(el => el.classList.remove('drag-over'));
  // Recover dragKey from dataTransfer if global was lost (can happen on some browsers)
  if (!_rosDragKey) {
    _rosDragKey  = ev.dataTransfer.getData('text/plain') || ev.dataTransfer.getData('application/x-ros-key');
    _rosDragDate = date;
  }
  if (!_rosDragKey) return;
  const targetEl  = rosGetEntryEl(ev.target);
  const targetKey = targetEl ? targetEl.getAttribute('data-ekey') : null;
  _rosDragOverKey = null;
  // Don't allow dragging sentinel entries themselves
  if (_rosDragKey && (_rosDragKey==='sentinel|sod'||_rosDragKey==='sentinel|eod')) {
    _rosDragKey = null; return;
  }
  // Dropping on EOD = move to end (before EOD sentinel)
  if (targetKey === 'sentinel|eod') { rosDropBeforeEOD(ev, date); return; }
  // Dropping on SOD = move to start (after SOD sentinel)
  if (targetKey === 'sentinel|sod') { rosDropAfterSOD(ev, date); return; }
  // If dropped on empty space, move to end
  if (!targetKey || targetKey === _rosDragKey) {
    rosDropToEnd(ev, date);
    return;
  }
  const container = document.getElementById('ros-day-'+date);
  if (!container) { _rosDragKey = null; return; }
  const els  = [...container.querySelectorAll('[data-ekey]')];
  const keys = els.map(el => el.getAttribute('data-ekey'));
  const fromIdx = keys.indexOf(_rosDragKey);
  const toIdx   = keys.indexOf(targetKey);
  if (fromIdx === -1 || toIdx === -1) { _rosDragKey = null; return; }
  // Remove the dragged item first
  keys.splice(fromIdx, 1);
  // After removal, recalculate target index since array shifted
  const adjustedTo = fromIdx < toIdx ? toIdx - 1 : toIdx;
  keys.splice(adjustedTo, 0, _rosDragKey);
  const t = trip();
  const rosOverrides = JSON.parse(JSON.stringify(t.rosOverrides||{}));
  if (!rosOverrides[date]) rosOverrides[date] = {};
  keys.forEach((k,i) => {
    if (!rosOverrides[date][k]) rosOverrides[date][k] = {};
    rosOverrides[date][k].order = i;
  });
  _rosDragKey = null; _rosDragDate = null;
  patchTrip({ rosOverrides }, true); render();
}
function rosDragEnd(ev) {
  document.querySelectorAll('.ros-entry.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.ros-entry.drag-over').forEach(el => el.classList.remove('drag-over'));
  _rosDragOverKey = null;
}
// Keep stubs for backward compat
function rosDragOver(ev) { ev.preventDefault(); }
function rosDragLeave(ev) {}
function rosDrop(ev) {}

function saveRosTimeOverride(date, eKey, newTime) {

function exportToCalendar() {
  var t = trip();
  if (!t) return;

  function pad(n){ return String(n).padStart(2,'0'); }
  function icsDateTime(dateStr, timeStr) {
    // Returns YYYYMMDDTHHMMSS
    var d = dateStr.replace(/-/g,'');
    if (!timeStr) return null;
    var parts = timeStr.match(/^(\d+):(\d+)/);
    if (!parts) return null;
    return d+'T'+pad(parseInt(parts[1]))+pad(parseInt(parts[2]))+'00';
  }
  function icsDate(dateStr) {
    return dateStr.replace(/-/g,'');
  }
  function nextDay(dateStr) {
    var d = new Date(dateStr+'T12:00:00');
    d.setDate(d.getDate()+1);
    return d.toISOString().split('T')[0].replace(/-/g,'');
  }
  function escIcs(s) {
    var str = String(s||'');
    str = str.split('\\').join('\\\\');
    str = str.split(';').join('\\;');
    str = str.split(',').join('\\,');
    str = str.split('\n').join('\\n');
    return str;
  }
  function foldLine(line) {
    // ICS lines must be <= 75 octets, fold with CRLF + SPACE
    var result = '';
    while (line.length > 75) {
      result += line.substr(0,75) + '\r\n ';
      line = line.substr(75);
    }
    return result + line;
  }
  var counter = 0;
  function makeUID() {
    return (++counter)+'-'+Date.now()+'@skippertripper.app';
  }
  var now = new Date();
  var dtstamp = String(now.getUTCFullYear())
    + pad(now.getUTCMonth()+1)
    + pad(now.getUTCDate())
    + 'T'
    + pad(now.getUTCHours())
    + pad(now.getUTCMinutes())
    + pad(now.getUTCSeconds())
    + 'Z';

  var events = [];

  function addEvent(summary, dateStr, startTime, endTime, description, location) {
    if (!dateStr) return;
    var ev = [];
    ev.push('BEGIN:VEVENT');
    ev.push('UID:'+makeUID());
    ev.push('DTSTAMP:'+dtstamp);
    if (startTime) {
      var dtStart = icsDateTime(dateStr, startTime);
      if (!dtStart) return;
      ev.push('DTSTART;TZID=America/New_York:'+dtStart);
      var dtEnd = endTime ? icsDateTime(dateStr, endTime) : null;
      if (!dtEnd) {
        // Default 1 hour duration
        var parts = startTime.match(/^(\d+):(\d+)/);
        var h = parseInt(parts[1]), m = parseInt(parts[2]);
        var endMins = h*60+m+60;
        dtEnd = icsDate(dateStr)+'T'+pad(Math.floor(endMins/60)%24)+pad(endMins%60)+'00';
      }
      ev.push('DTEND;TZID=America/New_York:'+dtEnd);
    } else {
      ev.push('DTSTART;VALUE=DATE:'+icsDate(dateStr));
      ev.push('DTEND;VALUE=DATE:'+nextDay(dateStr));
    }
    ev.push('SUMMARY:'+escIcs(summary));
    if (description && description.trim()) ev.push('DESCRIPTION:'+escIcs(description.trim()));
    if (location && location.trim()) ev.push('LOCATION:'+escIcs(location.trim()));
    ev.push('END:VEVENT');
    events.push(ev);
  }

  // ── Hotel check-in/out ──
  (t.hotelLegs||[]).forEach(function(leg) {
    var tv = (leg.travelers||[]).map(function(id){
      var m=(t.partyMembers||[]).find(function(m){return m.id===id;});
      return m?m.name:'';
    }).filter(Boolean).join(', ');
    if (leg.checkInDate) {
      addEvent(
        '🏨 Check in: '+(leg.name||'Hotel'),
        leg.checkInDate, leg.checkInTime||'14:00', null,
        (leg.confirmationNum?'Conf# '+leg.confirmationNum+' ':'')+(tv?'Guests: '+tv:''),
        leg.name||''
      );
    }
    if (leg.checkOutDate) {
      addEvent('🧳 Check out: '+(leg.name||'Hotel'), leg.checkOutDate, '11:00', '12:00', '', leg.name||'');
    }
  });

  // ── Flights ──
  var allLegs = (t.transportation.outbound.legs||[])
    .concat(t.transportation.return.legs||[])
    .concat((t.transportation.extraOutbound||[]).reduce(function(a,s){return a.concat(s.legs||[]);}, []))
    .concat((t.transportation.extraReturn||[]).reduce(function(a,s){return a.concat(s.legs||[]);}, []));

  allLegs.forEach(function(leg) {
    var tv = (leg.travelers||[]).map(function(id){
      var m=(t.partyMembers||[]).find(function(m){return m.id===id;});
      return m?m.name:'';
    }).filter(Boolean).join(', ');
    var desc = (leg.airline||'')+' '+(leg.flightNum||'')+(tv?' - Travelers: '+tv:'');
    if (leg.departDate && leg.departTime) {
      addEvent('✈️ Depart '+(leg.origin||'?')+' → '+(leg.destination||'?'),
        leg.departDate, leg.departTime,
        (leg.arriveDate===leg.departDate && leg.arriveTime) ? leg.arriveTime : null,
        desc, leg.origin||'');
    }
    if (leg.arriveDate && leg.arriveTime) {
      addEvent('🛬 Arrive '+(leg.destination||'?'),
        leg.arriveDate, leg.arriveTime, null, desc, leg.destination||'');
    }
  });

  // ── Park days ──
  var parkNames = {mk:'Magic Kingdom',ep:'EPCOT',hs:'Hollywood Studios',ak:'Animal Kingdom',
    ds:'Disney Springs',wp:'Water Park',rest:'Rest Day',travel:'Travel Day',
    'dcl-embark':'Embarkation Day','dcl-sea':'Sea Day','dcl-port':'Port Day','dcl-disembark':'Disembarkation Day'};

  (t.parks||[]).forEach(function(day) {
    if (!day.park || day.park==='unassigned') return;
    var label = parkNames[day.park] || day.park;
    var ph = SEPT_PARK_HOURS[day.park] || DLP_PARK_HOURS[day.park] || DLR_PARK_HOURS[day.park];
    var desc = [];
    if (ph) desc.push('Hours: '+ph.open+' - '+ph.close);
    if (day.notes) desc.push('Notes: '+day.notes);
    ['breakfast','lunch','dinner','snacks'].forEach(function(mt) {
      var meal = (day.meals||{})[mt]||{};
      if (meal.place) desc.push(mt.charAt(0).toUpperCase()+mt.slice(1)+': '+meal.place+(meal.adrTime?' @ '+fmt12(meal.adrTime):''));
    });
    (day.parkHops||[]).forEach(function(hp) {
      if (hp&&!hp.startsWith('event-')) desc.push('+ Hop: '+(parkNames[hp]||hp));
    });

    var startT = null, endT = null;
    if (ph) {
      var sp = ph.open.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (sp) {
        var sh=parseInt(sp[1]),sm=parseInt(sp[2]);
        if(sp[3].toUpperCase()==='PM'&&sh!==12)sh+=12;
        if(sp[3].toUpperCase()==='AM'&&sh===12)sh=0;
        startT = pad(sh)+':'+pad(sm);
      }
      var ep2 = ph.close.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (ep2) {
        var eh=parseInt(ep2[1]),em=parseInt(ep2[2]);
        if(ep2[3].toUpperCase()==='PM'&&eh!==12)eh+=12;
        if(ep2[3].toUpperCase()==='AM'&&eh===12)eh=0;
        endT = pad(eh)+':'+pad(em);
      }
    }
    var loc = (day.park==='rest'||day.park==='travel'||day.park.startsWith('dcl-')) ? '' : label+(t.tripType==='dlr'?', Disneyland Resort, Anaheim CA':t.tripType==='dlp'?', Disneyland Paris':', Walt Disney World, FL');
    addEvent((day.park==='rest'?'😴 ':day.park==='travel'?'✈️ ':'🏰 ')+'Day '+day.dayNum+': '+label,
      day.date, startT, endT, desc.join(', '), loc);

    // Individual meal ADRs
    ['breakfast','lunch','dinner','snacks'].forEach(function(mt) {
      var meal = (day.meals||{})[mt]||{};
      if (meal.place && meal.adrTime) {
        var icons = {breakfast:'🥞',lunch:'🥙',dinner:'🍽️',snacks:'🍦'};
        addEvent(icons[mt]+' '+(mt.charAt(0).toUpperCase()+mt.slice(1))+': '+meal.place,
          day.date, meal.adrTime, null,
          meal.adrConfNum?'Conf# '+meal.adrConfNum:'',
          meal.place+(t.tripType==='dlr'?', Disneyland Resort, Anaheim CA':t.tripType==='dlp'?', Disneyland Paris':', Walt Disney World, FL'));
      }
    });
  });

  // ── Manual ROS entries ──
  (t.rosEntries||[]).filter(function(e){ return e.label&&e.date&&e.time&&!(e.notes||'').startsWith('auto:dp-'); }).forEach(function(e) {
    addEvent((e.icon||'📌')+' '+e.label, e.date, e.time, null, e.notes||'', '');
  });

  // ── Build ICS ──
  var lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Skipper Tripper//Disney Trip Planner//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:'+escIcs(t.name||'Disney Trip'),
    'X-WR-TIMEZONE:America/New_York',
  ];
  events.forEach(function(ev) {
    ev.forEach(function(line) { lines.push(line); });
  });
  lines.push('END:VCALENDAR');

  // Join with CRLF and fold long lines
  var ics = lines.map(foldLine).join('\r\n') + '\r\n';

  var blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (t.name||'trip').replace(/[^a-z0-9]/gi,'_')+'_calendar.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
}


function exportItinerary() {

function getDayActivities(t, date) {
  // Returns manual rosEntries for a date (excludes auto dp entries)
  return (t.rosEntries||[]).filter(function(e) {
    return e.date===date && (e.label||e.title) && !(e.notes||'').startsWith('auto:dp-');
  });
}
function buildDayActivityBadges(t, date, color) {
  var acts = getDayActivities(t, date);
  if (!acts.length) return '';
  var html = '<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px;">';
  acts.forEach(function(e) {
    html += '<span style="font-size:10px;background:'+color+'18;color:'+color+';border-radius:5px;padding:1px 6px;font-weight:700;">'
          + (e.icon||'📌')+' '+(e.label||e.title||'')
          + (e.time?' · '+fmt12(e.time):'')
          + '</span>';
  });
  html += '</div>';
  return html;
}
function buildCalMealBlock(meals, color, md, sym) {
  sym = sym || '$';
  var icons = {breakfast:'🥞', lunch:'🥙', dinner:'🍽️', snacks:'🍦'};
  var total = 0;
  var lines = [];
  ['breakfast','lunch','dinner','snacks'].forEach(function(m) {
    var mc = meals[m] || {};
    var cost = (mc.cost !== undefined && mc.cost !== null) ? mc.cost : (md[m] || 0);
    total += cost;
    if (mc.place || (mc.cost !== undefined && mc.cost !== null)) {
      var line = icons[m] + (mc.place ? ' ' + mc.place : '') + (cost ? ' '+sym+cost : '');
      lines.push('<div style="font-size:9px;color:#aaa;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + line + '</div>');
    }
  });
  if (!total && !lines.length) return '';
  return '<div style="margin-top:5px;padding-top:5px;border-top:1px solid ' + color + '22;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;">'
    + '<span style="font-size:10px;color:#999;">🍴 Food</span>'
    + '<span style="font-size:11px;font-weight:800;color:' + color + ';">'+sym+total+'</span>'
    + '</div>'
    + lines.join('')
    + '</div>';
}

function buildCalendarView(t) {
  const days = t.tripType === 'aulani' ? (t.activityDays||[]) : (t.parks||[]);
  if (!days.length) return '<div class="tab-hint"><span class="th-icon">📅</span><div>No days to display. Set your trip dates first.</div></div>';

  // Group days by month
  const months = {};
  days.forEach(d => {
    const dt = new Date(d.date+'T00:00:00');
    const key = dt.getFullYear()+'-'+(dt.getMonth()+1);
    if (!months[key]) months[key] = { year:dt.getFullYear(), month:dt.getMonth(), days:[] };
    months[key].days.push(d);
  });

  const parkColors = { mk:'#1a1a5e', ep:'#059669', hs:'#dc2626', ak:'#92400e',
    ds:'#7c3aed', wp:'#0284c7', rest:'#6b7280', unassigned:'#d1d5db' };

  return `<div id="cal-view">${Object.values(months).map(m => {
    const monthName = new Date(m.year, m.month, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const firstDow = new Date(m.year, m.month, 1).getDay();
    const daysInMonth = new Date(m.year, m.month+1, 0).getDate();
    const dayMap = {};
    m.days.forEach(d => {
      const day = new Date(d.date+'T00:00:00').getDate();
      dayMap[day] = d;
    });

    let cells = '';
    // Empty cells before first day
    for (let i=0; i<firstDow; i++) {
      cells += '<div style="min-height:90px;"></div>';
    }
    // Day cells
    for (let day=1; day<=daysInMonth; day++) {
      const d = dayMap[day];
      if (d) {
        const isAulani = t.tripType === 'aulani';
        const acts = isAulani ? (d.activities||[d.activity||'pool']) : null;
        const park  = !isAulani ? d.park : null;
        const color = isAulani
          ? (acts.length ? aulaniActivityColor(acts[0]) : '#94a3b8')
          : (parkColors[park] || '#d1d5db');
        const label = isAulani
          ? acts.map(a=>aulaniActivityLabel(a).emoji).join(' ')
          : (park ? parkName(park) : '—');
        const sublabel = isAulani
          ? acts.map(a=>aulaniActivityLabel(a).label).join(' · ')
          : '';
        const meals = d.meals || {};
        const hasMeals = Object.values(meals).some(m=>m.place||m.note);
        const hasADR   = Object.values(meals).some(m=>m.adrRequired);
        const hasLL    = (d.llSelections||[]).length > 0;
        const notes    = d.notes || '';

        // Cruise day check
        const isCruise = !isAulani && t.cruise && t.cruiseStartDate && t.cruiseEndDate
          && d.date >= t.cruiseStartDate && d.date <= t.cruiseEndDate;
        const cellBg = isCruise
          ? 'linear-gradient(135deg,#dbeafe,#bfdbfe)'
          : `${color}18`;
        const cellBorder = isCruise ? '#3b82f6' : color;

        cells += `<div onclick="jumpToDay('${d.date}')"
          style="min-height:90px;border-radius:8px;
                 background:${cellBg};
                 border:2px solid ${cellBorder}44;
                 padding:7px 8px;position:relative;
                 cursor:pointer;transition:box-shadow .15s;"
          onmouseover="this.style.boxShadow='0 0 0 2px ${cellBorder}'"
          onmouseout="this.style.boxShadow='none'">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;">
            <div style="font-size:11px;font-weight:700;color:${isCruise?'#1d4ed8':'#999'};">${day}</div>
            <div style="font-size:9px;font-weight:700;color:${cellBorder};text-align:right;">
              ${isCruise?'🚢':''}${hasADR?'🍽️':''}${hasLL?' ⚡':''}
            </div>
          </div>
          ${isCruise?`<div style="font-size:16px;margin:2px 0;">🌊</div><div style="font-size:10px;font-weight:800;color:#1d4ed8;line-height:1.2;">At Sea / Port</div>`:`
          <div style="font-size:18px;margin:2px 0;">${isAulani ? label : ''}</div>
          <div style="font-size:11px;font-weight:800;color:${color};line-height:1.2;">${isAulani ? sublabel : label}</div>`}
          ${notes ? `<div style="font-size:10px;color:#888;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(notes)}</div>` : ''}
          ${!isCruise ? buildCalMealBlock(meals, color, t.mealDefaults||blankMealDefaults(), curSym(t)) : ''}
          ${buildDayActivityBadges(t, d.date, color)}
        </div>`;
      } else {
        cells += `<div style="min-height:90px;border-radius:8px;background:#f9f9f9;border:1px solid #f0f0f0;padding:7px 8px;">
          <div style="font-size:11px;font-weight:700;color:#ccc;">${day}</div>
        </div>`;
      }
    }

    return `
      <div style="margin-bottom:28px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#1a1a2e;margin-bottom:12px;">${monthName}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;">
          ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div style="font-size:10px;font-weight:800;color:#aaa;text-align:center;padding:4px 0;letter-spacing:.05em;">${d}</div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">${cells}</div>
      </div>`;
  }).join('')}</div>`;
}

function buildPlannerView(t) {
  return buildParks(t);  // actual planner below
}

function buildParks(t) {
  const parkOpts = t.tripType === 'dlr' ? [
    {v:'unassigned',l:'— Unassigned —'},
    {v:'dl',l:'🏰 Disneyland Park'},
    {v:'dca',l:'🎡 Disney California Adventure'},
    {v:'dtd',l:'🛍️ Downtown Disney'},
    {v:'rest',l:'😴 Rest Day'},
    {v:'travel',l:'✈️ Travel Day'},
  ] : t.tripType === 'dlp' ? [
    {v:'unassigned',l:'— Unassigned —'},
    {v:'dp',l:'🏰 Disneyland Park'},
    {v:'daw',l:'🚀 Disney Adventure World'},
    {v:'dv',l:'🛍️ Disney Village'},
    {v:'rest',l:'😴 Rest Day'},
    {v:'travel',l:'✈️ Travel Day'},
  ] : [
    {v:'unassigned',l:'— Unassigned —'},
    {v:'mk',l:'🏰 Magic Kingdom'},
    {v:'ep',l:'🌍 EPCOT'},
    {v:'hs',l:'🎬 Hollywood Studios'},
    {v:'ak',l:'🦁 Animal Kingdom'},
    {v:'ds',l:'🛍️ Disney Springs'},
    {v:'wp',l:'💦 Water Park'},
    {v:'rest',l:'😴 Rest Day'},
    {v:'travel',l:'✈️ Travel Day'},
  ];
  const counts = {};       // full park days per park
  const hopParks = {};     // parks that appear as hops (count as 0.5)
  const parksWithHops = new Set(); // primary parks that have hops/events
  let cruiseDays = 0;
  let halfDayEvents = 0;  // MNSSHP and other events (count as 0.5)

  t.parks.forEach(d => {
    if (!d.park || d.park==='unassigned') return;
    // Cruise days — count all together, no breakdown
    if (d.park==='dcl-embark' || d.park==='dcl-sea' || d.park==='dcl-port' || d.park==='dcl-disembark') {
      cruiseDays++;
      // Still count any specialty dining hops on cruise days
      (d.parkHops||[]).forEach(hp => {
        if (hp && !hp.startsWith('event-')) {
          hopParks[hp] = (hopParks[hp]||0) + 0.5;
        }
      });
      return;
    }
    // Rest/Travel days — don't count the day itself, but DO count any park hops
    if (d.park==='rest' || d.park==='travel') {
      (d.parkHops||[]).forEach(hp => {
        if (!hp) return;
        if (hp.startsWith('event-')) {
          halfDayEvents++;
        } else {
          hopParks[hp] = (hopParks[hp]||0) + 0.5;
          parksWithHops.add(hp);
        }
      });
      return;
    }
    // Full park day
    counts[d.park] = (counts[d.park]||0) + 1;
    // Check hops and events for this day
    (d.parkHops||[]).forEach(hp => {
      if (!hp) return;
      if (hp.startsWith('event-')) {
        halfDayEvents++;
        parksWithHops.add(d.park);
      } else {
        hopParks[hp] = (hopParks[hp]||0) + 0.5;
        parksWithHops.add(d.park);
        parksWithHops.add(hp);
      }
    });
  });

  // Calculate total park days (full + 0.5 per hop/event)
  const totalParkDays = Object.values(counts).reduce((a,b)=>a+b,0);
  const totalHopDays  = Object.values(hopParks).reduce((a,b)=>a+b,0);
  const totalEventHalf = halfDayEvents * 0.5;
  const grandTotal = totalParkDays + totalHopDays + totalEventHalf;
  const hasHalfDays = totalHopDays > 0 || totalEventHalf > 0;
  const tripLLCost   = calcTripLLCost(t);
  const tripFoodCost = calcTripFoodCost(t);

  const hasUnassigned = t.parks.filter(d=>d.park==='unassigned').length > 0;
  const isFirstTime   = Object.values(counts).reduce((a,b)=>a+b,0) === 0;

  return `
    ${isFirstTime ? `<div class="tab-hint"><span class="th-icon">💡</span><div><strong>Itinerary</strong> — For each day of your trip, choose which park you'll visit using the dropdown. Then expand the day to plan meals and ${t.tripType==='dlp'?'Premier Access':'Lightning Lane'} selections. Lock a day when it's finalized.</div></div>` : ''}
    <div class="card">
      <div class="card-header" style="justify-content:space-between;flex-wrap:wrap;gap:6px;">
        <span>🗓️ Daily Itinerary</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          ${tripFoodCost>0?`<span class="meal-trip-cost">🍽️ Food Est. ${fmtDual(tripFoodCost,t)}</span>`:''}
          ${tripLLCost>0?`<span class="ll-trip-cost">${t.tripType==='dlp'?'🎫 PA':'⚡ LL'} Est. ${fmtDual(tripLLCost,t)}</span>`:''}
          <button onclick="toggleSwapMode()"
            style="padding:5px 13px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
                   border:2px solid ${S.ui.swapMode?'#7c3aed':'#e4e4f0'};
                   background:${S.ui.swapMode?'#f5f3ff':'#fff'};
                   color:${S.ui.swapMode?'#7c3aed':'#555'};">
            ⇄ ${S.ui.swapMode ? 'Cancel Swap' : 'Swap Days'}
          </button>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;">
        <!-- Per-park pills: merge full days + hop days into one total -->
        ${(()=>{
          // Get all parks that appear in either counts or hopParks
          const allParks = new Set([...Object.keys(counts), ...Object.keys(hopParks)]);
          return [...allParks].map(p => {
            const full = counts[p] || 0;
            const hop  = hopParks[p] || 0;
            const total = full + hop;
            const hasHop = hop > 0;
            const totalStr = total % 1 === 0 ? total : total.toFixed(1);
            const bg    = hasHop ? '#fef9f0' : '#f0f0ff';
            const color = hasHop ? '#92400e' : '#1a1a5e';
            const border = hasHop ? 'border:1px solid #fde68a;' : '';
            return '<div style="background:'+bg+';border-radius:9px;padding:5px 13px;font-size:12px;font-weight:800;color:'+color+';'+border+'">'
              + parkName(p)+' ×'+totalStr+(hasHop?'*':'')
              + '</div>';
          }).join('');
        })()}
        <!-- Cruise days -->
        ${cruiseDays ? `
          <div style="background:#dbeafe;border-radius:9px;padding:5px 13px;font-size:12px;font-weight:800;color:#1e40af;">
            🚢 Cruise ×${cruiseDays}
          </div>` : ''}
        <!-- Summary total -->
        <div style="background:#f0fdf4;border-radius:9px;padding:5px 13px;font-size:12px;font-weight:800;color:#16a34a;">
          🎢 ${grandTotal % 1 === 0 ? grandTotal : grandTotal.toFixed(1)} park day${grandTotal!==1?'s':''}${hasHalfDays?' <span style="font-size:10px;font-weight:600;color:#6b7280;">(*hops & events = ½ day)</span>':''}
        </div>
        ${hasUnassigned?`
          <div style="background:#fff7ed;border-radius:9px;padding:5px 13px;font-size:12px;font-weight:800;color:#c2410c;">
            ⚠️ ${t.parks.filter(d=>d.park==='unassigned').length} unassigned
          </div>`:''}
      </div>

      ${S.ui.swapMode ? `
      <div style="background:#f5f3ff;border:2px solid #a78bfa;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span style="font-size:16px;">⇄</span>
        <div style="flex:1;">
          <div style="font-weight:800;color:#7c3aed;font-size:13px;">Swap Mode</div>
          <div style="font-size:12px;color:#8b5cf6;margin-top:2px;">
            ${S.ui.swapSelected.length===0 ? 'Click a day to select it as the first day to swap.' :
              S.ui.swapSelected.length===1 ? 'Now click a second day to swap with Day '+(S.ui.swapSelected[0]+1)+'.' :
              'Swapping…'}
          </div>
        </div>
        <button onclick="toggleSwapMode()"
          style="background:#7c3aed;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;">
          ✕ Cancel
        </button>
      </div>` : ''}
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${t.parks.map((day,i) => buildDayRow(day,i,t,parkOpts)).join('')}
      </div>
    </div>
  `;
}

// --- Per-Day Row Builder -----------------------------
function calcEETime(park) {
  const ph = SEPT_PARK_HOURS[park] || DLP_PARK_HOURS[park] || DLR_PARK_HOURS[park];
  if (!ph) return '08:30';
  const m = ph.open.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return '08:30';
  let h=parseInt(m[1]),mn=parseInt(m[2]);
  const pm=m[3].toUpperCase()==='PM';
  if(pm&&h!==12)h+=12; if(!pm&&h===12)h=0;
  const tot=h*60+mn-30;
  return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function isEEHDay(park, dateStr) {
  const eeh = EXTENDED_EVENING_HOURS[park];
  if (!eeh) return false;
  return new Date(dateStr+'T12:00:00').getDay() === eeh.dayOfWeek;
}
function buildEEChip(dayExtras, park, i) {
  const ph = SEPT_PARK_HOURS[park] || DLP_PARK_HOURS[park] || DLR_PARK_HOURS[park];
  const eeAuto = calcEETime(park);
  const eeTime = dayExtras.earlyEntryTime || eeAuto;
  const on = dayExtras.earlyEntry ? 'on' : '';

function buildEEHChip(dayExtras, park, dateStr, i) {
  const eeh = EXTENDED_EVENING_HOURS[park];

  const label = eeh ? eeh.label : 'Extended Hours';
  const note  = eeh ? eeh.note : 'DVC & Deluxe Resort guests';
  let html = '<span class="day-extra-chip" '
    + 'onclick="toggleDayExtra('+i+',\'bonusHours\')"' + ' '
    + 'title="'+note+'" '
    + 'style="background:'+(on?'#0c4a6e':'#f0f9ff')+';color:'+(on?'#7dd3fc':'#0369a1')+';border-color:'+(on?'#0369a1':'#bae6fd')+';">'
    + '✨ '+label+(on?' · '+fmt12(start):'')+'</span>';
  if (on) {
    html += '<input type="time" value="'+start+'" '
      + 'onchange="updDayExtra('+i+',\'bonusHoursStart\',this.value)" '

  }
  return html;
}

function buildLockedDayCard(day, i, t, parkOpts, llCost, mealCost, cruiseDay) {
  const isSwapMode     = S.ui.swapMode;

  const parkHops = day.parkHops || [];
  const dayExtras= day.dayExtras || blankDayExtras();
  const isDlpDay = !!PA_DATA[day.park];
  const ll       = day.ll || (isDlpDay ? blankPA() : blankLL());
  const meals    = day.meals || blankMeals();
  const md       = t.mealDefaults || blankMealDefaults();
  const totalDay = llCost + mealCost;
  const sym      = curSym(t);

  // -- Park badges --
  const allParks = [day.park, ...parkHops.filter(Boolean)];
  const parkBadges = allParks.filter(p=>p&&p!=='rest'&&p!=='unassigned').map(p=>

  // -- Extras badges --

    dayExtras.earlyEntry ? `<span class="sbadge" style="background:#fef9c3;color:#854d0e;">🌅 Magic Morning</span>` : '',
    dayExtras.lateStay   ? `<span class="sbadge" style="background:#e0f2fe;color:#075985;">🌙 Late Stay</span>` : '',
    dayExtras.afterHours ? `<span class="sbadge" style="background:#fae8ff;color:#701a75;">🎉 After Hours</span>` : '',

  // -- LL / Premier Access summary --
  let llSummary = '';
  if (isDlpDay && ll.passType !== 'none') {
    const passLabel = ll.passType === 'ultimate' ? '👑 Ultimate' : '🎫 Premier Access One';
    const picks = ll.passType === 'one' ? (ll.oneSelected||[]) : [];
    llSummary = `<div class="day-locked-section">

  } else if (!isDlpDay && ll.passType !== 'none') {
    const ps = (ll.partySize != null) ? ll.partySize : (t.partySize || 4);
    const pd = LL_DATA[day.park];
    const passLabel = ll.passType === 'multi' ? '⚡ LLMP' : '👑 Premier';

    if (ll.passType === 'multi') {
      if (ll.tier1Pick) picks.push(ll.tier1Pick);
      (ll.tier2Picks||[]).forEach(r => picks.push(r));
    }
    (ll.illSelected||[]).forEach(name => picks.push(`${name} (ILL)`));
    llSummary = `<div class="day-locked-section">
      <span class="day-locked-section-label">⚡ LL</span>
      <span style="font-weight:700;">${passLabel}</span>
      ${picks.map(p=>`<span style="background:#ede9fe;color:#4c1d95;border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700;">${esc(p)}</span>`).join('')}
      ${llCost>0?`<span style="font-weight:800;color:#7c3aed;">${sym}${llCost.toLocaleString()}</span>`:''}
    </div>`;
  }

  // -- Meals summary --
  const mealItems = ['breakfast','lunch','dinner','snacks'].map(key => {
    const m = meals[key] || {};
    const place = m.place || '';
    const cost  = (m.cost != null) ? m.cost : (md[key] || 0);

    <span class="day-locked-section-label">🍽️ Meals</span>
    ${mealItems.join('')}

  return `
    <div class="day-locked-card" style="background:${bg};border-left:4px solid ${parkColor(day.park)};${isSwapSelected?'box-shadow:0 0 0 3px #7c3aed;':''}">
      <div class="day-locked-header" style="background:${bg};">
        <div style="text-align:center;min-width:40px;cursor:${isSwapMode?'pointer':'default'};"

            ? `<div style="width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;

               <div style="font-size:18px;font-weight:900;color:#1a1a5e;">${day.dayNum}</div>
               <button onclick="toggleDayLock(${i})" title="Click to unlock"
                 style="margin-top:4px;width:34px;height:22px;border-radius:5px;border:1px solid #1a1a5e;
                        background:#1a1a5e;cursor:pointer;
                        display:flex;align-items:center;justify-content:center;color:#FFD700;">
                 ${LOCK_CLOSED_SVG}
               </button>`}
        </div>
        <span style="font-size:11px;font-weight:700;color:#999;white-space:nowrap;">${fmtDateShort(day.date)}</span>
        ${parkBadges || `<span class="park-badge p-rest">${parkName(day.park)}</span>`}
        ${extrasBadges}
        ${totalDay>0?`<span style="font-size:12px;font-weight:900;color:#1a1a5e;background:rgba(255,255,255,.7);border-radius:8px;padding:2px 9px;">💰 ${fmtDual(totalDay,t)}</span>`:''}
      </div>
      ${llSummary}
      ${mealsSummary}
      ${day.notes?`<div style="padding:5px 14px 8px;font-size:12px;color:#777;font-style:italic;">📝 ${esc(day.notes)}</div>`:''}
      ${(()=>{
        var acts = getDayActivities(t, day.date);
        if (!acts.length) return '';
        var color = parkColor(day.park)||'#1a1a5e';
        var html = '<div style="padding:4px 14px 8px;display:flex;flex-wrap:wrap;gap:4px;">';
        acts.forEach(function(e) {
          html += '<span style="font-size:11px;background:'+color+'15;color:'+color+';border-radius:6px;padding:2px 8px;font-weight:700;">'
                + (e.icon||'📌')+' '+(e.label||e.title||'')+(e.time?' · '+fmt12(e.time):'')+'</span>';

// Escape for JS string literals inside HTML event attributes
function jsEsc(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function calcDayLLCost(day, t) {
  const park = day.park;
  if (PA_DATA[park]) return calcDayPACost(day, t);
  const ll = day.ll;
  const pd = LL_DATA[park];
  if (!pd || !ll) return 0;
  const ps = (ll.partySize != null) ? ll.partySize : (t?.partySize || 4);
  let total = 0;
  if (ll.passType === 'multi') {
    total += (ll.llmpPrice||20) * ps;
    (ll.illSelected||[]).forEach(name => {
      const price = (ll.illPrices||{})[name] ?? (pd.ill.find(r=>r.name===name)?.price||0);
      total += price * ps;
    });
  } else if (ll.passType === 'premier') {
    total += (ll.premierPrice||150) * ps;
  } else {
    (ll.illSelected||[]).forEach(name => {
      const price = (ll.illPrices||{})[name] ?? (pd.ill.find(r=>r.name===name)?.price||0);
      total += price * ps;
    });
  }
  return total;
}

// Disneyland Paris — Premier Access cost calculation
function calcDayPACost(day, t) {
  const pa = day.ll;
  const pd = PA_DATA[day.park];
  if (!pd || !pa) return 0;
  const ps = (pa.partySize != null) ? pa.partySize : (t?.partySize || 4);
  let total = 0;
  if (pa.passType === 'ultimate') {
    const tier = PA_ULTIMATE_TIERS.find(x=>x.key===(pa.ultimateTier||'mid')) || PA_ULTIMATE_TIERS[1];
    const price = (pa.ultimatePrice != null) ? pa.ultimatePrice : tier.price;
    total += price * ps;
  } else if (pa.passType === 'one') {
    (pa.oneSelected||[]).forEach(name => {
      const ride = pd.rides.find(r=>r.name===name);
      const price = (pa.onePrices||{})[name] ?? (ride ? ride.priceOne : 0);
      total += price * ps;
    });
  }
  return total;
}

function calcTripLLCost(t) {
  return (t.parks||[]).reduce((s,day) => s + calcDayLLCost(day, t), 0);
}

// Dispatch to the right skip-the-line UI section based on park
function buildSkipLineSection(day, i, t) {
  return PA_DATA[day.park] ? buildPASection(day, i, t) : buildLLSection(day, i, t);
}

function buildPASection(day, i, t) {

  if (!pd) return '';
  const pa = day.ll || blankPA();
  const ps = (pa.partySize != null) ? pa.partySize : (t.partySize || 4);
  const passType = pa.passType || 'none';

      ${dayCost>0?`<div style="background:#6b21a8;color:#FFD700;border-radius:18px;padding:3px 11px;font-size:12px;font-weight:800;">Est. ${fmtDual(dayCost,t)}</div>`:''}

    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">

  if (passType !== 'none') {
