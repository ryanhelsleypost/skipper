// FIX: preserve existing park assignments when dates change
function updateDates(field,val) {
  const t=trip(); const updates={[field]:val};
  const start=field==='startDate'?val:t.startDate;
  const end  =field==='endDate'  ?val:t.endDate;
  if (start&&end) {
    // Build lookup of existing assignments keyed by date string
    const existing={};
    (t.parks||[]).forEach(d=>{ existing[d.date]=d; });
    const newDays = makeParkDays(start,end,t.parkDays,t.tripType);
    updates.parks = newDays.map((day,i) => {
      if (existing[day.date]) {
        // Keep existing assignment; just update dayNum
        return {...existing[day.date], dayNum:i+1};
      }
      return day; // new day gets default
    });
  }
  patchTrip(updates); render();
}

// FIX: preserve park assignments when count changes
function updateParkDaysCount(count) {
  const t=trip();
  const parks=t.parks.map((d,i)=>({
    ...d,
    park: i<count
      ? (d.park==='rest'||d.park==='travel'?'unassigned':d.park) // was rest → unassigned; keep any real assignment
      : 'rest'
  }));
  patchTrip({parkDays:count,parks}, true); render();
}

function rosDropAfterSOD(ev, date) {
  if (!_rosDragKey) return;
  const container = document.getElementById('ros-day-'+date);
  if (!container) { _rosDragKey = null; return; }
  const els  = [...container.querySelectorAll('[data-ekey]')];
  // Filter out sentinels from keys
  let keys = els.map(el => el.getAttribute('data-ekey'))
                .filter(k => k !== 'sentinel|sod' && k !== 'sentinel|eod');
  const fromIdx = keys.indexOf(_rosDragKey);
  if (fromIdx !== -1) keys.splice(fromIdx, 1);
  keys.unshift(_rosDragKey); // move to top
  _saveRosOrder(date, keys);
}
function rosDropBeforeEOD(ev, date) {
  if (!_rosDragKey) return;
  const container = document.getElementById('ros-day-'+date);
  if (!container) { _rosDragKey = null; return; }
  const els  = [...container.querySelectorAll('[data-ekey]')];
  let keys = els.map(el => el.getAttribute('data-ekey'))
                .filter(k => k !== 'sentinel|sod' && k !== 'sentinel|eod');
  const fromIdx = keys.indexOf(_rosDragKey);
  if (fromIdx !== -1) keys.splice(fromIdx, 1);
  keys.push(_rosDragKey); // move to bottom
  _saveRosOrder(date, keys);
}
function _saveRosOrder(date, keys) {
  const t = trip();
  const rosOverrides = JSON.parse(JSON.stringify(t.rosOverrides||{}));
  if (!rosOverrides[date]) rosOverrides[date] = {};
  keys.forEach((k,i) => {
    if (!rosOverrides[date][k]) rosOverrides[date][k] = {};
    rosOverrides[date][k].order = i + 1; // +1 to leave room for SOD at 0
  });
  _rosDragKey = null; _rosDragDate = null;
  patchTrip({ rosOverrides }, true); render();
}
function rosDropToEnd(ev, date) {
  ev.preventDefault();
  if (!_rosDragKey || _rosDragDate !== date) return;
  const container = document.getElementById('ros-day-'+date);
  if (!container) { _rosDragKey = null; return; }
  const els  = [...container.querySelectorAll('[data-ekey]')];
  const keys = els.map(el => el.getAttribute('data-ekey'));
  const fromIdx = keys.indexOf(_rosDragKey);
  if (fromIdx === -1) { _rosDragKey = null; return; }
  // Move to end
  keys.splice(fromIdx, 1);
  keys.push(_rosDragKey);
  const t = trip();
  const rosOverrides = JSON.parse(JSON.stringify(t.rosOverrides||{}));
  if (!rosOverrides[date]) rosOverrides[date] = {};
  keys.forEach((k,i) => {
    if (!rosOverrides[date][k]) rosOverrides[date][k] = {};
    rosOverrides[date][k].order = i;
  });
  _rosDragKey = null; _rosDragDate = null;
  patchTrip({ rosOverrides }, true); render();
}

function createTrip() {
  const {data}=S.wizard;
  if (!data.name?.trim()){alert('Please enter a trip name');S.wizard.step=1;render();return;}
  const start=data.startDate||new Date().toISOString().split('T')[0];
  const end  =data.endDate||start;

  // Auto-calculate park days: total days minus cruise days
  const totalDays=Math.ceil((new Date(end)-new Date(start))/86400000)+1;
  let parkDays=totalDays;
  if (data.cruise&&data.cruiseStartDate&&data.cruiseEndDate) {
    const cruiseDays=Math.ceil((new Date(data.cruiseEndDate)-new Date(data.cruiseStartDate))/86400000)+1;
    parkDays=Math.max(0,totalDays-cruiseDays);
  }

function syncPushNow(){
  if(!SYNC.ref)return;
  SYNC.localStamp=Date.now();
  localStorage.setItem('skipper_sync_stamp',String(SYNC.localStamp));
  var payload=JSON.parse(JSON.stringify({updatedAt:SYNC.localStamp,clientId:SYNC.clientId,app:'skipper',trips:S.trips,currentTripId:S.currentTripId}));
  SYNC.ref.set(payload).then(function(){syncSetStatus('synced');}).catch(function(e){syncSetStatus('error',e.message);});
}
function syncQueuePush(){
  if(!SYNC.ref||SYNC.applying)return;
  syncSetStatus('connecting');
  clearTimeout(SYNC.debounce);
  // If we just woke from background, wait briefly for the fresh cloud snapshot
  // so a stale device can never overwrite changes made elsewhere while it slept.
  var wait=(SYNC.resumeHold&&Date.now()-SYNC.resumeHold<4000)?(4000-(Date.now()-SYNC.resumeHold)+300):700;
  SYNC.debounce=setTimeout(syncPushNow,wait);
}
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){SYNC.resumeHold=Date.now();}
});
function syncInit(){
  if(!SYNC.cfg||!SYNC.code){syncSetStatus('off');return;}
  if(typeof firebase==='undefined'){syncSetStatus('error','Firebase SDK didn\'t load (offline?)');return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(SYNC.cfg);
    if(SYNC.ref)SYNC.ref.off();
    SYNC.ref=firebase.database().ref('ledgers/'+SYNC.code);
    syncSetStatus('connecting');
    SYNC.ref.on('value',function(snap){
      var v=snap.val();
      if(v===null){syncPushNow();return;} // cloud empty — seed with this device
      if(v.app!=='skipper'||!v.trips){ // that code belongs to a different app (e.g. Heath)
        syncSetStatus('error','This sync code is already used by a different app — pick a different code for Skipper Tripper.');
        SYNC.ref.off();SYNC.ref=null;return;
      }
      SYNC.resumeHold=null; // fresh snapshot received — safe to push again
      if(v.clientId===SYNC.clientId&&(v.updatedAt||0)<=SYNC.localStamp){syncSetStatus('synced');return;} // our own echo
      if((v.updatedAt||0)>SYNC.localStamp){syncApplyRemote(v);}
      else if((v.updatedAt||0)<SYNC.localStamp){syncPushNow();return;}
      syncSetStatus('synced');
    },function(err){syncSetStatus('error',err.message);});
  }catch(e){syncSetStatus('error',e.message);}
}
function syncGenCode(){
  var chars='abcdefghjkmnpqrstuvwxyz23456789';var out='';

function parseFbConfig(txt){
  var keys=['apiKey','authDomain','databaseURL','projectId','storageBucket','messagingSenderId','appId'];
  var cfg={};
  keys.forEach(function(k){
    // accept both  apiKey: "..."  and  "apiKey": "..."  styles
    var m=txt.match(new RegExp('["\']?'+k+'["\']?\\s*[:=]\\s*["\']([^"\']+)["\']'));
    if(m)cfg[k]=m[1];
  });
  return cfg;
}

function syncSaveAndConnect(){
  var txt=document.getElementById('sy-cfg')?.value||'';
  var cfg=parseFbConfig(txt);
  var dbUrl=(document.getElementById('sy-dburl')?.value||'').trim();
  if(dbUrl)cfg.databaseURL=dbUrl;
  if(!cfg.apiKey||!cfg.databaseURL)cfg=DEFAULT_FB_CONFIG; // built in — most people only need the code
  var code=(document.getElementById('sy-code')?.value||'').trim().toLowerCase(); // case-insensitive: phones auto-capitalize
  if(!code||code.length<8){alert('Sync code must be at least 8 characters — use 🎲 Generate for a strong one.');return;}
  if(code!==SYNC.code){
    // Connecting to a (new or different) code: defer to whatever the cloud already has.
    SYNC.localStamp=0;
    localStorage.setItem('skipper_sync_stamp','0');
  }
  SYNC.cfg=cfg;SYNC.code=code;
  localStorage.setItem('skipper_sync',JSON.stringify({cfg:SYNC.cfg,code:SYNC.code}));
  closeSyncModal();
  syncInit();
}
function syncDisconnect(){

}
