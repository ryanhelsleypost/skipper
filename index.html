      const effectivePrice = pa.ultimatePrice != null ? pa.ultimatePrice : tierObj.price;
      html += `<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;">Season</span>
        ${PA_ULTIMATE_TIERS.map(tr=>`<button class="ll-pass-btn${curTier===tr.key?' active':''}" style="padding:4px 10px;font-size:11px;" onclick="setPAUltimateTier(${i},'${tr.key}')">${tr.label} (${fmtDualPlain(tr.price,t)})</button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;">${sym}/pp/day</span>
        <input type="number" value="${effectivePrice}" min="1" max="999"
          onchange="updPAUltimatePrice(${i},parseFloat(this.value)||${tierObj.price})"
          style="width:68px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;font-size:13px;text-align:center;font-family:inherit;">
        ${eurHint(effectivePrice,t)}
      </div>`;
    }
    html += `</div>`;
  }

  if (passType === 'ultimate') {
    const ultimateRides = pd.rides.filter(r=>r.ultimate);
    html += `<div style="background:#ddd6fe;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:700;color:#4c1d95;margin-bottom:8px;">
      👑 <strong>Ultimate covers one ride each on ${ultimateRides.length} attractions</strong> at ${pd.name} — no individual selections needed.
    </div>
    <div style="background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #ddd6fe;font-size:12px;color:#555;">
      ${ultimateRides.map(r=>`<div style="padding:3px 0;">⭐ ${esc(r.name)}</div>`).join('')}
    </div>`;
  }

  if (passType === 'one') {

    pd.rides.forEach((ride,ri) => {
      const checked = (pa.oneSelected||[]).includes(ride.name);
      const price = (pa.onePrices||{})[ride.name] ?? ride.priceOne;
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #fef9c3;">
        <label class="ll-ride-label" style="flex:1;margin:0;">
          <input type="checkbox" ${checked?'checked':''}

function buildLLSection(day, i, t) {
  const park = day.park;
  const pd = LL_DATA[park];
  if (!pd) return '';
  const ll = day.ll || blankLL();
  const ps = (ll.partySize != null) ? ll.partySize : (t.partySize || 4);
  const passType = ll.passType || 'none';
  const dayCost = calcDayLLCost(day, t);

  // -- Pass type selector --
  let html = `<div class="ll-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:13px;font-weight:900;color:#6b21a8;">⚡ Lightning Lane Planning</div>
      ${dayCost>0?`<div style="background:#6b21a8;color:#FFD700;border-radius:18px;padding:3px 11px;font-size:12px;font-weight:800;">Est. $${dayCost.toLocaleString()}</div>`:''}
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">
      <button class="ll-pass-btn${passType==='none'?' active':''}" onclick="setLLPassType(${i},'none')">❌ None</button>
      <button class="ll-pass-btn${passType==='multi'?' active':''}" onclick="setLLPassType(${i},'multi')">⚡ Lightning Lane Multi Pass</button>
      <button class="ll-pass-btn${passType==='premier'?' active':''}" onclick="setLLPassType(${i},'premier')">👑 Premier Pass</button>
    </div>`;

  if (passType !== 'none') {
    // Party size + price
    html += `<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:10px;background:#ede9fe;border-radius:8px;padding:9px 12px;">
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;">Party Size</span>
        <input type="number" value="${ps}" min="1" max="20"
          onchange="updLL(${i},'partySize',parseInt(this.value)||1)"
          style="width:52px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;font-size:13px;text-align:center;font-family:inherit;">
      </div>`;
    if (passType === 'multi') {
      html += `<div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;">LLMP $/pp/day</span>
        <input type="number" value="${ll.llmpPrice||20}" min="1" max="99"
          onchange="updLL(${i},'llmpPrice',parseFloat(this.value)||20)"
          style="width:60px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;font-size:13px;text-align:center;font-family:inherit;">
        <span style="font-size:11px;color:#9333ea;">(range $16–$45)</span>
      </div>`;
    } else {
      html += `<div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;">Premier $/pp/day</span>
        <input type="number" value="${ll.premierPrice||150}" min="1" max="999"
          onchange="updLL(${i},'premierPrice',parseFloat(this.value)||150)"
          style="width:68px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;font-size:13px;text-align:center;font-family:inherit;">
        <span style="font-size:11px;color:#9333ea;">(range $119–$449)</span>
      </div>`;
    }
    html += `</div>`;
  }

  // -- Ride selections (LLMP only) --
  if (passType === 'multi') {
    if (pd.tiered) {
      // Tier 1 — pick exactly 1
      html += `<span class="ll-label">Tier 1 — Pick 1 (highest demand rides)</span><div style="background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #ddd6fe;">`;
      pd.tier1.forEach((ride,ri) => {
        const checked = ll.tier1Pick === ride;
        html += `<label class="ll-ride-label">
          <input type="radio" name="ll-t1-${i}" value="${ri}" ${checked?'checked':''}
            onchange="setLLTier1(${i},${ri})" style="width:auto;accent-color:#6b21a8;cursor:pointer;">
          <span>${esc(ride)}</span>
          <span class="ll-t1">Tier 1</span>
        </label>`;
      });
      html += `</div>`;

      // Tier 2 — pick up to 2 (total max 3 with tier 1)
      const t2max = ll.tier1Pick ? 2 : 3;
      const t2count = (ll.tier2Picks||[]).length;
      html += `<span class="ll-label" style="margin-top:8px;">Tier 2 — Pick up to ${t2max} ${ll.tier1Pick?'(1 Tier 1 + 2 Tier 2 = 3 max)':'(or up to 3 if no Tier 1)'}</span>
        <div style="background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #ddd6fe;">`;
      pd.tier2.forEach((ride,ri) => {
        const checked = (ll.tier2Picks||[]).includes(ride);
        const disabled = !checked && t2count >= t2max;
        html += `<label class="ll-ride-label" style="opacity:${disabled?0.45:1};cursor:${disabled?'default':'pointer'};">
          <input type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''}
            onchange="toggleLLTier2(${i},${ri},this.checked)" style="width:auto;accent-color:#6b21a8;cursor:${disabled?'default':'pointer'};">
          <span>${esc(ride)}</span>
          <span class="ll-t2">Tier 2</span>
        </label>`;
      });
      html += `</div>`;
    } else {
      // AK — no tiers, pick up to 3
      const akcount = (ll.tier2Picks||[]).length;
      html += `<span class="ll-label">LLMP Rides — Pick up to 3</span>
        <div style="background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #ddd6fe;">`;
      (pd.llmp||[]).forEach((ride,ri) => {
        const checked = (ll.tier2Picks||[]).includes(ride);
        const disabled = !checked && akcount >= 3;
        html += `<label class="ll-ride-label" style="opacity:${disabled?0.45:1};cursor:${disabled?'default':'pointer'};">
          <input type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''}
            onchange="toggleLLTier2(${i},${ri},this.checked)" style="width:auto;accent-color:#6b21a8;cursor:${disabled?'default':'pointer'};">
          <span>${esc(ride)}</span>
        </label>`;
      });
      html += `</div>`;
    }
  }

  if (passType === 'premier') {
    html += `<div style="background:#ddd6fe;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:700;color:#4c1d95;">
      👑 <strong>Premier Pass covers ALL rides in the park</strong> — including Individual Lightning Lane (ILL) upcharges. No individual selections needed.
    </div>`;
  }

  // -- ILL upcharge rides (shown for None and Multi; Premier includes them) --
  if (pd.ill && pd.ill.length > 0 && passType !== 'premier') {
    html += `<span class="ll-label" style="margin-top:10px;">⭐ Individual Lightning Lane (ILL) — Upcharge Rides</span>
      <div style="font-size:11px;color:#777;margin-bottom:5px;">${passType==='multi'?'Charged separately on top of Multi Pass. ':''}Premier Pass includes these at no added cost.</div>
      <div style="background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #fde68a;">`;
    pd.ill.forEach((illRide,ri) => {
      const checked = (ll.illSelected||[]).includes(illRide.name);
      const price = (ll.illPrices||{})[illRide.name] ?? illRide.price;
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #fef9c3;">
        <label class="ll-ride-label" style="flex:1;margin:0;">
          <input type="checkbox" ${checked?'checked':''}
            onchange="toggleILL(${i},${ri},this.checked)" style="width:auto;accent-color:#6b21a8;cursor:pointer;">
          <span>${esc(illRide.name)}</span>
          <span class="ll-ill">ILL</span>
        </label>
        <span style="font-size:11px;color:#777;flex-shrink:0;">$/pp:</span>
        <input type="number" value="${price}" min="1" max="99" class="ll-ill-price"
          onchange="updILLPrice(${i},${ri},parseFloat(this.value)||${illRide.price})">
      </div>`;
    });
    html += `</div>`;
  }

  // -- Cost summary --
  const costLines = [];
  let total = 0;
  if (passType === 'multi') {
    const base = (ll.llmpPrice||20)*ps;
    costLines.push(`LLMP: $${ll.llmpPrice||20} × ${ps} = <strong>$${base}</strong>`);
    total += base;
    (ll.illSelected||[]).forEach(name => {
      const price = (ll.illPrices||{})[name] ?? (pd.ill.find(r=>r.name===name)?.price||0);
      const c = price * ps;
      costLines.push(`ILL ${name}: $${price} × ${ps} = <strong>$${c}</strong>`);
      total += c;
    });
  } else if (passType === 'premier') {
    const base = (ll.premierPrice||150)*ps;
    costLines.push(`Premier Pass: $${ll.premierPrice||150} × ${ps} = <strong>$${base}</strong>`);
    total += base;
  } else if ((ll.illSelected||[]).length > 0) {
    (ll.illSelected||[]).forEach(name => {
      const price = (ll.illPrices||{})[name] ?? (pd.ill.find(r=>r.name===name)?.price||0);
      const c = price * ps;
      costLines.push(`ILL ${name}: $${price} × ${ps} = <strong>$${c}</strong>`);
      total += c;
    });
  }

  if (costLines.length > 0) {
    html += `<div class="ll-cost-box">
      ${costLines.map(l=>`<div style="margin-bottom:3px;">💰 ${l}</div>`).join('')}
      <div style="font-size:14px;font-weight:900;color:#FFD700;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.2);">
        Day Total: $${total.toLocaleString()}
      </div>
    </div>`;
  }

  // Booking tips
  html += `<div style="margin-top:10px;font-size:11px;color:#9333ea;background:#ede9fe;border-radius:7px;padding:8px 11px;line-height:1.7;">
    📋 <strong>Booking Rules:</strong> Resort guests book 7 days ahead · Offsite 3 days · Opens 7:00 AM ET · Max 3 active LLMP at once · Can add more after each is used
  </div>`;

  html += `</div>`;
  return html;
}

// MEALS SECTION

function calcDayFoodCost(day, t) {
  const md      = (t && t.mealDefaults) || blankMealDefaults();
  const meals   = day.meals || blankMeals();
  const cruise  = isCruiseDay(day, t);
  return ['breakfast','lunch','dinner','snacks'].reduce((s, type) => {
    const m   = meals[type] || {};
    const def = cruise ? 0 : (md[type] || 0); // cruise days default to $0
    return s + (m.cost !== null && m.cost !== undefined ? m.cost : def);
  }, 0);
}

function calcTripFoodCost(t) {
  return (t.parks || []).reduce((s, day) => s + calcDayFoodCost(day, t), 0);
}

function buildMealsSection(day, i, t) {
  const meals    = day.meals || blankMeals();

  const park     = day.park;
  const sugs     = DCL_RESTAURANTS[park] || PARK_RESTAURANTS[park] || {};
  const cruise   = isCruiseDay(day, t);
  const dayTotal = calcDayFoodCost(day, t);
  const sym      = curSym(t);

  const mealTypes = [
    { key:'breakfast', icon:'🥞', label:'Breakfast' },
    { key:'lunch',     icon:'🥙', label:'Lunch' },
    { key:'dinner',    icon:'🍽️', label:'Dinner' },
    { key:'snacks',    icon:'🍦', label:'Snacks' }

  let html = `<div class="meal-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">

      <div style="background:#15803d;color:#FFD700;border-radius:18px;padding:3px 11px;font-size:12px;font-weight:800;">${fmtDual(dayTotal,t)}</div>
    </div>`;

  if (cruise) {
    html += `<div style="font-size:11px;color:#1e40af;background:#dbeafe;border-radius:7px;padding:6px 10px;margin-bottom:9px;">

    html += `<div style="font-size:11px;color:#15803d;background:#dcfce7;border-radius:7px;padding:6px 10px;margin-bottom:9px;">

          <input type="checkbox" ${meal.adrRequired?'checked':''} style="width:auto;cursor:pointer;accent-color:#15803d;"

      </div>
    </div>`;
  });

  html += `<div style="display:flex;justify-content:flex-end;margin-top:9px;padding-top:6px;border-top:2px solid #bbf7d0;">
    <div style="font-size:14px;font-weight:900;color:#15803d;">Day Food Total: ${fmtDual(dayTotal,t)}</div>

  return html;
}

function diningStatusClass(s) {
  if (s==='confirmed') return 's-confirmed';

}

  if (s==='confirmed')  return '✅ Confirmed';

}

function isCruiseDay(day, t) {
  if (!t.cruise || !t.cruiseStartDate || !t.cruiseEndDate) return false;
  return day.date >= t.cruiseStartDate && day.date <= t.cruiseEndDate;
}

// -- Time format helper --
function fmtTimeTo12(t24) {
  if (!t24) return '—';
  const [h,m] = t24.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}

// -- Activity management handlers --
function toggleAddActivity(i) {
  S.ui.addActivityDay = S.ui.addActivityDay===i ? null : i;
  // Auto-expand the row when add picker opens
  if (S.ui.addActivityDay === i) S.ui.expandedMealDay = i;
  render();
}
function addActivity(i, actId) {
  const t = trip();
  const days = [...(t.activityDays||[])];
  const day = {...days[i]};
  const acts = [...(day.activities || (day.activity?[day.activity]:['pool']))];
  if (!acts.includes(actId)) acts.push(actId);
  day.activities = acts;
  days[i] = day;
  S.ui.addActivityDay = null;
  patchTrip({ activityDays: days }, true); render();
}
function removeActivity(i, ai) {
  const t = trip();
  const days = [...(t.activityDays||[])];
  const day = {...days[i]};
  const acts = [...(day.activities || [])];
  if (acts.length > 1) acts.splice(ai, 1);
  day.activities = acts;
  days[i] = day;
  patchTrip({ activityDays: days }, true); render();
}
function updOffsiteDestination(i, val) {
  const t = trip();
  const days = [...(t.activityDays||[])];
  days[i] = { ...days[i], offsiteDetail: val, offsiteCustom: '' };
  patchTrip({ activityDays: days }, true); render();
}
function calcOffsiteLeaveTime(i) {
  const t = trip();
  const days = [...(t.activityDays||[])];
  const day = {...days[i]};
  if (!day.exStartTime) { days[i]=day; patchTrip({activityDays:days}, true); render(); return; }
  const [h,m] = day.exStartTime.split(':').map(Number);
  const startMins = h*60+m;
  const drive   = parseInt(day.exDriveMin)||0;
  const buffer  = parseInt(day.exBufferMin)||0;
  const ready   = parseInt(day.exReadyMin)||60;
  const arriveMins = startMins - buffer;
  const departMins = arriveMins - drive;
  const wakeMins   = departMins - ready;
  day.offsiteArriveTime = fmtTimeTo12(`${String(Math.floor(((arriveMins%1440)+1440)%1440/60)).padStart(2,'0')}:${String(((arriveMins%1440)+1440)%1440%60).padStart(2,'0')}`);
  day.offsiteDepartTime = fmtTimeTo12(`${String(Math.floor(((departMins%1440)+1440)%1440/60)).padStart(2,'0')}:${String(((departMins%1440)+1440)%1440%60).padStart(2,'0')}`);
  day.offsiteWakeTime   = fmtTimeTo12(`${String(Math.floor(((wakeMins%1440)+1440)%1440/60)).padStart(2,'0')}:${String(((wakeMins%1440)+1440)%1440%60).padStart(2,'0')}`);
  days[i] = day;
  patchTrip({ activityDays: days }, true); render();
}

// -- Activity day handlers --
function toggleActivityDay(i) {
  S.ui.expandedMealDay = S.ui.expandedMealDay === i ? null : i;
  render();
}
function updActivityDay(i, field, val) {
  const t = trip();
  const days = [...(t.activityDays||[])];
  days[i] = { ...days[i], [field]: val };
  patchTrip({ activityDays: days }, true); render();
}
function updActivityMeal(dayIdx, meal, field, val) {
  const t = trip();
  const days = [...(t.activityDays||[])];
  const day = { ...days[dayIdx] };
  day.meals = { ...(day.meals||blankMeals()) };
  day.meals[meal] = { ...(day.meals[meal]||{}), [field]: val };
  days[dayIdx] = day;
  patchTrip({ activityDays: days }, true); render();
}

// Compute all key milestone dates for a trip
function buildMilestones(t) {
  const start = t.startDate ? new Date(t.startDate + 'T00:00:00') : null;
  const today = new Date(); today.setHours(0,0,0,0);
  const milestones = [];

  function addDate(label, date, icon, note, category, urgent) {
    if (!date || isNaN(date)) return;
    const daysAway = Math.ceil((date - today) / 86400000);
    milestones.push({ label, date, daysAway, icon, note, category, urgent: urgent||false, past: daysAway < 0 });
  }

  if (!start) return milestones;

  // -- WDW-specific ------------------------------
  if (t.tripType === 'wdw') {
    // ADR window: 60 days before check-in for resort guests
    const adr = new Date(start); adr.setDate(adr.getDate() - 60);
    addDate('🍽️ ADR Dining Reservations Open', adr, '🍽️',
      '60 days before check-in — book Cinderella\'s Royal Table, Be Our Guest, etc. at 7am ET', 'Dining', true);

    // Lightning Lane Multi-Pass: available at midnight before trip for resort guests
    const llmp = new Date(start); llmp.setDate(llmp.getDate() - 3);
    addDate('⚡ Lightning Lane Multi-Pass Available', llmp, '⚡',
      'Resort guests can book up to 3 days in advance at midnight. Day guests: morning of.', 'Park Days', false);

    // Early Theme Park Entry starts on arrival day
    addDate('🏰 Early Theme Park Entry Begins', new Date(start), '🏰',
      'Disney resort guests get 30 min early entry to all parks every day', 'Park Days', false);

    // Park reservations — should be done now
    const parkPass = new Date(today); parkPass.setDate(parkPass.getDate() + 1);
    addDate('🗓️ Make Park Pass Reservations', parkPass, '🗓️',
      'Reserve your park for each day now at disneyworld.disney.go.com — no cost, just required', 'Booking', true);

    // Check-in online: 60 days before for My Disney Experience
    const mde = new Date(start); mde.setDate(mde.getDate() - 60);
    addDate('📱 Complete My Disney Experience Profile', mde, '📱',
      'Link your tickets, dining, and set up MagicBand+ in the app', 'Booking', false);

    // Purchase tickets if not done
    addDate('🎟️ Purchase Park Tickets', new Date(today), '🎟️',
      'Tickets required before park pass reservations. Check for multi-day discounts.', 'Booking', true);
  }

  // -- Disneyland Paris-specific -------------------
  if (t.tripType === 'dlp') {
    const hasDisneyHotel = (t.hotelLegs||[]).some(l => /disney/i.test(l.name||'') || /disneyland hotel/i.test(l.name||''));

    // Dining reservations — hotel guests up to 12 months out, day guests 2 months out
    const diningDate = new Date(start); diningDate.setDate(diningDate.getDate() - (hasDisneyHotel ? 365 : 60));
    addDate(hasDisneyHotel ? '🍽️ Dining Reservations Open (Disney Hotel guests)' : '🍽️ Dining Reservations Open', diningDate, '🍽️',
      hasDisneyHotel ? 'Disney Hotel guests can book table-service restaurants up to 12 months ahead' : 'Day guests can book table-service restaurants up to 2 months ahead', 'Dining', true);

    // Premier Access Ultimate — purchasable up to 7 days ahead
    const paUltimate = new Date(start); paUltimate.setDate(paUltimate.getDate() - 7);
    addDate('🎫 Premier Access Ultimate On Sale', paUltimate, '🎫',
      'Book Premier Access Ultimate up to 7 days ahead on the app or website — confirm current pricing in-app', 'Park Days', false);

    // Premier Access One — same-day only
    addDate('🎫 Premier Access One Opens Each Morning', new Date(start), '🎫',
      'Buy Premier Access One same-day in the app for the next available time slot (max 3 per ride/guest)', 'Park Days', false);

    // Extra Magic Time for Disney Hotel guests
    if (hasDisneyHotel) {
      addDate('🌅 Extra Magic Time Begins', new Date(start), '🌅',
        'Disney Hotel guests get early entry to the parks every day of their stay', 'Park Days', false);
    }

    // Ticket purchase reminder
    addDate('🎟️ Purchase Park Tickets', new Date(today), '🎟️',
      'Confirm 1-park or 2-park tickets, and whether you need Disneyland Park + Disney Adventure World access each day', 'Booking', true);

    // Transport booking reminder — Eurostar/TGV/Magical Shuttle/RER
    const transport = new Date(start); transport.setDate(transport.getDate() - 30);
    addDate('🚆 Confirm Eurostar/TGV or Airport Transfer', transport, '🚆',
      'Book Eurostar/TGV to Marne-la-Vallée – Chessy, or reserve a Magical Shuttle from CDG/Orly, ahead of peak dates', 'Booking', false);
  }

  // -- DCL Cruise-specific ------------------------
  if (t.cruise && t.cruiseStartDate) {
    const sailDate = new Date(t.cruiseStartDate + 'T00:00:00');
    const castawayKey = t.castawayStatus || 'First Timer';
    const lv = CASTAWAY_LEVELS[castawayKey] || CASTAWAY_LEVELS['First Timer'];

    // Activities/excursions/dining booking window
    const actDate = new Date(sailDate); actDate.setDate(actDate.getDate() - lv.activities);
    addDate(`🚢 Port Adventures & Dining Opens (${lv.emoji} ${lv.label})`, actDate, '🚢',
      `${lv.label} Castaway Club members can book excursions, specialty dining (Palo, Remy), and spa at ${lv.activities} days before sailing`, 'Cruise', true);

    // Online check-in window
    const checkinDate = new Date(sailDate); checkinDate.setDate(checkinDate.getDate() - lv.checkin);
    addDate(`🛳️ Online Check-In Opens (${lv.emoji} ${lv.label})`, checkinDate, '🛳️',
      `Complete online check-in at ${lv.checkin} days out. Earlier boarding groups go to higher status members.`, 'Cruise', true);

    // Castaway Cay note
    addDate('🏝️ Castaway Cay — Pack Day-Bag', new Date(sailDate), '🏝️',
      'Tram to the beach, stroller parking, Pelican\'s Plunge water slides. Arrive early for chair placement.', 'Cruise', false);

    // Sail date reminder
    addDate('⚓ Embarkation Day!', sailDate, '⚓',
      `Boarding the ${t.cruiseShip||'Disney Cruise'}! Port Arrival Time from your online check-in.`, 'Cruise', true);
  }

  // -- Aulani-specific ----------------------------
  if (t.tripType === 'aulani') {
    // Luau booking
    const luauBook = new Date(start); luauBook.setDate(luauBook.getDate() - 180);
    addDate("🌺 Book KA WA'A Luau", luauBook, '🌺',
      "Opens 180 days before. Sells out fast — book the moment it's available at 7am HST", 'Aulani', true);

    // Character breakfast
    const charBook = new Date(start); charBook.setDate(charBook.getDate() - 180);
    addDate('🐭 Book Character Breakfast (Makahiki)', charBook, '🐭',
      '180 days out — Moana, Stitch, and friends. Morning slots fill up first.', 'Aulani', true);

    // Rainbow Reef snorkel
    addDate('🤿 Book Rainbow Reef Snorkel', new Date(start), '🤿',
      'Can book at check-in or in advance. $25/adult, included for Aulani DVC members.', 'Aulani', false);

    // Laniwai Spa
    const spaBook = new Date(start); spaBook.setDate(spaBook.getDate() - 60);
    addDate('💆 Book Laniwai Spa', spaBook, '💆',
      '~60 days out — evening slots and weekend times fill quickly', 'Aulani', false);
  }

  // -- Universal for all trips --------------------
  // Travel insurance
  addDate('🛡️ Purchase Travel Insurance', new Date(today), '🛡️',
    'Best rates within 14 days of first deposit. Covers cancellation, medical, delays.', 'Booking', false);

  // Pack reminder — 1 week out
  const packDate = new Date(start); packDate.setDate(packDate.getDate() - 7);
  addDate('🧳 Start Packing', packDate, '🧳',
    '1 week out — lay out clothes, charge devices, confirm reservations', 'Pre-Trip', false);

  // Sort by date
  milestones.sort((a,b) => a.date - b.date);
  return milestones;
}

// Build the countdown checklist tab
function buildCountdownChecklist(t) {
  const milestones = buildMilestones(t);
  const today = new Date(); today.setHours(0,0,0,0);
  const cs = t.checklistStatus || {};
  const getMidLocal = m => { let h=0; for(let i=0;i<m.label.length;i++){h=((h<<5)-h)+m.label.charCodeAt(i);h|=0;} return 'ms'+Math.abs(h).toString(36); };
  const upcoming = milestones.filter(m => {
    if (m.past) return false;
    const mid = getMidLocal(m);
    const st = cs[mid];
    return st !== 'done' && st !== 'skip'; // hide done/skipped from upcoming
  });
  const past     = milestones.filter(m => m.past);
  const categories = [...new Set(milestones.map(m=>m.category))];

  return `
    <div class="card">
      <div class="card-header">📅 Planning Countdown
        <span style="font-size:12px;font-weight:500;color:#aaa;margin-left:8px;">${upcoming.length} upcoming · ${past.length} passed</span>
      </div>
      ${!t.startDate ? `
      <div class="empty-rich"><div class="er-icon">📅</div>
        <div class="er-title">Set your trip dates first</div>
        <div class="er-body">Head to Settings and enter your start date — the countdown will build automatically from your trip details.</div>
        <button class="btn btn-primary" onclick="setTab('settings')">Go to Settings →</button>
      </div>` : `
      ${upcoming.length === 0 ? `<div style="text-align:center;padding:24px;color:#aaa;font-style:italic;">All planning milestones have passed — you're almost there! 🎉</div>` : ''}
      ${upcoming.map(m => {
        const urgency = m.daysAway <= 7 ? '#dc2626' : m.daysAway <= 30 ? '#f59e0b' : '#1a1a5e';
        const bg      = m.daysAway <= 7 ? '#fef2f2' : m.daysAway <= 30 ? '#fffbeb' : '#f8f8ff';
        // Safe key from label — avoid btoa which breaks on emoji/unicode
        const mid = (()=>{ let h=0; for(let i=0;i<m.label.length;i++){h=((h<<5)-h)+m.label.charCodeAt(i);h|=0;} return 'ms'+Math.abs(h).toString(36); })();
        const status = (trip()?.checklistStatus||{})[mid] || 'pending';
        const statusCfg = {
          pending:{icon:'⬜',color:urgency,  bg,         label:'Mark done'},
          done:   {icon:'✅',color:'#16a34a',bg:'#f0fdf4',label:'Done'},
          skip:   {icon:'⏭️',color:'#9ca3af',bg:'#f9fafb',label:'Skipped'},
          issue:  {icon:'⚠️',color:'#f97316',bg:'#fff7ed',label:'Issue'},
        };
        const sc = statusCfg[status] || statusCfg.pending;
        return `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
                     background:${sc.bg};border-radius:10px;margin-bottom:8px;
                     border-left:3px solid ${sc.color};opacity:${status==='skip'?'0.55':'1'};">
          <span style="font-size:22px;flex-shrink:0;${status==='done'?'filter:grayscale(.6);opacity:.6':''}">${m.icon}</span>
          <div style="flex:1;">
            <div style="font-weight:800;font-size:13px;color:${sc.color};${status==='done'?'text-decoration:line-through;':''}">${m.label}</div>
            <div style="font-size:11px;color:#777;margin-top:3px;">${m.note}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <div style="font-size:16px;font-weight:900;color:${sc.color};">${m.daysAway===0?'TODAY':m.daysAway===1?'TMW':m.daysAway+' days'}</div>

            <div style="background:#e8e8f2;border-radius:4px;padding:1px 6px;font-size:10px;color:#5050a0;font-weight:700;">${m.category}</div>

            <div style="display:flex;gap:4px;margin-top:4px;">
              ${[['done','✅','Mark done'],['skip','⏭️','Skip'],['issue','⚠️','Flag']].map(([st,icon,tip])=>{
                const active = status===st;
                const toggleTo = active ? 'pending' : st;
                const activeBg = st==='done'?'#16a34a':st==='skip'?'#6b7280':'#ea580c';
                return `<button onclick="setChecklistStatus('${mid}','${toggleTo}')"
                  title="${tip}"
                  style="width:30px;height:30px;border-radius:7px;font-size:15px;line-height:1;
                         border:2px solid ${active?activeBg:'#e4e4f0'};
                         background:${active?activeBg+'22':'#fff'};
                         cursor:pointer;transition:all .12s;font-family:inherit;
                         box-shadow:${active?'0 0 0 1px '+activeBg:'none'};">${icon}</button>`;
              }).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
      ${past.length>0?`
      <div style="margin-top:16px;">
        <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">✅ Already Passed</div>
        ${past.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f9f9f9;border-radius:8px;margin-bottom:4px;opacity:.6;">
          <span style="font-size:16px;">${m.icon}</span>
          <span style="font-size:12px;font-weight:700;color:#aaa;flex:1;text-decoration:line-through;">${m.label}</span>
          <span style="font-size:10px;color:#bbb;">${Math.abs(m.daysAway)} days ago</span>
        </div>`).join('')}
      </div>`:''}
      `}
    </div>`;
}

// -- On-load "Coming Up" reminder popup --
function buildUpcomingReminder(t) {
  if (!t || !t.startDate) return '';
  const milestones = buildMilestones(t);
  // Filter out items already marked done in checklistStatus
  const cs = t.checklistStatus || {};
  const getMid = m => { let h=0; for(let i=0;i<m.label.length;i++){h=((h<<5)-h)+m.label.charCodeAt(i);h|=0;} return 'ms'+Math.abs(h).toString(36); };
  const soon = milestones.filter(m => {
    if (m.past) return false;
    if (m.daysAway > 14) return false;
    if (!m.urgent) return false;
    const mid = getMid(m);
    return cs[mid] !== 'done' && cs[mid] !== 'skip';
  });
  if (!soon.length) return '';
  if (S.ui.reminderDismissed) return '';

  // Show up to 3 items
  const visible = soon.slice(0, 3);

  return `
    <div style="position:fixed;bottom:20px;right:20px;z-index:500;max-width:340px;
                background:#1a1a5e;border-radius:14px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:900;color:#FFD700;">⏰ Coming Up Soon</div>
        <button onclick="S.ui.reminderDismissed=true;render()"
          style="background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;">×</button>
      </div>
      ${visible.map(m => {
        const mid = getMid(m);
        const urgColor = m.daysAway<=3?'#f87171':m.daysAway<=7?'#fde68a':'#6ee7b7';
        return `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);">
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:700;color:#fff;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              ${m.label.replace(/\(.+\)/,'').trim()}
            </div>
          </div>
          <div style="font-size:11px;font-weight:900;color:${urgColor};white-space:nowrap;flex-shrink:0;letter-spacing:.02em;">
            ${m.daysAway===0?'TODAY':m.daysAway===1?'TMW':m.daysAway+'d'}
          </div>
          <!-- Status buttons matching checklist style -->
          <div style="display:flex;gap:3px;flex-shrink:0;">
            ${[['done','✅','Mark done'],['skip','⏭️','Skip'],['issue','⚠️','Flag']].map(([st,icon,tip])=>`
              <button onclick="setChecklistStatus('${mid}','${st}');render()"
                title="${tip}"
                style="width:28px;height:28px;border-radius:6px;font-size:14px;line-height:1;
                       border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);
                       cursor:pointer;transition:all .12s;font-family:inherit;"
                onmouseover="this.style.background='rgba(255,255,255,.18)';this.style.borderColor='rgba(255,255,255,.5)'"
                onmouseout="this.style.background='rgba(255,255,255,.06)';this.style.borderColor='rgba(255,255,255,.2)'"
              >${icon}</button>`).join('')}
          </div>
        </div>`;
      }).join('')}
      ${soon.length > 3 ? `
      <div style="font-size:11px;color:rgba(255,255,255,.35);text-align:center;padding:6px 0 2px;">
        +${soon.length - 3} more in checklist
      </div>` : ''}
      <button onclick="setTab('countdown');S.ui.reminderDismissed=true;render()"
        style="margin-top:10px;width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
               border-radius:8px;color:#fff;padding:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;">
        View Full Checklist →
      </button>
    </div>`;
}

const PACK_STATUSES = {

  packed:    { label:'Packed ✅', icon:'✅', color:'#16a34a', bg:'#f0fdf4' },

  needbuy:   { label:'Need to Buy 🛒', icon:'🛒', color:'#d97706', bg:'#fffbeb' },
  issue:     { label:'Issue ⚠️', icon:'⚠️', color:'#dc2626', bg:'#fef2f2' },
};

function buildPackingList(t) {
  const suitcases = t.suitcases || [];

  // Init default suitcases if empty
  if (suitcases.length === 0) {
    const presets = getPackingPresets(t.tripType, t.startDate);
    // Group presets by category into default suitcases
    const catGroups = {};
    presets.forEach(item => {
      if (!catGroups[item.cat]) catGroups[item.cat] = [];
      catGroups[item.cat].push({
        id: uid(), name: item.name, note: item.note||'',
        status: 'pending', assignedTo: [], qty: item.qty||1,
      });
    });
    const defaultSuitcases = Object.entries(catGroups).map(([name, items]) => ({
      id: uid(), name, icon: name.split(' ')[0], items,
    }));
    patchTrip({ suitcases: defaultSuitcases });
    return buildPackingList(trip());
  }

  const members = (t.partyMembers||[]).filter(m=>m.name);
  const totalItems = suitcases.reduce((s,sc)=>s+(sc.items||[]).length,0);
  const packedItems = suitcases.reduce((s,sc)=>s+(sc.items||[]).filter(i=>i.status==='packed'||i.status==='repacked').length,0);
  const needBuy = suitcases.reduce((s,sc)=>s+(sc.items||[]).filter(i=>i.status==='needbuy').length,0);
  const issues  = suitcases.reduce((s,sc)=>s+(sc.items||[]).filter(i=>i.status==='issue').length,0);

  return `
    <!-- Summary bar -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;">
      <div class="card" style="padding:14px;text-align:center;margin:0;">
        <div style="font-size:28px;font-weight:900;color:#1a1a5e;">${packedItems}/${totalItems}</div>
        <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;">Packed</div>
        <div style="background:#e8e8f2;border-radius:99px;height:4px;margin-top:6px;overflow:hidden;">
          <div style="height:100%;background:#22c55e;border-radius:99px;width:${totalItems?((packedItems/totalItems)*100).toFixed(0):0}%;transition:width .4s;"></div>
        </div>
      </div>
      ${needBuy>0?`<div class="card" style="padding:14px;text-align:center;margin:0;background:#fffbeb;">
        <div style="font-size:28px;font-weight:900;color:#d97706;">${needBuy}</div>
        <div style="font-size:11px;font-weight:700;color:#d97706;text-transform:uppercase;">Need to Buy</div>
      </div>`:''}
      ${issues>0?`<div class="card" style="padding:14px;text-align:center;margin:0;background:#fef2f2;">
        <div style="font-size:28px;font-weight:900;color:#dc2626;">${issues}</div>
        <div style="font-size:11px;font-weight:700;color:#dc2626;text-transform:uppercase;">Issues</div>
      </div>`:''}
    </div>

    <!-- Action buttons -->
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="addSuitcase('${t.id}')">🧳 New Suitcase / Bag</button>
      <button class="btn btn-ghost btn-sm" onclick="resetPackingList('${t.id}')">↺ Reset to Defaults</button>
    </div>

    <!-- Suitcases -->
    ${suitcases.map((sc,si) => buildSuitcaseCard(sc, si, t, members)).join('')}

    <!-- Store / Grocery List -->
    ${buildStoreList(t)}
  `;
}

function buildStoreList(t) {
  const items = t.storeList || [];
  const bought = items.filter(i=>i.bought).length;
  const total  = items.reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
  const boughtTotal = items.filter(i=>i.bought).reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
  const sym = curSym(t);

  return '<div class="card" style="margin-bottom:14px;">'
    + '<div class="card-header" style="justify-content:space-between;">'
    + '<span>🛒 Store / Grocery List</span>'
    + (total>0 ? '<span style="font-size:12px;font-weight:700;color:#16a34a;">'+fmtDual(boughtTotal,t,true)+' / '+fmtDual(total,t,true)+'</span>' : '')
    + '</div>'
    + (items.length === 0 ? '<div style="font-size:13px;color:#aaa;padding:8px 0;">Add items you need to pick up — groceries, sunscreen, gear, etc.</div>' : '')
    + '<div style="display:flex;flex-direction:column;gap:2px;margin-bottom:10px;">'
    + items.map(function(item, i) {
        return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f8;">'
          + '<input type="checkbox"' + (item.bought?' checked':'') + ' onchange="toggleStoreItem('+i+',this.checked)"'
          + ' style="width:16px;height:16px;accent-color:#16a34a;cursor:pointer;flex-shrink:0;">'
          + '<span style="flex:1;font-size:13px;' + (item.bought?'text-decoration:line-through;color:#aaa;':'font-weight:600;') + '">'
          + esc(item.name) + '</span>'
          + (item.store ? '<span style="font-size:11px;color:#aaa;background:#f5f5f5;padding:1px 7px;border-radius:5px;">' + esc(item.store) + '</span>' : '')
          + '<span style="font-size:12px;font-weight:700;color:#' + (item.bought?'aaa':'16a34a') + ';text-align:right;">'
          + (item.cost ? fmtDual(parseFloat(item.cost),t,true) : '') + '</span>'
          + '<button onclick="deleteStoreItem('+i+')" style="background:none;border:none;color:#ddd;cursor:pointer;font-size:14px;padding:0 2px;">✕</button>'
          + '</div>';
      }).join('')
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;">'
    + '<input type="text" id="store-item-name" placeholder="Item name…"'
    + ' onkeydown="if(event.key===\'Enter\')addStoreItem()"'
    + ' style="padding:7px 10px;border:1.5px dashed #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;">'
    + '<input type="text" id="store-item-store" placeholder="Store (opt)"'
    + ' style="padding:7px 10px;border:1.5px dashed #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:100px;">'
    + '<input type="number" id="store-item-cost" placeholder="'+sym+'0.00" min="0" step="0.01"'
    + ' style="padding:7px 10px;border:1.5px dashed #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:80px;">'
    + '<button class="btn btn-primary btn-sm" onclick="addStoreItem()">＋ Add</button>'
    + '</div>'
    + (bought>0 ? '<button onclick="clearBoughtStoreItems()" style="margin-top:10px;background:none;border:1px solid #e4e4f0;border-radius:7px;padding:5px 12px;font-size:12px;font-family:inherit;color:#aaa;cursor:pointer;">✕ Clear bought items ('+bought+')</button>' : '')
    + '</div>';
}

function addStoreItem() {
  const nameEl = document.getElementById('store-item-name');
  const storeEl = document.getElementById('store-item-store');
  const costEl  = document.getElementById('store-item-cost');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) return;
  const t = trip();
  const item = { name, store: storeEl?storeEl.value.trim():'', cost: costEl?costEl.value:'', bought: false };
  patchTrip({ storeList: [...(t.storeList||[]), item] }, true);
  if (nameEl) nameEl.value = '';
  if (storeEl) storeEl.value = '';
  if (costEl)  costEl.value  = '';
  render();
}
function toggleStoreItem(i, checked) {
  const t = trip();
  const storeList = t.storeList.map(function(item, idx) {
    return idx===i ? Object.assign({},item,{bought:checked}) : item;
  });
  patchTrip({ storeList }, true); render();
}
function deleteStoreItem(i) {
  const t = trip();
  const storeList = t.storeList.filter(function(_,idx){ return idx!==i; });
  patchTrip({ storeList }, true); render();
}
function clearBoughtStoreItems() {
  const t = trip();
  const storeList = (t.storeList||[]).filter(function(i){ return !i.bought; });
  patchTrip({ storeList }, true); render();
}

  return `
    <div class="card" style="margin-bottom:14px;padding:0;overflow:hidden;">

      <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:#1a1a5e;cursor:pointer;"
           onclick="S.ui.openSuitcase=S.ui.openSuitcase||{};S.ui.openSuitcase['${sc.id}']=!(S.ui.openSuitcase['${sc.id}']!==false);render()">

// -- Packing list handlers --
function addSuitcase(tripId) {
  const name = prompt('Suitcase / bag name:', 'My Bag');
  if (!name?.trim()) return;
  const t = trip();
  const emoji = ['🧳','👜','🎒','💼','🛄','👝'][Math.floor(Math.random()*6)];
  const suitcases = [...(t.suitcases||[]), { id:uid(), name:name.trim(), icon:emoji, items:[] }];
  patchTrip({ suitcases }, true); render();
}
function deleteSuitcase(scId) {
  if (!confirm('Delete this suitcase and all its items?')) return;
  const t = trip();
  patchTrip({ suitcases:(t.suitcases||[]).filter(s=>s.id!==scId) }, true); render();
}
function updSuitcase(scId, field, val) {
  const t = trip();
  const suitcases = (t.suitcases||[]).map(s=>s.id===scId?{...s,[field]:val}:s);
  patchTrip({ suitcases }); persist();
}
function addPackItem(scId) {
  const el = document.getElementById('newitem-'+scId);
  const name = el?.value?.trim();
  if (!name) return;
  const t = trip();
  const suitcases = (t.suitcases||[]).map(s => s.id===scId
    ? {...s, items:[...(s.items||[]), {id:uid(),name,note:'',status:'pending',assignedTo:[],qty:1}]}
    : s);
  patchTrip({ suitcases }); el.value=''; render();
}
function deletePackItem(scId, ii) {
  const t = trip();
  const suitcases = (t.suitcases||[]).map(s => {
    if (s.id!==scId) return s;
    const items=[...(s.items||[])]; items.splice(ii,1); return {...s,items};
  });
  patchTrip({ suitcases }, true); render();
}
function cyclePackStatus(scId, ii) {
  const cycle = ['pending','packed','repacked','needbuy','issue'];
  const t = trip();
  const suitcases = (t.suitcases||[]).map(s => {
    if (s.id!==scId) return s;
    const items = (s.items||[]).map((it,idx)=>{
      if (idx!==ii) return it;
      const cur = cycle.indexOf(it.status||'pending');
      return {...it, status:cycle[(cur+1)%cycle.length]};
    });
    return {...s,items};
  });
  patchTrip({ suitcases }, true); render();
}
function updPackItem(scId, ii, field, val) {
  const t = trip();
  const suitcases = (t.suitcases||[]).map(s => {
    if (s.id!==scId) return s;
    const items = (s.items||[]).map((it,idx)=>idx===ii?{...it,[field]:val}:it);
    return {...s,items};
  });
  patchTrip({ suitcases }); persist();
}
function toggleAssignPicker(scId, ii) {
  if (!S.ui.assignPicker) S.ui.assignPicker = {};
  const key = scId+'_'+ii;
  S.ui.assignPicker[key] = !S.ui.assignPicker[key];
  render();
}
function toggleItemAssignee(scId, ii, memberId) {
  const t = trip();
  const suitcases = (t.suitcases||[]).map(s => {
    if (s.id!==scId) return s;
    const items = (s.items||[]).map((it,idx)=>{
      if (idx!==ii) return it;
      const at = it.assignedTo||[];
      const newAt = at.includes(memberId) ? at.filter(id=>id!==memberId) : [...at,memberId];
      return {...it, assignedTo:newAt};
    });
    return {...s,items};
  });
  patchTrip({ suitcases }, true); render();
}
function resetPackingList(tripId) {
  if (!confirm('Reset packing list to defaults? Custom items will be lost.')) return;
  const t = trip();
  patchTrip({ suitcases:[] }, true); render();
}

function buildFeedbackModal() {

function submitFeedback() {
  // Read directly from DOM inputs to get current values (avoids stale render state)
  const nameEl = document.getElementById('fb-name');
  const msgEl  = document.getElementById('fb-message');
  const name    = (nameEl ? nameEl.value : S.ui.feedback?.name || '').trim();
  const message = (msgEl  ? msgEl.value  : S.ui.feedback?.message || '').trim();
  const category = S.ui.feedback?.category || '';

  if (!name || !category || !message) {
    alert('Please fill in your name, pick a category, and write your message.');
    return;
  }

  // Sync back to state
  if (!S.ui.feedback) S.ui.feedback = {};
  S.ui.feedback.name    = name;
  S.ui.feedback.message = message;

  const t = trip();
  const now = new Date();
  const stamp = now.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})
    + ' at ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const categoryLabels = {bug:'🐛 Bug',unclear:'❓ Not Clear',feature:'✨ Feature Request',general:'👍 General Feedback'};
  const tripInfo = t ? `${t.name} (${t.tripType==='aulani'?'Aulani':t.tripType==='dlp'?'Disneyland Paris':'WDW'}, ${t.startDate||'no date'})` : 'No active trip';

  const text = `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${categoryLabels[category]||category}
From: ${name}
Date: ${stamp}
Trip: ${tripInfo}
App version: Skipper Tripper v${APP_VERSION}

${message}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

`;

  try {
    navigator.clipboard.writeText(text).then(() => {
      S.ui.feedbackCopied = true;
      S.ui.feedback = {};
      render();
      setTimeout(() => { window.open(FEEDBACK_DOC_URL, '_blank'); }, 300);
      setTimeout(() => { S.ui.feedbackCopied = false; S.ui.feedbackOpen = false; render(); }, 5000);
    });
  } catch(e) {
    prompt('Copy this and paste into the doc:', text);
    window.open(FEEDBACK_DOC_URL, '_blank');
  }
}

function startTour() {
  S.ui.tourActive = true;
  S.ui.tourStep = 0;
  localStorage.setItem('st_tour_seen','1');
  render();
}
function nextTourStep() {
  const step = TOUR_STEPS[S.ui.tourStep];
  if (step && step.action) step.action();
  S.ui.tourStep = Math.min(S.ui.tourStep + 1, TOUR_STEPS.length - 1);
  render();
}
function prevTourStep() {
  S.ui.tourStep = Math.max(S.ui.tourStep - 1, 0);
  render();
}
function endTour() {
  S.ui.tourActive = false;
  S.ui.tourStep = 0;
  localStorage.setItem('st_tour_seen','1');
  render();
}

// Shared: generate the full, deduped, override-applied entry list for one date.
// Used by both the Run of Show view and the Today (trip mode) tab.
function rosEntriesForDate(t, date) {
  const manualByDate = {};
  (t.rosEntries||[]).forEach(e => { if (!manualByDate[e.date]) manualByDate[e.date] = []; manualByDate[e.date].push(e); });
  const md = t.mealDefaults || blankMealDefaults();
    const parkDay   = (t.parks||[]).find(d=>d.date===date);
    const cruise    = parkDay && isCruiseDay(parkDay, t);
    const hotelCIs  = (t.hotelLegs||[]).filter(l=>l.checkInDate===date);
    const hotelCOs  = (t.hotelLegs||[]).filter(l=>l.checkOutDate===date);
    // keep singular aliases for any legacy references
    const hotelCI   = hotelCIs[0] || null;
    const hotelCO   = hotelCOs[0] || null;
    const manual    = (manualByDate[date]||[]).slice(); // will be sorted with all entries below
    const mnsshp    = MNSSHP_DATES.find(e=>e.date===date);

    // Auto-generate entries for this day
    const entries = [];

    // Helper: get traveler name string for a leg
    function legTravelerStr(leg) {
      const travelers = leg.travelers||[];
      if (!travelers.length) return '';
      return travelers.map(id=>{
        const m=(t.partyMembers||[]).find(m=>m.id===id);
        return m ? (m.emoji||'🧑')+' '+m.name : '';
      }).filter(Boolean).join(' · ');
    }
    // legKey: unique key per leg using flight number so same-airport entries are distinguishable
    function legKey(leg) {
      return [leg.flightNum||'', leg.airline||'', leg.origin||'', leg.destination||''].filter(Boolean).join('-');
    }
    // Outbound flights
    (t.transportation.outbound.legs||[]).forEach(leg => {
      const tv = legTravelerStr(leg);
      const sub = [`${leg.airline||''} ${leg.flightNum||''}`.trim(), tv].filter(Boolean).join(' · ');
      const lk = legKey(leg);
      if (leg.departDate===date && leg.departTime) entries.push({time:leg.departTime, icon:'✈️', text:`Depart ${leg.origin||'?'} → ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-dep-'+lk});
      if (leg.arriveDate===date && leg.arriveTime) entries.push({time:leg.arriveTime, icon:'🛬', text:`Arrive ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-arr-'+lk});
    });
    // Return flights
    (t.transportation.return.legs||[]).forEach(leg => {
      const tv = legTravelerStr(leg);
      const sub = [`${leg.airline||''} ${leg.flightNum||''}`.trim(), tv].filter(Boolean).join(' · ');
      const lk = legKey(leg);
      if (leg.departDate===date && leg.departTime) entries.push({time:leg.departTime, icon:'✈️', text:`Depart ${leg.origin||'?'} → ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-dep-'+lk});
      if (leg.arriveDate===date && leg.arriveTime) entries.push({time:leg.arriveTime, icon:'🛬', text:`Arrive ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-arr-'+lk});
    });
    // Extra outbound flight groups
    (t.transportation.extraOutbound||[]).forEach(sec => {
      (sec.legs||[]).forEach(leg => {
        const tv = legTravelerStr(leg);
        const sub = [`${leg.airline||''} ${leg.flightNum||''}`.trim(), tv].filter(Boolean).join(' · ');
        const lk = legKey(leg);
        if (leg.departDate===date && leg.departTime) entries.push({time:leg.departTime, icon:'✈️', text:`Depart ${leg.origin||'?'} → ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-dep-'+lk});
        if (leg.arriveDate===date && leg.arriveTime) entries.push({time:leg.arriveTime, icon:'🛬', text:`Arrive ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-arr-'+lk});
      });
    });
    // Extra return flight groups
    (t.transportation.extraReturn||[]).forEach(sec => {
      (sec.legs||[]).forEach(leg => {
        const tv = legTravelerStr(leg);
        const sub = [`${leg.airline||''} ${leg.flightNum||''}`.trim(), tv].filter(Boolean).join(' · ');
        const lk = legKey(leg);
        if (leg.departDate===date && leg.departTime) entries.push({time:leg.departTime, icon:'✈️', text:`Depart ${leg.origin||'?'} → ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-dep-'+lk});
        if (leg.arriveDate===date && leg.arriveTime) entries.push({time:leg.arriveTime, icon:'🛬', text:`Arrive ${leg.destination||'?'}`, sub, cls:'flight', id:'flt-arr-'+lk});
      });
    });

    // Hotel check-out
    if (hotelCO) entries.push({time:'11:00', icon:'🧳', text:`Check out: ${esc(hotelCO.name||'Hotel')}`, sub:'Standard check-out 11 AM · confirm with resort', cls:'hotel'});
    // Hotel check-in
    if (hotelCI) entries.push({time:hotelCI.checkInTime||'14:00', icon:'🏨', text:`Check in: ${esc(hotelCI.name||'Hotel')}`, sub:hotelCI.confirmationNum?`Conf# ${esc(hotelCI.confirmationNum)}`:'', cls:'hotel'});

    // Park day entries
    if (parkDay) {
      const park = parkDay.park;
      const ph   = (SEPT_PARK_HOURS[park] || DLP_PARK_HOURS[park] || DLR_PARK_HOURS[park]);

      if (cruise) {
        const dclLabel = {
          'dcl-embark':'⚓ Embarkation Day','dcl-sea':'🌊 Sea Day',
          'dcl-port':`🏖️ Port Day${parkDay.notes?' — '+esc(parkDay.notes):''}`,
          'dcl-disembark':'🏁 Disembarkation Day'
        }[park]||parkName(park);
        entries.push({time:'07:00', icon:'🚢', text:dclLabel, sub:t.cruiseShip||'Disney Cruise Line', cls:'auto'});
      } else if (park && park!=='rest' && park!=='unassigned') {
        // Early entry
        if (parkDay.dayExtras?.bonusHours && parkDay.dayExtras.bonusHoursStart) {
          const bhTime = parkDay.dayExtras.bonusHoursStart;
          entries.push({time:bhTime, icon:'🌟', text:`${parkName(park)} Extended/Bonus Hours`, sub:'DVC & Deluxe Resort guests', cls:'auto'});
        }
        // Park open
        if (ph) {
          // Early Entry: 30 min before open if no override
          const eeAutoMins = (()=>{
            const parts = ph.open.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (!parts) return null;
            let h=parseInt(parts[1]),m=parseInt(parts[2]);
            const pm=parts[3].toUpperCase()==='PM';
            if(pm&&h!==12)h+=12; if(!pm&&h===12)h=0;
            const total=h*60+m-30;
            return String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
          })();
          const eeTime = parkDay.dayExtras?.earlyEntryTime || eeAutoMins || to24(ph.open);
          entries.push({time:to24(ph.open), icon:'🚪', text:`${parkName(park)} Opens`, sub:`Regular hours ${ph.open}${ph.note?` · ${ph.note}`:''}`, cls:'auto'});
          if (parkDay.dayExtras?.earlyEntry) {
            entries.push({time:eeTime, icon:'⭐', text:`Early Entry — ${parkName(park)}`, sub:`Disney Resort guests · 30 min before regular open`, cls:'auto'});
          }
          // Extended Evening Hours
          if (parkDay.dayExtras?.bonusHours) {
            const eeh = EXTENDED_EVENING_HOURS[park];
            const eehStart = parkDay.dayExtras?.bonusHoursStart || (eeh ? eeh.start : '22:00');
            const eehEnd   = eeh ? eeh.end : '';
            entries.push({time:eehStart, icon:'🌟', text:`${eeh ? eeh.label : 'Extended Evening Hours'} — ${parkName(park)}`, sub:`DVC & Deluxe Resort guests${eehEnd?' · until '+fmt12(eehEnd):''}`, cls:'auto'});
          }
        }
        // Park hops
        (parkDay.parkHops||[]).filter(Boolean).forEach(hp => {
          const hph = (SEPT_PARK_HOURS[hp] || DLP_PARK_HOURS[hp] || DLR_PARK_HOURS[hp]);
          if (hp.startsWith('event-')) {
            if (hp==='event-mnsshp' && mnsshp) entries.push({time:'16:00', icon:'🎃', text:`MNSSHP Early Entry (4 PM)`, sub:`Party 7 PM–Midnight · $${mnsshp.price}/pp`, cls:'auto'});
            if (hp==='event-ep-ah') entries.push({time:'21:30', icon:'🌙', text:`EPCOT After Hours`, sub:`${AFTER_HOURS_EVENTS.ep.note}`, cls:'auto'});
            if (hp==='event-hs-ah') entries.push({time:'21:30', icon:'🌙', text:`Hollywood Studios After Hours`, sub:`${AFTER_HOURS_EVENTS.hs.note}`, cls:'auto'});
          } else {
            entries.push({time:'14:00', icon:'🔀', text:`Park Hop → ${parkName(hp)}`, sub:hph?`Opens ${hph.open}`:'', cls:'auto'});
          }
        });
        // Park close / late stay
        if (ph) {
          const mnsshpSelected = (parkDay.parkHops||[]).includes('event-mnsshp');
          const closeTime = mnsshpSelected && park==='mk' ? '18:00' : to24(ph.close);
          entries.push({time:closeTime, icon:parkDay.dayExtras?.lateStay?'🌙':'🚪', text:`${parkName(park)} Closes`, sub:parkDay.dayExtras?.lateStay?'Late Stay — extra time!':'', cls:'auto'});
        }
        if (parkDay.dayExtras?.afterHours) entries.push({time:'21:30', icon:'🎉', text:'After Hours Event Begins', sub:'Exclusive access — fewer crowds!', cls:'auto'});
        // Meals for theme park days
        // Booked Lightning Lanes — confirmed windows appear as timed entries
        (function(){
          const bk=(parkDay.llBookings)||{};
          llPicksForDay0(parkDay).forEach(function(p){
            const b=bk[p.name];
            if(b&&b.start){
              const illP=p.ill?((parkDay.ll&&parkDay.ll.illPrices&&parkDay.ll.illPrices[p.name])||(parkDay.ll&&parkDay.ll.onePrices&&parkDay.ll.onePrices[p.name])||null):null;
              const pty=(parkDay.ll&&parkDay.ll.partySize)||t.partySize||1;
              entries.push({
                time:b.start,
                icon:'⚡',
                text:'LL: '+p.name,
                sub:'Window '+fmt12(b.start)+(b.end?'–'+fmt12(b.end):'')+(p.ill?' · ILL':''),
                cls:'ll',
                id:'ll-'+p.name,
                llRide:p.name,
                est:illP?Math.round(illP*pty):null
              });
            }
          });
        })();
        if (!cruise) {
          const meals = parkDay.meals || blankMeals();
          ['breakfast','lunch','dinner','snacks'].forEach(mt => {
            const meal = meals[mt]||{};
            if (meal.adrTime || meal.place) {
              const mIcon = {breakfast:'🥞',lunch:'🥙',dinner:'🍽️',snacks:'🍦'}[mt];
              const defTime = {breakfast:'08:30',lunch:'12:30',dinner:'18:30',snacks:'15:00'}[mt];
              const cost = meal.cost != null ? meal.cost : (md[mt]||0);
              entries.push({
                time: meal.adrTime || defTime,
                icon: mIcon,
                text: cap(mt)+': '+(meal.place||'TBD'),
                sub: fmtDual(cost,t)+(meal.adrBooked?' · ✓ ADR'+(meal.adrConfNum?' #'+esc(meal.adrConfNum):''):(meal.adrTime?' · ADR time set':'')),
                cls:'meal',
                est:(cost&&cost>0)?cost:null,
                mealType:mt
              });
            }
          });
        }
      }
    }

    // Meals on non-park days (rest/travel days) — always add if entered
    if (!parkDay || parkDay.park==='rest' || parkDay.park==='travel' || cruise) {
      const anyDay = (t.parks||[]).find(d=>d.date===date);
      if (anyDay && anyDay.meals) {
        const md2 = t.mealDefaults || blankMealDefaults();
        const cruise2 = isCruiseDay(anyDay, t);
        ['breakfast','lunch','dinner','snacks'].forEach(mt => {
          const meal = anyDay.meals[mt]||{};
          if (meal.adrTime || meal.place) {
            const mIcon = {breakfast:'🥞',lunch:'🥙',dinner:'🍽️',snacks:'🍦'}[mt];
            const defTime = {breakfast:'08:30',lunch:'12:30',dinner:'18:30',snacks:'15:00'}[mt];
            const cost = meal.cost != null ? meal.cost : (cruise2 ? 0 : (md2[mt]||0));
            entries.push({
              time: meal.adrTime || defTime,
              icon: mIcon,
              text: `${cap(mt)}: ${meal.place||'TBD'}`,
              sub: `${fmtDual(cost,t)}${meal.adrBooked?` · ✓ ADR${meal.adrConfNum?' #'+esc(meal.adrConfNum):''}`:meal.adrTime?' · ADR time set':''}`,
              cls: 'meal'
            });
          }
        });
      }
    }

    // Aulani activity day entries
    if (t.tripType === 'aulani') {
      const actDay = (t.activityDays||[]).find(d=>d.date===date);
      if (actDay) {
        const acts = actDay.activities || (actDay.activity ? [actDay.activity] : []);
        acts.forEach(actId => {
          const act = aulaniActivityLabel(actId);
          if (actId !== 'rest') {
            entries.push({
              time: actId==='arrival'?'15:00':actId==='departure'?'10:00':'09:00',
              icon: act.emoji,
              text: act.label,
              sub: actDay.notes || act.note || '',
              cls: 'auto'
            });
          }
        });
        // Offsite departure timeline — inject if calculated
        if (actDay.offsiteWakeTime && acts.includes('offsite')) {
          const dest = actDay.offsiteDetail && actDay.offsiteDetail!=='Custom / Other'
            ? actDay.offsiteDetail : (actDay.offsiteCustom||'Off-site Excursion');
          entries.push({time:to24(actDay.offsiteWakeTime),    icon:'⏰', text:'Wake Up & Get Ready', sub:`For ${dest}`, cls:'auto'});
          entries.push({time:to24(actDay.offsiteDepartTime),  icon:'🚗', text:`Leave Aulani → ${dest.split(/[,(]/)[0].trim()}`, sub:`Drive: ~${actDay.exDriveMin||'?'} min`, cls:'auto'});
          if (actDay.offsiteArriveTime) entries.push({time:to24(actDay.offsiteArriveTime), icon:'📍', text:`Arrive at ${dest.split(/[,(]/)[0].trim()}`, sub:'', cls:'auto'});
        }
        // Meals with notes
        ['breakfast','lunch','dinner','snacks'].forEach(mt => {
          const meal = (actDay.meals||{})[mt]||{};
          if (meal.place || meal.note) {
            const mIcon = {breakfast:'🥞',lunch:'🥙',dinner:'🍽️',snacks:'🍦'}[mt];
            const defTime = {breakfast:'08:00',lunch:'12:30',dinner:'18:30',snacks:'15:00'}[mt];
            entries.push({time:defTime, icon:mIcon, text:`${cap(mt)}: ${meal.place||'TBD'}`, sub:meal.note||'', cls:'meal', est:(meal.cost!=null&&meal.cost>0)?meal.cost:null, mealType:mt});
          }
        });
      }
    }

    // Merge manual/rosEntries — skip raw dp-auto entries if we already have flight leg data
    const hasFlightLegs = entries.some(e=>e.cls==='flight');
    manual.filter(e=>e.label||e.title).forEach(e => {
      const notes = e.notes||e.note||'';
      // If actual flight legs are already in entries, skip the duplicate
      // dp "departs" entries since the leg already shows that flight
      if (hasFlightLegs && notes.startsWith('auto:dp-') && (e.label||'').includes('Departs')) return;
      entries.push({time:e.time, icon:e.icon||'📌', text:e.label||e.title||'Entry', sub:notes, cls: notes.startsWith('auto:dp-') ? 'auto' : 'manual', id:e.id, date:e.date});
    });

    // Deduplicate entries
    // For dp auto-entries, dedupe by time + base label (strip traveler suffix after ·)
    // This removes old-format duplicates of new-format entries
    const seen = new Set();
    const deduped = [];
    // First pass: collect all dp entry base-labels to detect dupes
    const dpLabelsSeen = new Set();
    // Sort dp entries: prefer new-format (has plan ID) over legacy
    const sortedForDedup = [...entries].sort((a,b) => {
      const aN = a.sub||''; const bN = b.sub||'';
      const aNew = aN.match(/auto:dp-\w+-\w{7}/); // has plan ID
      const bNew = bN.match(/auto:dp-\w+-\w{7}/);
      if (aNew && !bNew) return -1;
      if (!aNew && bNew) return 1;
      return 0;
    });
    sortedForDedup.forEach(e => {
      const sub = e.sub||'';
      if (sub.startsWith('auto:dp-')) {
        // Use base label (before ·) + time as key
        const baseLabel = (e.text||'').split(' · ')[0].trim();
        const dpKey = (e.time||'')+'|'+baseLabel;
        if (dpLabelsSeen.has(dpKey)) return; // skip dupe
        dpLabelsSeen.add(dpKey);
        deduped.push(e);
      } else {
        const key = (e.time||'')+'|'+(e.text||'');
        if (!seen.has(key)) { seen.add(key); deduped.push(e); }
      }
    });

    // Sort all entries by time
    deduped.sort((a,b)=>timeToMins(a.time)-timeToMins(b.time));
    // entries replaced by deduped below

    // Apply time overrides from rosOverrides
    const overrides = (t.rosOverrides||{})[date] || {};
    deduped.forEach(e => {
      const eKey = e.id || (e.cls+'|'+e.text); // stable key
      if (overrides[eKey]?.time) e.time = overrides[eKey].time;
    });
    // Apply order overrides if any pinned order exists
    const orderMap = {};
    let hasOrder = false;
    Object.entries(overrides).forEach(([k,v]) => { if (v.order != null) { orderMap[k]=v.order; hasOrder=true; } });
    if (hasOrder) {
      deduped.sort((a,b) => {
        const aKey = a.id||(a.cls+'|'+a.text);
        const bKey = b.id||(b.cls+'|'+b.text);
        const aOrd = orderMap[aKey] ?? 999;
        const bOrd = orderMap[bKey] ?? 999;
        if (aOrd !== bOrd) return aOrd - bOrd;
        return timeToMins(a.time) - timeToMins(b.time);
      });
    }
    // Add Start/End of Day sentinels — always first and last
    const sodOverride = (t.rosOverrides||{})[date]?.['sentinel|sod'] || {};
    const eodOverride = (t.rosOverrides||{})[date]?.['sentinel|eod'] || {};

    const sodEntry = {
      time:  sodOverride.time || '00:00',
      icon:  '🌅',
      text:  sodOverride.label || 'Start of Day',
      sub:   '',
      cls:   'sentinel',
      id:    null,
      isSentinel: 'sod'
    };
    const eodEntry = {
      time:  eodOverride.time || '23:59',
      icon:  '🌙',
      text:  eodOverride.label || 'End of Day',
      sub:   '',
      cls:   'sentinel',
      id:    null,
      isSentinel: 'eod'
    };

    // Insert sentinels — SOD always first, EOD always last
    const renderEntries = [sodEntry, ...deduped, eodEntry];
    return renderEntries;
}

function buildRunOfShow(t) {
  // Build map of rosEntries by date
  const manualByDate = {};
  (t.rosEntries||[]).forEach(e => {
    if (!manualByDate[e.date]) manualByDate[e.date] = [];
    manualByDate[e.date].push(e);
  });

  // Gather all days in trip chronologically
  const allDates = [];
  if (t.startDate && t.endDate) {
    let cur = new Date(t.startDate+'T00:00:00');
    const end = new Date(t.endDate+'T00:00:00');
    while (cur <= end) {
      allDates.push(cur.toISOString().split('T')[0]);
      cur.setDate(cur.getDate()+1);
    }
  }

  if (!allDates.length) {
    return `<div class="empty-rich" style="margin:8px 0;"><div class="er-icon">📋</div><div class="er-title">Set your trip dates first</div><div class="er-body">Head to Settings and enter your start and end dates. The Run of Show will auto-build from your parks, flights, hotel check-ins, and dining reservations.</div><button class="btn btn-primary" onclick="setTab('settings')">Go to Settings →</button></div>`;
  }

  const md = t.mealDefaults || blankMealDefaults();

  let html = `
    <div class="card" style="margin-bottom:12px;background:#f0f4ff;border:2px solid #c7d2fe;">
      <div style="font-size:13px;color:#3730a3;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        📋 <strong>Run of Show</strong> — auto-built from your trip data.
        Times editable · Drag to reorder · ⠿ handle to drag
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <button onclick="exportRosMobile()" title="Export for iPhone"
            style="background:#1a1a5e;color:#FFD700;border:none;border-radius:7px;padding:5px 11px;
                   font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;">
            📱 iPhone Export
          </button>
          <a href="${t.tripType==='aulani'?'https://www.disneyaulani.com/resort-activities/':t.tripType==='dlp'?'https://www.disneylandparis.com/en-int/opening-hours-calendar/':'https://disneyworld.disney.go.com/calendars/'}" target="_blank"
            style="font-size:11px;color:#1a1a5e;font-weight:700;white-space:nowrap;">
            ${t.tripType==='aulani'?'🌺 Aulani →':t.tripType==='dlp'?'📅 Park Hours →':'📅 Park Hours →'}
          </a>
        </div>
      </div>
    </div>`;

  allDates.forEach(date => {
    const parkDay = (t.parks||[]).find(d=>d.date===date);
    const renderEntries = rosEntriesForDate(t, date);

    const dateLabel = new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const actDay2 = t.tripType==='aulani' ? (t.activityDays||[]).find(d=>d.date===date) : null;
    const dayNum = parkDay ? `Day ${parkDay.dayNum}` : actDay2 ? `Day ${actDay2.dayNum}` : '';
    const parkBadge = parkDay && parkDay.park!=='rest' && parkDay.park!=='unassigned'
      ? `<span class="park-badge ${parkClass(parkDay.park)}">${parkName(parkDay.park)}</span>`
      : actDay2 ? (actDay2.activities||[actDay2.activity]).filter(Boolean).map(a=>{
          const act=aulaniActivityLabel(a);
          return `<span style="background:${aulaniActivityColor(a)}22;color:${aulaniActivityColor(a)};border:1.5px solid ${aulaniActivityColor(a)}44;border-radius:7px;padding:2px 8px;font-size:11px;font-weight:800;">${act.emoji} ${act.label}</span>`;
        }).join(' ') : '';

    const addFormId = `ros-add-${date}`;
    const showAddForm = S.ui.rosAddDate === date;

    html += `
      <div style="margin-bottom:22px;">
        <div class="ros-day-header" data-ros-date="${date}">
          ${dayNum ? `<span style="background:rgba(255,255,255,.15);border-radius:5px;padding:1px 8px;font-size:12px;">${dayNum}</span>` : ''}
          ${dateLabel}
          ${parkBadge}
          <button class="ros-add-manual" onclick="toggleRosAdd('${date}')" style="margin-left:auto;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#FFD700;">＋ Add Entry</button>
        </div>

        ${showAddForm ? `
        <div class="ros-manual-form">
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
            <div style="flex:0 0 90px;"><label class="lbl" style="font-size:10px;">Time</label>
              <input type="time" id="ros-time-${date}" style="padding:5px 7px;border:1px solid #e4e4f0;border-radius:6px;font-size:12px;font-family:inherit;width:100%;"></div>
            <div style="flex:0 0 auto;position:relative;"><label class="lbl" style="font-size:10px;">Icon</label>
              <input type="hidden" id="ros-icon-${date}" value="📌">
              <button type="button" id="ros-icon-btn-${date}"
                onclick="toggleRosIconPicker('${date}')"
                style="padding:5px 8px;border:1px solid #e4e4f0;border-radius:6px;font-size:18px;

              ${e.cls==='manual'&&e.id?`<button onclick="deleteRosEntry('${e.date}','${e.id}')"

              ${e.isSentinel?`<span style="font-size:9px;color:#ccc;letter-spacing:.05em;">drag items here</span>`:''}

  return html;
}

function to24(timeStr) {
  // Convert "9:00 AM" → "09:00", "10:30 PM" → "22:30"
  if (!timeStr) return '09:00';
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return '09:00';
  let h = parseInt(m[1]), min = m[2];
  const pm = m[3].toUpperCase()==='PM';
  if (pm && h!==12) h+=12;
  if (!pm && h===12) h=0;
  return `${String(h).padStart(2,'0')}:${min}`;
}

function timeToMins(t) {
  if (!t) return 0;
  const m12 = t.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
  if (m12) {
    let h = parseInt(m12[1]), mn = parseInt(m12[2]);
    const pm = m12[3].toUpperCase()==='PM';
    if (pm && h!==12) h+=12;
    if (!pm && h===12) h=0;
    return h*60+mn;
  }
  const m24 = t.match(/^(\d+):(\d+)$/);
  if (m24) return parseInt(m24[1])*60+parseInt(m24[2]);
  return 0;
}
function fmt12(time24) {
  if (!time24) return '';
  const parts = time24.split(':').map(Number);
  const h = parts[0], m = parts[1];
  if (isNaN(h) || isNaN(m)) return '—';
  const ampm = h>=12?'PM':'AM';
  const h12  = h%12||12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function buildWizard() {
  const {step,data} = S.wizard;
  const labels = data.destination==='aulani' ? ['Name','Dates','Aulani','Party','Budget']
               : data.destination==='dlr'    ? ['Name','Dates','Disneyland','Party','Budget']
               : data.destination==='dlp'    ? ['Name','Dates','Disneyland Paris','Party','Budget']
               : ['Name','Dates','Cruise','Party','Budget'];
  return `
    <div class="modal-overlay" onclick="if(event.target===this&&${step}===1)closeWizard()">
      <div class="modal">
        <div class="wiz-prog">
          ${labels.map((l,i)=>`
            ${i>0?`<div class="wiz-line${i<step?' done':''}"></div>`:''}
            <div class="wiz-dot${i+1===step?' active':i+1<step?' done':''}" title="${l}">${i+1<step?'✓':i+1}</div>`).join('')}
        </div>
        ${step===1?buildWiz1():''}${step===2?buildWiz2():''}${step===3?buildWiz3():''}
        ${step===4?buildWiz4():''}${step===5?buildWiz5():''}
        <div style="display:flex;gap:8px;margin-top:20px;align-items:center;">
          ${step>1?`<button class="btn btn-ghost" onclick="wizBack()">← Back</button>`:''}
          <button class="btn btn-ghost" onclick="closeWizard()">Cancel</button>
          <div style="flex:1;"></div>
          ${step<5?`<button class="btn btn-primary" onclick="wizNext()">Next →</button>`:''}
          ${step===5?`<button class="btn btn-gold" onclick="createTrip()">🎉 Create Trip!</button>`:''}
        </div>
      </div>
    </div>`;
}

function wizSetStartDate(val) {
  S.wizard.data.startDate = val;
  // Auto-set end date to start + 7 days if end is before new start
  if (!S.wizard.data.endDate || S.wizard.data.endDate <= val) {
    const d = new Date(val+'T00:00:00');
    d.setDate(d.getDate()+7);
    S.wizard.data.endDate = d.toISOString().split('T')[0];
  }
  render();
}

function addCat() {
  const name        = document.getElementById('cat-name')?.value?.trim();
  const budget      = parseFloat(document.getElementById('cat-budget')?.value)||0;
  const emoji       = S.ui.selectedEmoji||document.getElementById('cat-emoji-custom')?.value||'💡';
  const dueDate     = document.getElementById('cat-due')?.value||'';
  const accountedFor= document.getElementById('cat-accounted')?.checked||false;

  const t = trip();
  patchTrip({budget:{...t.budget,categories:[...t.budget.categories,
    {id:uid(),emoji,name,budgeted:budget,spent:0,transactions:[],dueDate,accountedFor}]}});

function deleteCat(id) {
  if (!confirm('Delete this category?')) return;
  const t=trip();
  patchTrip({budget:{...t.budget,categories:t.budget.categories.filter(c=>c.id!==id)}}, true);
  if (S.ui.spendCatId===id) S.ui.spendCatId=null;
  if (S.ui.editCatId===id)  S.ui.editCatId=null;

}

function logSpend(catId) {
  const amt  = parseFloat(document.getElementById('spend-amt')?.value)||0;
  const note = document.getElementById('spend-note')?.value?.trim()||'';
  const date = document.getElementById('spend-date')?.value||'';
  if (!amt) { alert('Enter an amount (use a negative number for refunds)'); return; }
  const tx = {id:uid(), amount:amt, note, date, createdAt:Date.now()};
  const t  = trip();
  patchTrip({budget:{...t.budget,categories:t.budget.categories.map(c=>{
    if (c.id!==catId) return c;
    const transactions=[...(c.transactions||[]),tx];
    return {...c,transactions,spent:transactions.reduce((s,x)=>s+x.amount,0)};
  })}});
  render(); // keep panel open so user can see the new transaction
  // Re-open the spend panel
  S.ui.spendCatId=catId;
  render();
}

function deleteTx(catId, txId) {
  const t=trip();
  patchTrip({budget:{...t.budget,categories:t.budget.categories.map(c=>{
    if (c.id!==catId) return c;
    const transactions=(c.transactions||[]).filter(tx=>tx.id!==txId);
    return {...c,transactions,spent:transactions.reduce((s,x)=>s+x.amount,0)};
  })}});
  render();
}

function setMode(dir,mode) {
  const t=trip(); const sec={...t.transportation[dir],mode};
  if ((mode==='air'||mode==='train')&&(!sec.legs||!sec.legs.length)) sec.legs=[blankLeg()];
  patchTrip({transportation:{...t.transportation,[dir]:sec}}); render();
}
function toggleTravelerPicker(dir, legIdx) {
  const key = legIdx === '_' ? dir : dir + '_' + legIdx;
  S.ui.travelerPickerKey = S.ui.travelerPickerKey === key ? null : key;
  render();
}
function toggleLegTraveler(dir, legIdx, memberId) {
  const t = trip();
  const tr = JSON.parse(JSON.stringify(t.transportation));
  const leg = tr[dir]?.legs?.[legIdx];
  if (!leg) return;
  const travelers = leg.travelers || [];
  leg.travelers = travelers.includes(memberId)
    ? travelers.filter(id => id !== memberId)
    : [...travelers, memberId];
  patchTrip({ transportation: tr }, true); render();
}
function toggleExtraLegTraveler(dir, groupIdx, legIdx, memberId) {
  const t = trip();
  const tr = JSON.parse(JSON.stringify(t.transportation));
  const key = 'extra' + dir.charAt(0).toUpperCase() + dir.slice(1);
  const leg = tr[key]?.[groupIdx]?.legs?.[legIdx];
  if (!leg) return;
  const travelers = leg.travelers || [];
  leg.travelers = travelers.includes(memberId)
    ? travelers.filter(id => id !== memberId)
    : [...travelers, memberId];
  patchTrip({ transportation: tr }, true); render();
}
function addExtraFlight(dir) {
  const t = trip();
  const tr = JSON.parse(JSON.stringify(t.transportation));
  const key = 'extra' + dir.charAt(0).toUpperCase() + dir.slice(1);
  if (!tr[key]) tr[key] = [];
  tr[key].push({ mode: 'air', legs: [blankLeg()] });
  patchTrip({ transportation: tr }, true); render();
}
function removeExtraFlight(dir, idx) {
  if (!confirm('Remove this flight booking?')) return;
  const t = trip();
  const tr = JSON.parse(JSON.stringify(t.transportation));
  const key = 'extra' + dir.charAt(0).toUpperCase() + dir.slice(1);
  tr[key] = (tr[key] || []).filter((_,i) => i !== idx);
  patchTrip({ transportation: tr }, true); render();
}
function addExtraLegItem(dir, groupIdx) {

  S.ui.swapSelected = [];

function selectSwapDay(i) {
  const sel = S.ui.swapSelected || [];
  // Deselect if already selected
  if (sel.includes(i)) {
    S.ui.swapSelected = sel.filter(function(x){ return x !== i; });
    render();
    return;
  }
  if (sel.length === 0) {
    S.ui.swapSelected = [i];
    render();
    return;
  }
  if (sel.length === 1) {
    const a = sel[0], b = i;
    const t = trip();
    const parks = t.parks.slice();
    const dateA = parks[a].date, dayNumA = parks[a].dayNum;
    const dateB = parks[b].date, dayNumB = parks[b].dayNum;
    // Swap all content, preserve each day's date and dayNum
    parks[a] = Object.assign({}, parks[b], { date: dateA, dayNum: dayNumA });
    parks[b] = Object.assign({}, t.parks[a], { date: dateB, dayNum: dayNumB });
    S.ui.swapMode = false;
    S.ui.swapSelected = [];
    patchTrip({ parks: parks }, true);
    render();
    // Flash both cards
    setTimeout(function() {
      [a, b].forEach(function(idx) {
        var el = document.getElementById('day-' + idx);
        if (!el) return;
        el.style.transition = 'box-shadow .3s';
        el.style.boxShadow = '0 0 0 3px #7c3aed, 0 0 0 6px #c4b5fd';
        setTimeout(function(){ el.style.boxShadow = ''; }, 1400);
      });
    }, 100);
  }
}

function toggleDayLock(i) {
  const t = trip();
  // Collapse LL and meal panels when locking
  if (!t.parks[i]?.locked) {
    S.ui.expandedLLDay = null;
    S.ui.expandedMealDay = null;
  }
  const parks=[...t.parks];
  parks[i]={...parks[i], locked:!parks[i].locked};
  patchTrip({parks}, true); render();
}
function updPark(i,field,val) {
  const t=trip(); const parks=[...t.parks];
  if (field==='park') {
    // Reset ride picks when park changes; preserve party size & prices
    if (t.tripType==='dlp') {
      const oldPA = parks[i].ll || blankPA();
      parks[i]={...parks[i], park:val, ll:{...blankPA(), partySize:oldPA.partySize, ultimateTier:oldPA.ultimateTier, ultimatePrice:oldPA.ultimatePrice}};
    } else {
      const oldLL = parks[i].ll || blankLL();
      parks[i]={...parks[i], park:val, ll:{...blankLL(), partySize:oldLL.partySize, llmpPrice:oldLL.llmpPrice, premierPrice:oldLL.premierPrice}};
    }
  } else {
    parks[i]={...parks[i],[field]:val};
  }
  patchTrip({parks}); persist();
  if (field==='park') render();
}

function setLLPassType(i,passType) {

  parks[i]={...parks[i], ll:{...ll, passType, partySize:newPS}};
  patchTrip({parks}, true); render();
}

function setLLTier1(i,ri) {
  const t=trip(); const parks=[...t.parks];
  const ll=parks[i].ll||blankLL();
  const pd=LL_DATA[parks[i].park];
