<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Skipper Tripper v1.0</title>
<link rel="icon" href="data:,">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,sans-serif;background:#f0f2f8;min-height:100vh;color:#1a1a2e}

/* -- Header -- */
.app-header{background:#1a1a5e;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.header-top{display:flex;align-items:center;padding:10px 20px 0;gap:10px}
.header-logo{font-size:22px}
.header-title{color:#FFD700;font-size:19px;font-weight:900;letter-spacing:.4px}
.trip-name-area{color:#ccd;font-size:13px;display:flex;align-items:center;gap:5px;cursor:pointer}
.trip-name-area:hover .trip-name-text{border-bottom-color:#FFD700}
.trip-name-text{border-bottom:1px dashed rgba(255,215,0,.35);transition:border-color .2s}
.trip-name-input{background:transparent;border:none;border-bottom:1px solid #FFD700;color:#FFD700;font-size:13px;font-family:inherit;outline:none;min-width:180px;padding:1px 2px}

/* -- Trip Tabs -- */
.trip-tabs-row{display:flex;align-items:flex-end;padding:6px 20px 0;gap:3px;overflow-x:auto;scrollbar-width:none}
.trip-tabs-row::-webkit-scrollbar{display:none}
.trip-tab{background:rgba(255,255,255,.1);color:#bbb;padding:7px 15px;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;border:none;font-family:inherit;transition:all .15s;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.trip-tab:hover{background:rgba(255,255,255,.2);color:#fff}
.trip-tab.active{background:#f0f2f8;color:#1a1a5e;font-weight:900}
.trip-tab-add{background:transparent;color:#FFD700;padding:7px 12px;border-radius:8px 8px 0 0;cursor:pointer;font-size:20px;font-weight:700;border:none;font-family:inherit;line-height:1;flex-shrink:0}

/* -- Nav Tabs -- */
.nav-tabs{background:#fff;border-bottom:2px solid #e0e0f0;display:flex;padding:0 20px;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:11px 16px;font-size:13px;font-weight:700;color:#777;cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:#1a1a5e}
.nav-tab.active{color:#1a1a5e;border-bottom-color:#FFD700}

/* -- Main -- */
.main-content{max-width:980px;margin:0 auto;padding:22px 16px}

/* -- Cards -- */
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;margin-bottom:20px}
.card-header{font-size:17px;font-weight:900;color:#1a1a5e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-label{font-size:12px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

/* -- Stats -- */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#1a1a5e;color:#fff;border-radius:14px;padding:18px;text-align:center}
.stat-value{font-size:34px;font-weight:900;color:#FFD700;line-height:1}
.stat-label{font-size:12px;color:#a0b0d0;margin-top:5px;font-weight:600}

/* -- Progress Bar -- */
.prog-wrap{background:#e8e8f2;border-radius:99px;height:7px;overflow:hidden;flex:1}
.prog-fill{height:100%;border-radius:99px;transition:width .3s}
.prog-green{background:#22c55e}
.prog-yellow{background:#f59e0b}
.prog-red{background:#ef4444}

/* -- Tables -- */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:2px solid #eeeef8}
td{padding:10px;border-bottom:1px solid #f2f2fa;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row-hover:hover td{background:#f7f7ff;cursor:pointer}

/* -- Buttons -- */
.btn{padding:8px 16px;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#1a1a5e;color:#FFD700}
.btn-primary:hover{background:#252580}
.btn-gold{background:#FFD700;color:#1a1a5e}
.btn-gold:hover{background:#ffc800}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-danger:hover{background:#fecaca}
.btn-ghost{background:transparent;color:#555;border:2px solid #dde}
.btn-ghost:hover{border-color:#1a1a5e;color:#1a1a5e}
.btn-dashed{background:none;border:2px dashed #dde;color:#aaa;border-radius:8px;padding:8px 16px;width:100%;justify-content:center;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-dashed:hover{border-color:#1a1a5e;color:#1a1a5e}
.btn-edit{background:#f0f0ff;color:#1a1a5e;border:none}
.btn-edit:hover{background:#e0e0ff}

/* -- Toggle buttons -- */
.toggle-group{display:flex;gap:4px;flex-wrap:wrap}
.tog-btn{padding:7px 16px;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;border:2px solid #dde;background:#fff;color:#666;transition:all .15s}
.tog-btn:hover{border-color:#1a1a5e;color:#1a1a5e}
.tog-btn.active{background:#1a1a5e;color:#FFD700;border-color:#1a1a5e}

/* -- Budget pills -- */
.bpills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.bpill{padding:9px 18px;border-radius:10px;font-weight:800;font-size:14px}
.bpill-blue{background:#eff6ff;color:#1d4ed8}
.bpill-red{background:#fef2f2;color:#dc2626}
.bpill-green{background:#f0fdf4;color:#16a34a}

/* -- Modals -- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:#fff;border-radius:20px;padding:26px;max-width:520px;width:100%;max-height:92vh;overflow-y:auto}
.modal-h{font-size:21px;font-weight:900;color:#1a1a5e;margin-bottom:6px}
.modal-sub{font-size:13px;color:#888;margin-bottom:18px}

/* -- Forms -- */
.fg{margin-bottom:13px}
label.lbl{font-size:12px;font-weight:800;color:#666;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{width:100%;padding:9px 11px;border:2px solid #e4e4f0;border-radius:8px;font-family:inherit;font-size:13px;color:#1a1a2e;outline:none;transition:border-color .15s;background:#fff}
input:focus,select:focus,textarea:focus{border-color:#1a1a5e}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
input[type=range]{width:100%;accent-color:#1a1a5e;margin-top:4px}
input[type=checkbox]{width:auto;accent-color:#1a1a5e;width:16px;height:16px;cursor:pointer}

/* -- Wizard progress -- */
.wiz-prog{display:flex;align-items:center;gap:3px;margin-bottom:22px}
.wiz-dot{width:26px;height:26px;border-radius:50%;background:#eee;color:#aaa;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.wiz-dot.active{background:#1a1a5e;color:#FFD700}
.wiz-dot.done{background:#22c55e;color:#fff}
.wiz-line{flex:1;height:2px;background:#eee;transition:background .2s}
.wiz-line.done{background:#22c55e}

/* -- Chips -- */
.chip{display:inline-block;padding:5px 12px;background:#f4f4ff;border:2px solid #e4e4f4;border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;margin:3px;transition:all .15s;color:#555}
.chip:hover,.chip.sel{background:#1a1a5e;color:#FFD700;border-color:#1a1a5e}

/* -- Emoji picker -- */
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0}
.emoji-btn{width:36px;height:36px;border:2px solid #e4e4f0;border-radius:7px;background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-btn:hover,.emoji-btn.sel{border-color:#1a1a5e;background:#f0f0ff}

/* -- Status badges -- */
.sbadge{padding:3px 9px;border-radius:18px;font-size:11px;font-weight:800;cursor:pointer;display:inline-block;white-space:nowrap}
.s-confirmed{background:#dcfce7;color:#15803d}
.s-pending{background:#fef9c3;color:#a16207}
.s-na{background:#f3f4f6;color:#9ca3af}
.s-waitlisted{background:#fef3c7;color:#b45309}
.s-cancelled{background:#fee2e2;color:#dc2626}

/* -- Timeline card -- */
.timeline-card{background:linear-gradient(135deg,#1a1a5e 0%,#2d2d8f 100%);border-radius:14px;padding:18px;color:#fff;margin-top:14px}
.tl-step{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.tl-step:last-child{border-bottom:none}
.tl-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.tl-label{font-size:12px;color:#9090c0;margin-top:1px}
.tl-time{font-size:19px;font-weight:900;color:#FFD700;margin-left:auto;white-space:nowrap}

/* -- Leg card -- */
.leg-card{border:2px solid #e4e4f0;border-radius:12px;padding:15px;margin-top:10px;position:relative}
.leg-title{font-size:11px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.leg-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;cursor:pointer;font-size:17px;line-height:1}
.leg-remove:hover{color:#ef4444}

/* -- Park badges -- */
.park-badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:800}
.p-mk{background:#fef3c7;color:#92400e}
.p-ep{background:#dbeafe;color:#1e40af}
.p-hs{background:#fce7f3;color:#9d174d}
.p-ak{background:#dcfce7;color:#14532d}
.p-ds{background:#f3e8ff;color:#6b21a8}
.p-wp{background:#e0f2fe;color:#0c4a6e}
.p-dp{background:#ede9fe;color:#5b21b6}
.p-daw{background:#cffafe;color:#0e7490}
.p-rest{background:#f1f5f9;color:#475569}.p-travel{background:#dbeafe;color:#1d4ed8}
.p-unassigned{background:#fef9c3;color:#92400e}
.p-dcl-embark{background:#dbeafe;color:#1e3a8a}
.p-dcl-sea{background:#e0f2fe;color:#0c4a6e}
.p-dcl-port{background:#fef3c7;color:#92400e}
.p-dcl-disembark{background:#dcfce7;color:#14532d}
.dcl-afternoon{background:rgba(255,255,255,.75);border-top:1px dashed #bbf7d0;padding:6px 11px;display:flex;align-items:center;gap:8px;font-size:12px;flex-wrap:wrap}

/* -- Transaction history -- */
.spend-panel{background:#f8f8ff;border-radius:12px;padding:14px;margin-top:8px;border:2px solid #e8e8f8}
.tx-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eeeef8;font-size:12px}
.tx-row:last-child{border-bottom:none}
.tx-amount{font-weight:800;color:#1a1a5e;min-width:55px}
.tx-note{flex:1;color:#666}
.tx-date{color:#aaa;font-size:11px;white-space:nowrap}

/* -- Cat edit row -- */
.cat-edit-panel{background:#f0f0ff;border-radius:12px;padding:14px;margin-top:8px;border:2px solid #d0d0f0}

/* -- Park day row -- */
.park-day-row{display:grid;grid-template-columns:52px 85px 1fr 1fr;gap:7px;align-items:center;padding:8px 11px;border-radius:10px;border-left:4px solid #e2e8f0}

/* -- Misc -- */
.empty-state{text-align:center;padding:36px 20px;color:#bbb}
.empty-state .ei{font-size:44px;margin-bottom:10px}
.danger-zone{border:2px dashed #fca5a5;border-radius:12px;padding:16px}
.overview-park-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8f8ff;border-radius:9px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:13px}

/* -- Welcome Banner -- */
.welcome-banner{background:linear-gradient(135deg,#1a1a5e 0%,#2d2d8f 60%,#3d1a5e 100%);border-radius:20px;padding:32px 28px;margin-bottom:22px;text-align:center;box-shadow:0 6px 28px rgba(26,26,94,.3);}
.welcome-banner h2{color:#FFD700;font-size:26px;font-weight:900;margin-bottom:8px;}
.welcome-banner p{color:#a0b0d0;font-size:14px;max-width:440px;margin:0 auto 20px;}

/* -- Setup Checklist -- */
.setup-checklist{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:20px;margin-bottom:20px;}
.checklist-title{font-size:15px;font-weight:900;color:#1a1a5e;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.checklist-sub{font-size:12px;color:#aaa;margin-bottom:16px;}
.checklist-progress-bar{background:#e8e8f2;border-radius:99px;height:8px;margin-bottom:16px;overflow:hidden;}
.checklist-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width .4s;}
.checklist-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s;text-decoration:none;border:none;width:100%;text-align:left;font-family:inherit;}
.checklist-item:hover{background:#f5f5ff;}
.checklist-item.done{opacity:.6;}
.checklist-item.done .ci-text{text-decoration:line-through;color:#aaa;}
.ci-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
.ci-check{width:22px;height:22px;border-radius:50%;border:2px solid #e0e0f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;margin-left:auto;}
.ci-check.done{background:#22c55e;border-color:#22c55e;color:#fff;}
.ci-text{font-size:13px;font-weight:700;color:#1a1a2e;}
.ci-hint{font-size:11px;color:#aaa;margin-top:1px;}

/* -- Tab hint banner -- */
.tab-hint{display:flex;align-items:center;gap:10px;background:#fffbeb;border:2px solid #fde68a;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:#92400e;}
.tab-hint .th-icon{font-size:20px;flex-shrink:0;}
.tab-hint strong{font-weight:800;}

/* -- Rich empty state -- */
.empty-rich{text-align:center;padding:32px 20px;background:#f8f8ff;border-radius:14px;border:2px dashed #e0e0f4;}
.empty-rich .er-icon{font-size:48px;margin-bottom:12px;}
.empty-rich .er-title{font-size:15px;font-weight:900;color:#1a1a5e;margin-bottom:6px;}
.empty-rich .er-body{font-size:13px;color:#888;max-width:320px;margin:0 auto 16px;line-height:1.5;}

/* -- Departure Planner Clock Button -- */
.dp-clock-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;border:2px solid #1a1a5e;background:#fff;color:#1a1a5e;transition:all .15s;white-space:nowrap;}
.dp-clock-btn:hover{background:#1a1a5e;color:#FFD700;}
.dp-clock-btn:disabled{border-color:#dde;color:#bbb;cursor:not-allowed;background:#f8f8ff;}
.dp-clock-btn:disabled:hover{background:#f8f8ff;color:#bbb;}
.dp-locked-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:800;background:#dcfce7;color:#15803d;border:2px solid #86efac;cursor:pointer;white-space:nowrap;}
.dp-locked-badge:hover{background:#bbf7d0;}

/* -- Departure Planner Modal -- */
.dp-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.dp-modal{background:#fff;border-radius:22px;padding:28px;max-width:500px;width:100%;max-height:94vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.dp-modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.dp-modal-title{font-size:20px;font-weight:900;color:#1a1a5e;}
.dp-modal-sub{font-size:13px;color:#888;margin-bottom:20px;}
.dp-modal-close{background:none;border:none;font-size:22px;color:#bbb;cursor:pointer;line-height:1;padding:0 2px;}
.dp-modal-close:hover{color:#1a1a5e;}
.dp-result-card{background:linear-gradient(135deg,#1a1a5e 0%,#2d2d8f 100%);border-radius:14px;padding:18px;color:#fff;margin:16px 0;}
.dp-result-step{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.dp-result-step:last-child{border-bottom:none;}
.dp-result-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
.dp-result-time{font-size:20px;font-weight:900;color:#FFD700;margin-left:auto;white-space:nowrap;}
.dp-result-label{font-size:12px;color:#9090c0;margin-top:1px;}
.dp-send-btn{background:#FFD700;color:#1a1a5e;border:none;border-radius:10px;padding:13px 22px;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;width:100%;margin-top:4px;transition:all .15s;}
.dp-send-btn:hover{background:#ffc800;transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,215,0,.4);}
.dp-send-btn:disabled{background:#e0e0f0;color:#aaa;cursor:not-allowed;transform:none;box-shadow:none;}

/* -- Scrollbar -- */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f0f2f8}
::-webkit-scrollbar-thumb{background:#c8c8e0;border-radius:3px}

/* -- Budget drag -- */
.budget-drag-over{border-top:2px solid #6366f1!important;background:#f5f3ff!important;}
/* -- Lightning Lane -- */
.ll-wrap{border-radius:10px;margin-bottom:6px;overflow:hidden}
.ll-day-pill{background:#7c3aed;color:#fff;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ll-day-pill:hover{background:#6d28d9}
.ll-day-pill.active{background:#FFD700;color:#1a1a5e}
.ll-section{background:#f5f0ff;border-top:2px solid #e0c8ff;padding:14px 16px 14px}
.ll-label{font-size:11px;font-weight:800;color:#9333ea;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px;display:block}
.ll-pass-btn{padding:6px 12px;border-radius:8px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;border:2px solid #dde;background:#fff;color:#666;transition:all .15s}
.ll-pass-btn:hover{border-color:#7c3aed;color:#7c3aed}
.ll-pass-btn.active{background:#7c3aed;color:#FFD700;border-color:#7c3aed}
.ll-ride-label{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;font-weight:600;color:#3b0764;cursor:pointer}
.ll-cost-box{background:#3b0764;color:#fff;border-radius:10px;padding:11px 14px;margin-top:10px;font-size:12px}
.ll-t1{background:#ddd6fe;color:#4c1d95;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;white-space:nowrap}
.ll-t2{background:#c4b5fd;color:#4c1d95;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;white-space:nowrap}
.ll-ill{background:#fde68a;color:#78350f;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;white-space:nowrap}
.ll-ill-price{width:60px;padding:3px 6px;border:1px solid #ddd6fe;border-radius:5px;font-size:12px;text-align:center;font-family:inherit;background:#fff}
.ll-trip-cost{background:#f5f0ff;border:2px solid #ddd6fe;border-radius:9px;padding:5px 13px;font-size:12px;font-weight:800;color:#6b21a8}

/* -- Meals -- */
.meal-day-pill{background:#16a34a;color:#fff;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0}
.meal-day-pill:hover{background:#15803d}
.meal-day-pill.active{background:#FFD700;color:#1a1a5e}
.meal-section{background:#f0fdf4;border-top:2px solid #bbf7d0;padding:14px 16px}
.meal-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:6px 0 4px;border-bottom:none}
.meal-row:last-of-type{border-bottom:none}
.meal-trip-cost{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:9px;padding:5px 13px;font-size:12px;font-weight:800;color:#16a34a}

/* -- Day Extras (Early Entry / Late Stay / After Hours) -- */
.day-extras-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:5px 11px 6px;border-top:1px dashed #e8e8f0;}
.day-extra-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:2px solid #eee;background:#f5f5f5;color:#bbb;transition:all .15s;user-select:none;}
.day-extra-chip:hover{border-color:#888;color:#555;}
.day-extra-ee.on{background:#fef9c3;color:#854d0e;border-color:#fbbf24;}
.day-extra-ls.on{background:#e0f2fe;color:#075985;border-color:#38bdf8;}
.day-extra-ah.on{background:#fae8ff;color:#701a75;border-color:#d946ef;}

/* -- Park Hops -- */
.parkhop-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:5px 11px 7px;border-top:1px dashed #e8e8f0;background:rgba(255,255,255,.6);}
.parkhop-item{display:flex;align-items:center;gap:4px;}
.btn-parkhop-add{background:none;border:2px dashed #c8c8e0;color:#aaa;border-radius:7px;padding:3px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-parkhop-add:hover{border-color:#1a1a5e;color:#1a1a5e;}
.btn-parkhop-rm{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px;line-height:1;}
.btn-parkhop-rm:hover{color:#ef4444;}

/* -- Locked Day Card -- */
.day-locked-card{border-radius:10px;overflow:hidden;margin-bottom:6px;}
.day-locked-header{display:flex;flex-wrap:wrap;align-items:center;gap:7px;padding:9px 12px;cursor:default;}
.day-locked-section{padding:7px 14px;border-top:1px solid rgba(0,0,0,.06);font-size:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;}
.day-locked-section-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-right:2px;}
.day-lock-btn{background:none;border:1px solid #d0d0e0;border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer;color:#888;transition:all .15s;font-family:inherit;margin-left:auto;white-space:nowrap;}
.day-lock-btn:hover{background:#f0f0ff;border-color:#1a1a5e;color:#1a1a5e;}
.day-lock-btn.locked{background:#1a1a5e;color:#FFD700;border-color:#1a1a5e;}

/* -- Countdown -- */
.countdown-card{background:linear-gradient(135deg,#1a1a5e 0%,#2d2d8f 50%,#3d1a5e 100%);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:20px;box-shadow:0 4px 24px rgba(26,26,94,.35);}
.countdown-grid{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
.countdown-unit{display:flex;flex-direction:column;align-items:center;min-width:64px;}
.countdown-num{font-size:46px;font-weight:900;color:#FFD700;line-height:1;font-variant-numeric:tabular-nums;-webkit-text-stroke:1px rgba(255,200,0,.3);}
.countdown-lbl{font-size:11px;font-weight:800;color:#7070c0;text-transform:uppercase;letter-spacing:.6px;margin-top:3px;}
.countdown-sep{font-size:40px;font-weight:900;color:#3030a0;line-height:1;padding-top:4px;}
.countdown-title{font-size:13px;font-weight:800;color:#9090d0;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;}
.remaining-pay-card{background:#fff8e1;border:2px solid #FFD700;border-radius:16px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.remaining-pay-amount{font-size:36px;font-weight:900;color:#1a1a5e;line-height:1;}
.remaining-pay-label{font-size:13px;font-weight:700;color:#888;margin-top:3px;}

/* -- Run of Show -- */
.ros-day-header{background:#1a1a5e;color:#FFD700;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.ros-entry{display:flex;gap:10px;padding:6px 0;border-left:3px solid #e4e4f0;margin-left:12px;padding-left:12px;align-items:flex-start;transition:background .1s;cursor:grab;}
.ros-entry *{pointer-events:none;}
.ros-entry .ros-time-btn,.ros-entry button,.ros-entry input{pointer-events:auto;}
.ros-entry.dragging{opacity:.4;background:#f0f0ff;}
.ros-entry.drag-over{border-top:2px solid #FFD700;}
.ros-drag-handle{cursor:grab;color:#ccc;font-size:14px;flex-shrink:0;padding:2px 0;user-select:none;line-height:1.4;}
.ros-drag-handle:active{cursor:grabbing;}
.ros-time-btn{background:none;border:none;border-bottom:1px dashed #bbb;cursor:pointer;font-size:12px;font-weight:800;color:#1a1a5e;font-family:inherit;padding:0;min-width:62px;text-align:left;transition:border-color .15s;}
.ros-time-btn:hover{border-bottom-color:#FFD700;color:#333;}
.ros-time-input{font-family:inherit;font-size:12px;font-weight:800;color:#1a1a5e;border:none;border-bottom:2px solid #FFD700;background:transparent;outline:none;width:80px;padding:0;}
.ros-entry:hover{background:#f8f8ff;border-radius:0 8px 8px 0;}
.ros-time{font-size:12px;font-weight:800;color:#1a1a5e;min-width:62px;flex-shrink:0;padding-top:1px;}
.ros-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.ros-text{flex:1;}
.ros-text-main{font-size:13px;font-weight:700;color:#1a1a2e;}
.ros-text-sub{font-size:11px;color:#888;margin-top:1px;}
.ros-entry.auto{border-left-color:#c8d0e8;}
.ros-entry.manual{border-left-color:#FFD700;}
.ros-entry.meal{border-left-color:#22c55e;}
.ros-entry.ll{border-left-color:#7c3aed;}
.ros-entry.hotel{border-left-color:#f59e0b;}
.ros-entry.flight{border-left-color:#3b82f6;}
.ros-entry.sentinel{border-left-color:#e4e4f0;opacity:.5;font-style:italic;}
.ros-entry.sentinel:hover{opacity:.8;}
.ros-add-manual{background:none;border:2px dashed #e4e4f0;border-radius:7px;padding:4px 12px;font-size:11px;font-weight:700;color:#bbb;cursor:pointer;margin:3px 0 3px 25px;font-family:inherit;transition:all .15s;}
.ros-add-manual:hover{border-color:#1a1a5e;color:#1a1a5e;}
.ros-manual-form{background:#f8f8ff;border:2px solid #e4e4f0;border-radius:10px;padding:12px 14px;margin:4px 0 4px 25px;}
.traffic-input{width:70px;padding:3px 7px;border:1px solid #dde;border-radius:5px;font-size:12px;font-family:inherit;text-align:center;}

/* -- Hotel -- */
.hotel-leg-card{border:2px solid #e4e4f0;border-radius:14px;padding:16px;margin-bottom:12px;position:relative;background:#fff;}
.hotel-leg-label{font-size:11px;font-weight:900;color:#f59e0b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:13px;display:flex;align-items:center;gap:7px;}
.resort-badge{display:inline-block;background:#fef3c7;color:#92400e;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800;}

/* -- ADR Fields -- */
.adr-row{display:flex;gap:6px;align-items:center;padding:4px 0;flex-wrap:wrap;}
.adr-badge{display:inline-flex;align-items:center;gap:4px;background:#dcfce7;color:#15803d;border-radius:18px;padding:2px 10px;font-size:10px;font-weight:800;}
.adr-badge.unbooked{background:#f3f4f6;color:#9ca3af;}

/* -- Hours badge -- */
.hours-badge{display:inline-block;background:#eff6ff;color:#1e40af;border-radius:5px;padding:1px 8px;font-size:10px;font-weight:800;white-space:nowrap;}
.hours-badge.mk{background:#fef9c3;color:#92400e;}
.hours-badge.ep{background:#dbeafe;color:#1e40af;}
.hours-badge.hs{background:#fce7f3;color:#9d174d;}
.hours-badge.ak{background:#dcfce7;color:#14532d;}
.hours-badge.dp{background:#ede9fe;color:#5b21b6;}
.hours-badge.daw{background:#cffafe;color:#0e7490;}

/* -- Responsive -- */
@media print{
  .app-header,.nav-tabs,.no-print,[class*="trip-tabs"]{display:none !important}
  .card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  body{background:#fff}
}
@media(max-width:600px){
  input,select,textarea{font-size:16px !important;} /* stop iOS focus-zoom */
  .card{padding:14px 12px;border-radius:14px}
  .bpills{display:grid !important;grid-template-columns:1fr 1fr;gap:6px}
  /* Budget table becomes stacked cards on phones */
  .budget-tbl, .budget-tbl tbody, .budget-tbl tr, .budget-tbl td{display:block;width:100%;box-sizing:border-box}
  .budget-tbl thead{display:none}
  .budget-tbl tbody tr{border:1.5px solid #eee;border-radius:12px;padding:10px 12px;margin-bottom:10px;background:#fff}
  .budget-tbl td{border:none;padding:4px 0}
  .budget-tbl td[data-l]{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .budget-tbl td[data-l]::before{content:attr(data-l);font-size:10.5px;color:#999;text-transform:uppercase;letter-spacing:.5px;font-weight:800;flex-shrink:0}
  .budget-tbl td.mb-empty{display:none}
  .budget-tbl td.mb-prog{padding-top:7px}
  .budget-tbl td.mb-acts{padding-top:8px;border-top:1px dashed #eee;margin-top:5px}
  .budget-tbl td.mb-acts .btn{padding:8px 12px;font-size:12px}
  .budget-tbl tr.spend-inline{border:none;background:transparent;padding:0;margin:-4px 0 10px}
  .budget-tbl tr.spend-inline td{padding:0}
  /* ── whole-app mobile pass ── */
  .main-content{overflow-x:hidden}
  .card-header{font-size:15px;margin-bottom:12px}
  th{padding:7px 6px;font-size:10px}
  td{padding:8px 6px;font-size:12.5px}
  .hdr-cta{top:8px !important;right:8px !important;gap:4px !important}
  .hdr-cta button{padding:4px 8px !important;font-size:10px !important;border-radius:7px !important}
  /* input tables (Early Entry, Dining) scroll sideways instead of crushing */
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
  .tbl-scroll table{min-width:560px}
  /* spend panel fields stack two-up */
  .spend-panel div[style*="flex:0 0 110px"],.spend-panel div[style*="flex:0 0 120px"]{flex:1 1 45% !important}
  /* itinerary planner day rows: park + LL columns stack */
  .pd-grid{grid-template-columns:44px 58px 1fr !important;gap:6px !important}
  .pd-grid > :nth-child(4){grid-column:2 / -1}
  .pd-grid > :nth-child(5){grid-column:1 / -1}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .main-content{padding:14px 10px}
  .bpills{flex-direction:column}
  .header-top{padding:6px 12px 0}
  .header-logo{font-size:18px}
  .header-title{font-size:16px}
  .trip-tabs-row{padding:3px 12px 0}
  .nav-tabs{padding:0 10px;-webkit-overflow-scrolling:touch}
  .nav-tab{padding:10px 12px;font-size:12.5px}
  .park-day-row{grid-template-columns:48px 1fr;grid-template-rows:auto auto}
  .info-grid{grid-template-columns:1fr}
}

function makeActivityDays(startDate, endDate) {
  const start = new Date(startDate + 'T00:00:00');
  const end   = new Date(endDate   + 'T00:00:00');
  const days  = [];
  let cur = new Date(start), n = 1;
  while (cur <= end) {
    const dateStr = cur.toISOString().split('T')[0];
    const isFirst = n === 1;
    const isLast  = cur.getTime() === end.getTime();
    days.push({
      id: uid(), date: dateStr, dayNum: n,
      activities: [isFirst ? 'arrival' : isLast ? 'departure' : 'pool'],
      notes: '', meals: blankMeals(), cost: null, locked: false,
      offsiteDetail: '', offsiteCustom: '',
    });
    cur.setDate(cur.getDate() + 1);
    n++;
  }
  return days;
}

// --- persistence -----------------------------------

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      S.trips = p.trips || [];
      S.currentTripId = p.currentTripId || null;
      migrateAllTrips();
    }
  } catch(e) {}
  if (!S.trips.length) {
    const t = makeDefaultTrip();
    S.trips = [t];
    S.currentTripId = t.id;
    persist();
    // Auto-open wizard on first ever launch
    S.wizard = { open: true, step: 1, data: {} };
  } else if (!S.currentTripId || !S.trips.find(t => t.id === S.currentTripId)) {
    S.currentTripId = S.trips[0].id;
  }
}

// Migrate old trip data to new schema
function migrateAllTrips() {
  S.trips = S.trips.map(t => {
    // Add missing top-level fields
    if (!t.resort) t.resort = blankResort();
    if (!t.diningReservations) t.diningReservations = [];
    if (!t.transportation.groundReturn) {
      t.transportation.groundReturn = { option: 'Uber / Lyft', notes: '', estTime: '' };
    }
    if (!t.transportation.departurePlanner.direction) {
      t.transportation.departurePlanner.direction = 'return';
    }
    if (!t.transportation.departurePlanner.airport) {
      t.transportation.departurePlanner.airport = '';
    }
    if (!t.transportation.departurePlanner.getReadyMins) {
      t.transportation.departurePlanner.getReadyMins = 60;
    }
    // Add trip-level fields if missing
    if (!t.partySize) t.partySize = 4;
    if (!t.partyMembers) t.partyMembers = [];
    if (!t.mealDefaults) t.mealDefaults = blankMealDefaults();
    if (!t.cruiseShip) t.cruiseShip = '';
    if (t.cruise && !t.cruiseLine) t.cruiseLine = 'Disney Cruise Line';
    // Hotel legs: migrate from old resort object
    if (!t.hotelLegs) {
      const r = t.resort;
      if (r && r.name) {
        t.hotelLegs = [{ id:uid(), name:r.name, checkInDate:r.checkInDate||'', checkInTime:'14:00',
          checkOutDate:r.checkOutDate||'', confirmationNum:r.confirmationNum||'',
          roomType:r.roomType||'', resortArea:r.resortArea||'' }];
      } else {
        t.hotelLegs = [];
      }
    }
    if (!t.rosEntries) t.rosEntries = [];
    if (!t.rosTransit) t.rosTransit = {};
    if (!t.rosOverrides) t.rosOverrides = {};
    if (!t.eeEntries) t.eeEntries = [];
    if (!t.checklistStatus) t.checklistStatus = {};
    if (!t.suitcases) t.suitcases = [];
    if (!t.departurePlans) t.departurePlans = {};
    if (!t.transportation.extraOutbound) t.transportation.extraOutbound = [];
    if (!t.transportation.extraReturn) t.transportation.extraReturn = [];
    if (t.hotelLegs) t.hotelLegs = t.hotelLegs.map(l => ({ locked: false, ...l, travelers: l.travelers||[] }));
    // Add ll, meals, parkHops, dayExtras, locked to park days if missing
    if (Array.isArray(t.parks)) {
      t.parks = t.parks.map(d => {
        // Migrate afternoonPark → parkHops[0]
        let parkHops = d.parkHops || [];
        if (d.afternoonPark && d.afternoonPark !== '' && parkHops.length === 0) {
          parkHops = [d.afternoonPark];
        }
        // Migrate meal ADR fields
        const meals = d.meals || blankMeals();
        ['breakfast','lunch','dinner','snacks'].forEach(k => {
          if (!meals[k]) meals[k] = { place:'', cost:null, adrTime:'', adrConfNum:'', adrBooked:false };
          if (meals[k].adrTime    === undefined) meals[k].adrTime    = '';
          if (meals[k].adrConfNum === undefined) meals[k].adrConfNum = '';
          if (meals[k].adrBooked  === undefined) meals[k].adrBooked  = false;
        });
        return {
          ...d,
          ll:        d.ll    || blankLL(),
          meals,
          parkHops,
          dayExtras: d.dayExtras || blankDayExtras(),
          locked:    d.locked ?? false
        };
      });
    }
    // Migrate budget categories: move legacy spent → transactions, add new fields
    t.budget.categories = t.budget.categories.map(c => {
      if (!c.transactions) {
        c.transactions = [];
        if (c.spent && c.spent > 0) {
          c.transactions.push({ id: uid(), amount: c.spent, note: '(imported total)', date: '', createdAt: 0 });
        }
      }
      // Always keep spent in sync
      c.spent = c.transactions.reduce((s, tx) => s + (tx.amount || 0), 0);
      // New fields: dueDate and accountedFor
      if (c.dueDate === undefined) c.dueDate = '';
      if (c.accountedFor === undefined) c.accountedFor = false;
      return c;
    });
    // Clean bad ROS entries (NaN times, undefined labels, legacy dp duplicates)
    if (t.rosEntries) {
      const seenDpDirs = {};
      t.rosEntries = t.rosEntries.filter(e => {
        if (!e.label && !e.title) return false;
        if (e.time && String(e.time).includes('NaN')) return false;
        // Remove legacy dp entries that have no plan ID (old format: 'auto:dp-outbound')
        const notes = e.notes || '';
        if (notes === 'auto:dp-outbound' || notes === 'auto:dp-return') return false;
        // Remove duplicate dp entries with same tag
        if (notes.startsWith('auto:dp-')) {
          const key = notes + '|' + e.time + '|' + e.label;
          if (seenDpDirs[key]) return false;
          seenDpDirs[key] = true;
        }
        return true;
      });
    }
    // Ensure checklistStatus exists
    if (!t.checklistStatus) t.checklistStatus = {};
    if (t.hotelLocked === undefined) t.hotelLocked = false;
    if (t.transportLocked === undefined) t.transportLocked = false;
    // Inject LL/Premier Access budget category if missing (for existing trips)
    if (t.tripType === 'wdw' && t.budget && t.budget.categories) {
      const hasLL = t.budget.categories.some(function(c){ return c.liveSource==='ll' || (c.name||'').toLowerCase().includes('lightning'); });
      if (!hasLL) {
        t.budget.categories.splice(3, 0, { id:uid(), emoji:'⚡', name:'Lightning Lane', budgeted:400, spent:0, transactions:[], liveSource:'ll' });
      }
    }
    if (t.tripType === 'dlp' && t.budget && t.budget.categories) {
      const hasPA = t.budget.categories.some(function(c){ return c.liveSource==='pa' || (c.name||'').toLowerCase().includes('premier'); });
      if (!hasPA) {
        t.budget.categories.splice(3, 0, { id:uid(), emoji:'🎫', name:'Premier Access', budgeted:350, spent:0, transactions:[], liveSource:'pa' });
      }
    }
    if (t.tripType === 'dlp' && !t.eurUsdRate) t.eurUsdRate = DEFAULT_EUR_USD_RATE;
    // Ensure suitcases exists
    if (!t.suitcases) t.suitcases = [];
    // Ensure departurePlans exists
    if (!t.departurePlans) t.departurePlans = {};
    return t;
  });
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ trips: S.trips, currentTripId: S.currentTripId }));
  } catch(e) {}
}

function trip() { return S.trips.find(t => t.id === S.currentTripId); }

function patchTrip(updates, skipRender) {
  const idx = S.trips.findIndex(t => t.id === S.currentTripId);
  if (idx >= 0) {
    S.trips[idx] = Object.assign({}, S.trips[idx], updates);
    persist();
    if (!skipRender) render();
  }
}

}

function blankLL() {
  return { passType:'none', partySize:null, llmpPrice:20, premierPrice:150, tier1Pick:'', tier2Picks:[], illSelected:[], illPrices:{} };
}
// Disneyland Paris equivalent of blankLL() — stored in the same day.ll field
function blankPA() {
  return { passType:'none', partySize:null, oneSelected:[], onePrices:{}, ultimateTier:'mid', ultimatePrice:null };
}
// Currency helper — accepts a trip object or a tripType string. Dollars are the primary/input currency everywhere.
function curSym(tOrType) {
  return '$';
}
// Approximate EUR↔USD rate (mid-2026), stated as "1 EUR = X USD". Editable per-trip in Settings since rates fluctuate.
const DEFAULT_EUR_USD_RATE = 1.16;
function eurUsdRate(t) { return (t && t.eurUsdRate) || DEFAULT_EUR_USD_RATE; }
// Main display helper: "$53 (~€46)" for DLP trips, "$53" for everyone else.
// decimals=true uses .toFixed(2) (for things like logged transactions); otherwise rounds to whole units.
function fmtDual(amount, t, decimals) {
  const n = Number(amount) || 0;
  const fmt = v => decimals ? v.toFixed(2) : Math.round(v).toLocaleString();
  if (t && t.tripType === 'dlp') {
    const eur = n / eurUsdRate(t);
    return `$${fmt(n)} <span style="opacity:.55;font-weight:600;font-size:.55em;">(~€${fmt(eur)})</span>`;
  }
  return `${curSym(t)}${fmt(n)}`;
}
// Plain-text variant (no HTML) for contexts that get passed through esc(), alert(), or title attributes
function fmtDualPlain(amount, t, decimals) {
  const n = Number(amount) || 0;
  const fmt = v => decimals ? v.toFixed(2) : Math.round(v).toLocaleString();
  if (t && t.tripType === 'dlp') {
    const eur = n / eurUsdRate(t);
    return `$${fmt(n)} (~€${fmt(eur)})`;
  }
  return `${curSym(t)}${fmt(n)}`;
}
// Small gray helper text for next to inputs, e.g. "≈ €46" — only shown for DLP trips
function eurHint(amount, t) {
  if (!t || t.tripType !== 'dlp') return '';
  const n = Number(amount) || 0;
  if (!n) return '';
  const eur = Math.round(n / eurUsdRate(t));
  return `<span style="font-size:10px;color:#aaa;font-weight:600;white-space:nowrap;">≈ €${eur.toLocaleString()}</span>`;
}

function makeParkDays(startDate, endDate, parkDaysCount, tripType) {
  const start = new Date(startDate + 'T00:00:00');
  const end   = new Date(endDate   + 'T00:00:00');
  const days  = [];
  let cur = new Date(start), n = 1;
  while (cur <= end) {
    days.push({ id:uid(), date:cur.toISOString().split('T')[0], dayNum:n, park: n<=parkDaysCount ? 'unassigned' : 'rest', notes:'', ll: tripType==='dlp' ? blankPA() : blankLL(), meals:blankMeals(), parkHops:[], dayExtras:blankDayExtras(), locked:false });
    cur.setDate(cur.getDate() + 1);
    n++;
  }
  return days;
}

// ═══════════════ TRIP REPORT — post-trip accounting ═══════════════
function buildTripReport(t){
  const tm=ensureTripMode(t);
  const dates=tripDates(t);
  const sym=curSym(t);
  const live=tm.active;

  // ── Budget performance ──
  const cats=(t.budget||{}).categories||[];
  let totBud=0,totPre=0,totOn=0;
  const rows=cats.map(function(c){
    const bud=c.budgeted||0;
    const all=catSpent(c);
    const on=(c.transactions||[]).reduce(function(s,tx){return s+(tx.onTrip?(tx.amount||0):0);},0);
    const pre=all-on;
    const varAmt=bud-all; // + = under budget
    totBud+=bud;totPre+=pre;totOn+=on;
    if(bud===0&&all===0)return'';
    return `<tr>
      <td style="padding:7px 8px;font-size:13px;">${c.emoji||''} ${esc(c.name)}</td>
      <td style="padding:7px 8px;text-align:right;font-size:13px;color:#888;">${sym}${Math.round(bud).toLocaleString()}</td>
      <td style="padding:7px 8px;text-align:right;font-size:13px;color:#888;">${sym}${Math.round(pre).toLocaleString()}</td>
      <td style="padding:7px 8px;text-align:right;font-size:13px;font-weight:700;">${sym}${Math.round(on).toLocaleString()}</td>
      <td style="padding:7px 8px;text-align:right;font-size:13px;font-weight:800;color:${varAmt>=0?'#16a34a':'#dc2626'};">${varAmt>=0?'−':'+'}${sym}${Math.abs(Math.round(varAmt)).toLocaleString()}</td>
    </tr>`;
  }).join('');
  const totVar=totBud-(totPre+totOn);

  // ── Activity stats from the journal ──
  let done=0,skipped=0,noted=0,actualized=0;
  const varList=[]; // est vs actual variances per event
  Object.keys(tm.journal||{}).forEach(function(date){
    const dayJ=tm.journal[date]||{};
    const entries=rosEntriesForDate(t,date).filter(function(e){return !e.isSentinel;});
    Object.keys(dayJ).forEach(function(k){
      const j=dayJ[k];
      if(j.done)done++;
      if(j.skipped)skipped++;
      if(j.note)noted++;
      if(j.actual!=null){
        actualized++;
        const e=entries.find(function(ee){return (ee.id||(ee.cls+'|'+ee.text))===k;});
        if(e&&e.est)varList.push({text:e.text,date:date,est:e.est,actual:j.actual,diff:j.actual-e.est});
      }
    });
  });
  varList.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff);});
  const topVar=varList.slice(0,6).map(function(v){
    const lbl=new Date(v.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div style="display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:5px 0;border-bottom:1px dashed #eee;">
      <span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(v.text)} <span style="color:#aaa;">${lbl}</span></span>
      <span style="flex-shrink:0;">est ${sym}${v.est} → <b style="color:${v.diff>0?'#dc2626':'#16a34a'};">${sym}${v.actual}</b> <span style="color:${v.diff>0?'#dc2626':'#16a34a'};font-weight:800;">${v.diff>0?'🔺+':'🔻−'}${sym}${Math.abs(Math.round(v.diff))}</span></span>
    </div>`;
  }).join('');

  // ── Journal ──
  let journalHtml='';
  dates.forEach(function(date){
    const dayJ=(tm.journal||{})[date]||{};
    const dn=(tm.dayNotes||{})[date]||'';
    const entries=rosEntriesForDate(t,date).filter(function(e){return !e.isSentinel;});
    let items='';
    entries.forEach(function(e){
      const k=e.id||(e.cls+'|'+e.text);
      const j=dayJ[k];
      if(j&&j.note)items+=`<div style="font-size:12.5px;padding:4px 0;"><span style="color:#7c3aed;">📝</span> <b>${e.text}</b> — ${esc(j.note)}</div>`;
    });
    ((tm.unplanned||{})[date]||[]).forEach(function(u){
      const typeIcon={ride:'🎢',food:'🍔',photo:'📸',purchase:'🛍️',moment:'✨'}[u.type]||'📌';
      items+=`<div style="font-size:12.5px;padding:4px 0;">${typeIcon} <b>${esc(u.text)}</b>${u.note?' — '+esc(u.note):''} <span style="color:#bbb;font-size:10.5px;">${fmt12(u.time)}</span></div>`;
    });
    if(dn)items+=`<div style="font-size:12.5px;padding:4px 0;"><span style="color:#7c3aed;">📓</span> <i>${esc(dn)}</i></div>`;
    if(items){
      const lbl=new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const pd=(t.parks||[]).find(function(p){return p.date===date;});

// ═══════════════ KEY BOOKING DATES ═══════════════
function computeKeyDates(t){
  if(!t.startDate)return[];
  const s=new Date(t.startDate+'T00:00:00');
  const D=function(n){const d=new Date(s);d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];};
  const hasResort=!!(t.resort&&t.resort.name)||((t.hotelLegs||[]).length>0);
  const out=[];
  if(t.tripType==='dlr'){
    out.push({id:'parkres',date:D(90),icon:'🎟️',label:'Make theme park reservations',hint:'Required with tickets — book as soon as you have them'});
    out.push({id:'adr',date:D(60),icon:'🍽️',label:'Dining reservations open (60 days)',hint:'Oga\'s, Lamplight Lounge & Blue Bayou go fast'});
    out.push({id:'llplan',date:D(1),icon:'⚡',label:'Set your Lightning Lane strategy',hint:'At Disneyland, LL Multi Pass is purchased day-of in the app at park open — lock your picks in the Itinerary now'});
    out.push({id:'mobileorder',date:D(1),icon:'📱',label:'Update the Disneyland app & set up mobile order'});
  }else if(t.tripType==='dlp'){
    out.push({id:'adr',date:D(60),icon:'🍽️',label:'Restaurant reservations open',hint:'Book table-service dining'});
    out.push({id:'pa',date:D(3),icon:'🎫',label:'Plan Premier Access strategy',hint:'PA is bought day-of in the app — lock your picks now'});
  }else if(t.tripType==='aulani'){
    out.push({id:'adr',date:D(60),icon:'🍽️',label:'Dining & spa reservations open',hint:'\u02bbAma\u02bbAma and Laniwai book fast'});
    out.push({id:'checkin',date:D(5),icon:'🏨',label:'Online check-in opens'});
  }else{
    out.push({id:'adr',date:D(60),icon:'🍽️',label:'ADR window opens (60 days)',hint:'Dining reservations, book at 5:45am ET'});
    out.push({id:'ll',date:D(hasResort?7:3),icon:'⚡',label:'Lightning Lane booking opens ('+(hasResort?'7 days — resort guest':'3 days')+')',hint:'Then confirm your windows in the Today tab'});
    if(hasResort)out.push({id:'checkin',date:D(5),icon:'🏨',label:'Online check-in opens (5 days)'});
    out.push({id:'mobileorder',date:D(1),icon:'📱',label:'Download / update the Disney app & set up mobile order'});
  }
  if(t.cruise&&t.cruiseStartDate){
    const cs=new Date(t.cruiseStartDate+'T00:00:00');
    const CD=function(n){const d=new Date(cs);d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];};
    out.push({id:'dclcheckin',date:CD(30),icon:'🚢',label:'DCL online check-in opens (30 days)',hint:'Port arrival times go fast'});
    out.push({id:'dclact',date:CD(75),icon:'🎯',label:'Cruise activities booking (~75 days)',hint:'Varies by Castaway Club level'});
  }
  out.sort(function(a,b){return a.date<b.date?-1:1;});
  return out;
}
function kdToggle(id){
  const t=trip();if(!t)return;
  t.keyDatesDone=t.keyDatesDone||{};
  t.keyDatesDone[id]=!t.keyDatesDone[id];
  persist();render();
}
function buildKeyDates(t){
  const items=computeKeyDates(t);
  if(!items.length)return'';
  const today=todayISO();
  const doneMap=t.keyDatesDone||{};
  const allPast=items.every(function(k){return k.date<today||doneMap[k.id];});
  const rows=items.map(function(k){
    const done=!!doneMap[k.id];
    const past=k.date<today;
    const days=Math.ceil((new Date(k.date+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
    const lbl=new Date(k.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const soon=!done&&!past&&days<=7;
    const missed=!done&&past;
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border:1.5px solid ${soon?'#fde68a':done?'#bbf7d0':'#eee'};border-radius:10px;background:${soon?'#fffbeb':done?'#f0fdf4':'#fff'};margin-bottom:6px;${done?'opacity:.65;':''}">
      <button onclick="kdToggle('${k.id}')" style="width:26px;height:26px;flex-shrink:0;border-radius:8px;border:2px solid ${done?'#16a34a':'#ddd'};background:${done?'#16a34a':'#fff'};color:#fff;font-size:13px;cursor:pointer;font-family:inherit;line-height:1;">${done?'✓':''}</button>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:#333;${done?'text-decoration:line-through;':''}">${k.icon} ${k.label}</div>
        <div style="font-size:11.5px;color:${soon?'#b45309':missed?'#dc2626':'#999'};font-weight:${soon?'800':'600'};">
          ${lbl}${done?'':past?' · passed':days===0?' · TODAY':days===1?' · tomorrow':' · in '+days+' days'}
        </div>
        ${k.hint&&!done?`<div style="font-size:11px;color:#aaa;">${k.hint}</div>`:''}
      </div>
    </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-header">📆 Key Dates ${allPast?'<span style="font-size:11px;color:#16a34a;font-weight:700;">all handled ✓</span>':''}</div>
    ${rows}
  </div>`;
}

// ═══════════════ DAY-OF WEATHER (Open-Meteo, no key needed) ═══════════════
var _WX={cache:{},pending:{}};
function wxCoords(t){
  if(t.tripType==='dlp')return[48.872,2.776];
  if(t.tripType==='dlr')return[33.812,-117.919]; // Anaheim
  if(t.tripType==='aulani')return[21.339,-158.121];
  return[28.372,-81.549]; // WDW
}
function wxIcon(code){
  if(code===0)return'☀️';if(code<=2)return'🌤️';if(code===3)return'☁️';
  if(code<=48)return'🌫️';if(code<=57)return'🌦️';if(code<=67)return'🌧️';
  if(code<=77)return'🌨️';if(code<=82)return'🌧️';if(code<=86)return'🌨️';
  return'⛈️';
}
function wxFetch(t,date){
  const key=t.tripType+'|'+date;
  if(_WX.cache[key]||_WX.pending[key])return;
  const days=Math.ceil((new Date(date+'T00:00:00')-new Date())/86400000);
  if(days<-1||days>15){_WX.cache[key]={na:true,at:Date.now()+86400000};return;}
  _WX.pending[key]=true;
  const c=wxCoords(t);
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+c[0]+'&longitude='+c[1]+
    '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode'+
    '&temperature_unit=fahrenheit&timezone=auto&start_date='+date+'&end_date='+date)
  .then(function(r){return r.json();})
  .then(function(d){
    delete _WX.pending[key];
    if(d&&d.daily&&d.daily.time&&d.daily.time.length){
      _WX.cache[key]={hi:Math.round(d.daily.temperature_2m_max[0]),lo:Math.round(d.daily.temperature_2m_min[0]),rain:d.daily.precipitation_probability_max[0],code:d.daily.weathercode[0]};
    }else{_WX.cache[key]={na:true};}
    render();
  })
  .catch(function(){delete _WX.pending[key];_WX.cache[key]={na:true,at:Date.now()};render();});
}
function wxStrip(t,date){
  const key=t.tripType+'|'+date;
  let w=_WX.cache[key];
  if(w&&w.na&&w.at&&Date.now()-w.at>5*60*1000){delete _WX.cache[key];w=null;} // retry failures after 5 min
  if(!w){wxFetch(t,date);return'<span style="font-size:11px;color:#bbb;">loading weather…</span>';}
  if(w.na)return'';
  return '<span style="font-size:12px;color:#555;font-weight:600;">'+wxIcon(w.code)+' '+w.hi+'° / '+w.lo+'°'+(w.rain!=null?' · ☔ '+w.rain+'%':'')+'</span>';
}

// ═══════════════ LIVE WAIT TIMES (Queue-Times.com) ═══════════════
var _QT={cache:{},pending:{},fetchedAt:{}};
var QT_PARK_IDS={mk:6,ep:5,hs:7,ak:8,dp:4,daw:28,dl:16,dca:17};
function qtFetch(parkKey){
  const id=QT_PARK_IDS[parkKey];if(!id)return;
  const now=Date.now();
  if(_QT.pending[parkKey])return;
  if(_QT.cache[parkKey]&&now-(_QT.fetchedAt[parkKey]||0)<5*60*1000)return; // 5-min freshness
  _QT.pending[parkKey]=true;
  const direct='https://queue-times.com/parks/'+id+'/queue_times.json';
  // queue-times.com blocks browser CORS — try a chain of public relays
  const relays=[
    'https://corsproxy.io/?url='+encodeURIComponent(direct),
    'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(direct),
    'https://thingproxy.freeboard.io/fetch/'+direct
  ];
  function handle(d){
    delete _QT.pending[parkKey];
    const rides=[];
    (d.lands||[]).forEach(function(l){(l.rides||[]).forEach(function(r){rides.push(r);});});
    (d.rides||[]).forEach(function(r){rides.push(r);});
    _QT.cache[parkKey]=rides;_QT.fetchedAt[parkKey]=Date.now();
    render();
  }
  function tryRelay(i){
    if(i>=relays.length){delete _QT.pending[parkKey];_QT.cache[parkKey]='err';render();return;}
    fetch(relays[i]).then(function(r){
      if(!r.ok)throw new Error('http '+r.status);
      return r.json();
    }).then(handle).catch(function(){tryRelay(i+1);});
  }
  // Try direct first (works in native apps / Electron), then relays
  fetch(direct).then(function(r){if(!r.ok)throw new Error();return r.json();}).then(handle)
  .catch(function(){tryRelay(0);});
}
function qtSection(parkKey,parkLabel){
  parkLabel=parkLabel||parkName(parkKey)||parkKey;
  if(!QT_PARK_IDS[parkKey])return'';
  const data=_QT.cache[parkKey];
  if(!data){qtFetch(parkKey);return'<div class="card" style="text-align:center;color:#bbb;font-size:12px;">⏳ Loading live wait times…</div>';}
  if(data==='err')return `<div class="card" style="text-align:center;padding:10px;">
    <div style="color:#bbb;font-size:11.5px;">⏱️ Live wait times unavailable
      <button onclick="_QT.cache['${parkKey}']=null;_QT.fetchedAt['${parkKey}']=0;qtFetch('${parkKey}')" style="background:none;border:1px solid #e4e4f0;border-radius:6px;padding:2px 8px;font-size:10.5px;color:#999;cursor:pointer;font-family:inherit;margin-left:6px;">↻ retry</button>
    </div>
    <a href="https://queue-times.com/parks/${QT_PARK_IDS[parkKey]}/queue_times" target="_blank" rel="noopener" style="font-size:11px;color:#6366f1;">View on Queue-Times.com ↗</a>
  </div>`;
  const open=data.filter(function(r){return r.is_open;}).sort(function(a,b){return (b.wait_time||0)-(a.wait_time||0);});
  if(!open.length)return'';
  const rows=open.slice(0,10).map(function(r){
    const w=r.wait_time||0;
    const col=w>=60?'#dc2626':w>=30?'#d97706':'#16a34a';
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed #f0f0f0;">
      <span style="font-size:12.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.name)}</span>
      <span style="font-size:13px;font-weight:900;color:${col};flex-shrink:0;">${w} min</span>
    </div>`;
  }).join('');
  const isOpen=(_QT.open||{})[parkKey]!==false; // default open
  const age=Math.round((Date.now()-(_QT.fetchedAt[parkKey]||Date.now()))/60000);
  return `<div class="card" style="padding:10px 14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none;" onclick="_QT.open=_QT.open||{};_QT.open['${parkKey}']=!(_QT.open['${parkKey}']!==false);render()">
      <div style="font-size:13px;font-weight:800;color:#1a1a5e;">⏱️ ${esc(parkLabel)} <span style="font-size:11px;font-weight:600;color:#999;">(${open.length} open)</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="event.stopPropagation();_QT.fetchedAt['${parkKey}']=0;qtFetch('${parkKey}')" style="background:none;border:1px solid #e4e4f0;border-radius:7px;padding:3px 9px;font-size:10.5px;color:#888;cursor:pointer;font-family:inherit;">↻ ${age<1?'now':age+'m ago'}</button>
        <span style="font-size:14px;color:#999;">${isOpen?'▾':'▸'}</span>
      </div>
    </div>
    ${isOpen?`<div style="margin-top:8px;">${rows}</div><div style="font-size:9.5px;color:#ccc;margin-top:6px;text-align:right;">Powered by <a href="https://queue-times.com/" target="_blank" rel="noopener" style="color:#ccc;">Queue-Times.com</a></div>`:''}
  </div>`;
}

// Gather a day's LL picks from its ll config (WDW: tier1/tier2/ILL · DLP: oneSelected)
function llPicksForDay0(day){
  const ll=day&&day.ll;if(!ll)return[];
  if(ll.passType==='premier'||ll.passType==='ultimate')return[]; // covers everything, no bookings needed
  const out=[];
  if(ll.tier1Pick)out.push({name:ll.tier1Pick,ill:false});
  (ll.tier2Picks||[]).forEach(function(r){out.push({name:r,ill:false});});
  (ll.illSelected||[]).forEach(function(r){out.push({name:r,ill:true});});
  (ll.oneSelected||[]).forEach(function(r){out.push({name:r,ill:true});}); // DLP Premier Access one-shots
  return out;
}
function llPicksForDate(t,date){
  const d=(t.parks||[]).find(function(p){return p.date===date;});
  return d?llPicksForDay0(d):[];
}
function llBookings(t,date){
  const d=(t.parks||[]).find(function(p){return p.date===date;});
  return (d&&d.llBookings)||{};
}
function llBookedCount(t,date){
  const bk=llBookings(t,date);

function llAddHour(hm){
  if(!hm)return'';

  return String(Math.min(23,h+1)).padStart(2,'0')+':'+m;

function llTimeOptions(sel){

// ═══════════════ TODAY TAB — TRIP MODE ═══════════════
function ensureTripMode(t){
  if(!t.tripMode)t.tripMode={active:false,startedAt:null,endedAt:null,baseline:{},journal:{},dayNotes:{}};
  if(!t.tripMode.journal)t.tripMode.journal={};
  if(!t.tripMode.dayNotes)t.tripMode.dayNotes={};
  if(!t.tripMode.baseline)t.tripMode.baseline={};
  return t.tripMode;
}
function tripDates(t){
  const out=[];
  if(!t.startDate||!t.endDate)return out;
  let cur=new Date(t.startDate+'T00:00:00');const end=new Date(t.endDate+'T00:00:00');
  while(cur<=end){out.push(cur.toISOString().split('T')[0]);cur.setDate(cur.getDate()+1);}
  return out;
}
function todayISO(){return new Date().toISOString().split('T')[0];}
function catSpent(c){return (c.transactions||[]).reduce((s,tx)=>s+(tx.amount||0),0);}
function onTripSpent(t,date){
  let sum=0;
  ((t.budget||{}).categories||[]).forEach(c=>(c.transactions||[]).forEach(tx=>{
    if(tx.onTrip&&(date?tx.tripDate===date:true))sum+=(tx.amount||0);
  }));
  return sum;
}
function startTrip(){
  const t=trip();if(!t)return;
  if(S.ui.armStart!==true){ // press-again pattern: browser confirm() dialogs get suppressed by Chrome
    S.ui.armStart=true;render();
    setTimeout(function(){if(S.ui.armStart){S.ui.armStart=false;render();}},4000);
    return;
  }
  S.ui.armStart=false;
  const tm=ensureTripMode(t);
  tm.active=true;tm.startedAt=new Date().toISOString();tm.endedAt=null;
  tm.baseline={};
  ((t.budget||{}).categories||[]).forEach(c=>{tm.baseline[c.id]=catSpent(c);});
  S.ui.todayDate=null;
  persist();render();
}
function endTrip(){
  const t=trip();if(!t)return;
  if(S.ui.armEnd!==true){
    S.ui.armEnd=true;render();
    setTimeout(function(){if(S.ui.armEnd){S.ui.armEnd=false;render();}},4000);
    return;
  }
  S.ui.armEnd=false;
  const tm=ensureTripMode(t);
  tm.active=false;tm.endedAt=new Date().toISOString();
  persist();render();
}
function resumeTrip(){
  const t=trip();if(!t)return;
  const tm=ensureTripMode(t);
  tm.active=true;tm.endedAt=null;
  persist();render();
}
function tmEntry(t,date,eKey){
  const tm=ensureTripMode(t);
  if(!tm.journal[date])tm.journal[date]={};
  if(!tm.journal[date][eKey])tm.journal[date][eKey]={done:false,skipped:false,note:'',actual:null};
  return tm.journal[date][eKey];
}
function buildEntryActions(e,sel,kAttr,j,noteOpen,cashOpen,dim){
  if(e.cls==='auto')return''; // park open/close etc — info only

  if(!j.done)btns+='<button onclick="tmToggleSkip(\''+sel+'\',\''+kAttr+'\')" style="flex:1;background:#fff;border:1.5px solid #e4e4f0;border-radius:8px;padding:7px 0;font-size:11.5px;font-weight:700;color:#999;cursor:pointer;font-family:inherit;">'+(j.skipped?'↺ Unskip':'⏭ Skip')+'</button>';

function tmGuessCat(t,e){
  const cats=(t.budget||{}).categories||[];
  const byName=function(n){return cats.find(c=>(c.name||'').toLowerCase().includes(n));};
  if(e.cls==='meal'||/lunch|dinner|breakfast|snack/i.test(e.text||''))return byName('food')||cats[0];

  if(e.cls==='flight')return byName('flight')||cats[0];

function buildTodayLive(t,tm,dates,today){
  let sel=S.ui.todayDate;
  if(!sel||dates.indexOf(sel)===-1){
    sel=dates.indexOf(today)>-1?today:(today<dates[0]?dates[0]:dates[dates.length-1]);
  }
  const di=dates.indexOf(sel);
  const isToday=sel===today;
  const entries=rosEntriesForDate(t,sel).filter(function(e){return !e.isSentinel;});
  const journal=(tm.journal||{})[sel]||{};
  const nowD=new Date();const nowMins=nowD.getHours()*60+nowD.getMinutes();
  let nowKey=null,nextKey=null;
  if(isToday){
    entries.forEach(function(e){
      const k=e.id||(e.cls+'|'+e.text);const j=journal[k]||{};
      if(j.done||j.skipped)return;
      const m=timeToMins(e.time);
      if(m<=nowMins)nowKey=k;
      else if(nextKey===null)nextKey=k;
    });
  }
  const doneCount=entries.filter(function(e){const k=e.id||(e.cls+'|'+e.text);return (journal[k]||{}).done;}).length;
  const parkDay=(t.parks||[]).find(function(d){return d.date===sel;});
  const parkLbl=parkDay&&parkDay.park&&parkDay.park!=='rest'&&parkDay.park!=='unassigned'?parkName(parkDay.park):'';
  const dayNum=parkDay&&parkDay.dayNum?('Day '+parkDay.dayNum):('Day '+(di+1));
  const dateLbl=new Date(sel+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const spentToday=onTripSpent(t,sel);
  const spentTrip=onTripSpent(t,null);
  const estToday=entries.reduce(function(s,e){return s+(e.est||0);},0);

  const cats=(t.budget||{}).categories||[];
  const catOpts=function(selId){return cats.map(function(c){return `<option value="${c.id}" ${c.id===selId?'selected':''}>${c.emoji||''} ${esc(c.name)}</option>`;}).join('');};

  const rows=entries.map(function(e){
    const k=e.id||(e.cls+'|'+e.text);
    const j=journal[k]||{};
    const kAttr=esc(k).replace(/'/g,'&#39;');
    const txtAttr=esc(e.text).replace(/'/g,'&#39;');
    const isNow=k===nowKey,isNext=k===nextKey;
    const noteOpen=S.ui.todayNote===sel+'||'+k;
    const cashOpen=S.ui.todayCash===sel+'||'+k;
    const dim=j.done||j.skipped;
    return `<div style="border:${isNow?'2.5px solid #6366f1':'1.5px solid #eee'};border-radius:11px;padding:10px 12px;background:${dim?'#fafafa':'#fff'};${dim?'opacity:.62;':''}">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        ${e.cls==='auto'?
          '<div style="width:30px;height:30px;flex-shrink:0;border-radius:9px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;">ℹ️</div>'
          :`<button onclick="tmToggleDone('${sel}','${kAttr}')" title="${j.done?'Undo':'Mark done'}"
          style="width:30px;height:30px;flex-shrink:0;border-radius:9px;border:2px solid ${j.done?'#16a34a':'#ddd'};background:${j.done?'#16a34a':'#fff'};color:#fff;font-size:15px;cursor:pointer;font-family:inherit;line-height:1;">${j.done?'✓':''}</button>`}
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            ${isNow?'<span style="background:#eef2ff;color:#4338ca;font-size:10px;font-weight:900;padding:2px 8px;border-radius:9px;">NOW</span>':''}
            ${isNext?'<span style="background:#fffbeb;color:#b45309;font-size:10px;font-weight:900;padding:2px 8px;border-radius:9px;">NEXT</span>':''}
            <span style="font-size:11px;color:#999;font-weight:700;">${e.time?fmt12(e.time):'—'}</span>
          </div>
          <div style="font-size:14px;font-weight:700;color:${j.skipped?'#bbb':'#333'};${dim?'text-decoration:line-through;':''}">${e.icon} ${e.text}</div>
          ${e.sub&&!String(e.sub).startsWith('auto:dp-')?`<div style="font-size:11px;color:#999;">${e.sub}</div>`:''}
          ${(e.est||j.actual!=null)?`<div style="font-size:11px;margin-top:3px;">
            ${e.est?`<span style="color:#888;">est $${e.est}</span>`:''}
            ${j.actual!=null?`${e.est?'<span style="color:#888;"> → </span>':''}<span style="font-weight:800;color:${e.est&&j.actual>e.est?'#dc2626':'#16a34a'};">actual $${j.actual}${e.est?(j.actual>e.est?' 🔺+'+Math.round(j.actual-e.est):j.actual<e.est?' 🔻−'+Math.round(e.est-j.actual):''):''}</span>`:''}
          </div>`:''}
          ${j.note&&!noteOpen?`<div style="font-size:12px;color:#6366f1;margin-top:4px;">📝 ${esc(j.note)}</div>`:''}
          ${j.skipped?'<div style="font-size:11px;color:#bbb;margin-top:2px;">skipped</div>':''}
        </div>
      </div>
      ${noteOpen?`<div style="margin-top:8px;display:flex;gap:6px;">
        <input id="tm-note-input" value="${esc(j.note||'')}" placeholder="Ride broke down · food was meh · pure magic…"
          onkeydown="if(event.key==='Enter')tmSaveNote('${sel}','${kAttr}')"

        <button onclick="tmSaveNote('${sel}','${kAttr}')" style="background:#1a1a5e;color:#FFD700;border:none;border-radius:8px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;">Save</button>

      ${cashOpen?`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:12px;color:#888;">actual $</span>

          onkeydown="if(event.key==='Enter')tmSaveCash('${sel}','${kAttr}','${txtAttr}')"

        <select id="tm-cash-cat" style="padding:8px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:13px;font-family:inherit;max-width:150px;">${catOpts((tmGuessCat(t,e)||{}).id)}</select>
        <button onclick="tmSaveCash('${sel}','${kAttr}','${txtAttr}')" style="background:#1a1a5e;color:#FFD700;border:none;border-radius:8px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;">Log it</button>
      </div>`:''}
      ${buildEntryActions(e,sel,kAttr,j,noteOpen,cashOpen,dim)}
    </div>`;
  }).join('');

  const quickOpen=S.ui.todayCash===sel+'||__quick__';
  const dayNote=(tm.dayNotes||{})[sel]||'';
  const prevD=dates[Math.max(0,di-1)],nextD=dates[Math.min(dates.length-1,di+1)];
  // Lightning Lane status for this day
  const llPicks=llPicksForDate(t,sel).length;
  const llBooked=llBookedCount(t,sel);
  const llOpen=S.ui.llConfirmDate===sel;
  const llBanner=llPicks>0?`<div style="border:1.5px solid ${llBooked>=llPicks?'#bbf7d0':'#fde68a'};border-radius:11px;background:${llBooked>=llPicks?'#f0fdf4':'#fffbeb'};padding:9px 12px;margin-bottom:8px;">

        <button onclick="llToggleConfirm('${sel}')" style="background:#fff;border:1.5px solid #e4e4f0;border-radius:8px;padding:5px 12px;font-size:11.5px;font-weight:800;color:#555;cursor:pointer;font-family:inherit;">${llOpen?'Hide ▴':(llBooked>=llPicks?'Manage ▾':'Confirm ▾')}</button>

      if(!isToday||!parkDay)return'';

      const dayParks=[parkDay.park].concat(parkDay.parkHops||[]).filter(function(p){return p&&QT_PARK_IDS[p];});
      const unique=dayParks.filter(function(p,i){return dayParks.indexOf(p)===i;});
      return unique.map(function(p){return qtSection(p,parkName(p));}).join('');
    })()}
    <div style="display:flex;flex-direction:column;gap:8px;">${rows||'<div class="card" style="text-align:center;color:#aaa;font-size:13px;">Nothing scheduled this day — add entries in Run of Show, or just enjoy it. 🏖️</div>'}</div>
    <div class="card" style="margin-top:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        <div>
          <div style="font-size:11px;color:#888;">Spent this day · on-trip total</div>

        </div>
        ${!quickOpen?`<button onclick="tmQuickSpend('${sel}')" style="background:#FFD700;color:#1a1a5e;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;">＋ Quick spend</button>`:''}
      </div>
      ${quickOpen?`<div style="margin-top:10px;">
        ${(function(){
          const foodId=(cats.find(function(c){return /food/i.test(c.name||'');})||{}).id||'';
          const merchId=(cats.find(function(c){return /merch/i.test(c.name||'');})||{}).id||'';
          const extrasId=(cats.find(function(c){return /extras/i.test(c.name||'');})||{}).id||'';
          return '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">'+
            [['🥐 Churro',foodId],['🍦 Ice Cream',foodId],['🥤 Drink',foodId],['☕ Coffee',foodId],['🍿 Snack',foodId],['🛍️ Merch',merchId],['🎫 Misc',extrasId]].map(function(p){
              return '<button type="button" onclick="document.getElementById(\'tm-cash-label\').value=\''+p[0]+'\';document.getElementById(\'tm-cash-cat\').value=\''+p[1]+'\';var a=document.getElementById(\'tm-cash-amt\');if(a)a.focus();" style="padding:7px 12px;background:#f3f0ff;border:1.5px solid #c4b5fd;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#5b21b6;">'+p[0]+'</button>';
            }).join('')+'</div>';
        })()}
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <input id="tm-cash-label" placeholder="or type your own…" style="flex:1;min-width:100px;padding:8px 10px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:16px;font-family:inherit;">
          <span style="font-size:12px;color:#888;">$</span>
          <input id="tm-cash-amt" type="number" inputmode="decimal" step="0.01" min="0" onkeydown="if(event.key==='Enter')tmSaveQuick('${sel}')"
            style="width:80px;padding:8px 10px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:16px;font-family:inherit;">
          <select id="tm-cash-cat" style="padding:8px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:13px;font-family:inherit;max-width:140px;">${catOpts((cats.find(function(c){return /food/i.test(c.name||'');})||{}).id)}</select>
          <button onclick="tmSaveQuick('${sel}')" style="background:#1a1a5e;color:#FFD700;border:none;border-radius:8px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;">Log it</button>
        </div>
      </div>`:''}
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:800;color:#1a1a5e;margin-bottom:6px;">📓 Day note <span id="tm-daynote-saved" style="opacity:0;transition:opacity .3s;color:#16a34a;font-weight:700;font-size:11px;">saved ✓</span></div>
      <textarea id="tm-daynote" rows="3" placeholder="Anything about the day — meltdowns, magic, weather, lessons for next time…"
        onblur="tmSaveDayNote('${sel}')"
        style="width:100%;padding:9px 11px;border:1.5px solid #e4e4f0;border-radius:9px;font-size:16px;font-family:inherit;resize:vertical;box-sizing:border-box;">${esc(dayNote)}</textarea>
      <button onclick="tmSaveDayNote('${sel}')" style="margin-top:6px;background:#1a1a5e;color:#FFD700;border:none;border-radius:9px;padding:9px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;">💾 Save day note</button>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:12px;font-weight:800;color:#1a1a5e;">⚡ Unplanned moments</div>
        <button onclick="tmAddUnplanned('${sel}')" style="background:#f3f0ff;border:1.5px solid #c4b5fd;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:800;color:#5b21b6;cursor:pointer;font-family:inherit;">＋ Log it</button>
      </div>
      ${(()=>{
        const upl=((t.tripMode||{}).unplanned||{})[sel]||[];
        const rows=upl.map(function(u){
          const typeIcon={ride:'🎢',food:'🍔',photo:'📸',purchase:'🛍️',moment:'✨'}[u.type]||'📌';
          return '<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px dashed #f0f0f0;">'+
            '<span style="font-size:16px;flex-shrink:0;">'+typeIcon+'</span>'+
            '<div style="flex:1;min-width:0;">'+
              '<div style="font-size:13px;font-weight:700;">'+esc(u.text)+'</div>'+
              (u.note?'<div style="font-size:11.5px;color:#888;">'+esc(u.note)+'</div>':'')+
              '<div style="font-size:11px;color:#bbb;">'+fmt12(u.time)+'</div>'+
            '</div>'+
            '<button onclick="tmDeleteUnplanned(\'${sel}\',\''+u.id+'\')" style="background:none;border:none;color:#ddd;font-size:14px;cursor:pointer;padding:0;flex-shrink:0;">✕</button>'+
          '</div>';
        }).join('');
        return rows||(S.ui.unplannedOpen!=='${sel}'?'<div style="font-size:12px;color:#ccc;text-align:center;padding:8px 0;">Nothing yet — tap ＋ to log a spontaneous ride, snack, or moment</div>':'');
      })()}
      ${S.ui.unplannedOpen===sel?`<div style="margin-top:10px;border-top:1.5px solid #f0f0f0;padding-top:10px;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <select id="upl-type" style="padding:9px;border:1.5px solid #c4b5fd;border-radius:8px;font-size:14px;font-family:inherit;">
            <option value="ride">🎢 Ride</option>
            <option value="food">🍔 Food/Drink</option>
            <option value="photo">📸 Photo</option>
            <option value="purchase">🛍️ Purchase</option>
            <option value="moment">✨ Moment</option>
          </select>
          <input id="upl-text" placeholder="e.g. Grabbed Pirates on the way by…" onkeydown="if(event.key==='Enter')document.getElementById('upl-note').focus()"
            style="flex:1;min-width:140px;padding:9px 10px;border:1.5px solid #c4b5fd;border-radius:8px;font-size:16px;font-family:inherit;">
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input id="upl-note" placeholder="Quick note (optional)" onkeydown="if(event.key==='Enter')tmSaveUnplanned('${sel}')"

          <input id="upl-time" type="time" value="${_nowHHMM()}" style="width:110px;padding:9px 8px;border:1.5px solid #c4b5fd;border-radius:8px;font-size:14px;font-family:inherit;">
          <button onclick="tmSaveUnplanned('${sel}')" style="background:#1a1a5e;color:#FFD700;border:none;border-radius:8px;padding:9px 16px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;">Save</button>
          <button onclick="S.ui.unplannedOpen=null;render()" style="background:none;border:none;color:#bbb;font-size:12px;cursor:pointer;font-family:inherit;">✕</button>
        </div>
      </div>`:''}
    </div>
    <div style="text-align:center;margin:14px 0 4px;">
      <button onclick="endTrip()" style="background:${S.ui.armEnd?'#fffbeb':'none'};border:1.5px solid ${S.ui.armEnd?'#f59e0b':'#e4e4f0'};border-radius:9px;padding:8px 18px;font-size:12px;font-weight:700;color:${S.ui.armEnd?'#b45309':'#999'};cursor:pointer;font-family:inherit;">${S.ui.armEnd?'⚠️ Tap again to end trip':'🏁 End trip'}</button>
    </div>`;
}

function buildTabContent(t) {
  switch(S.tab) {
    case 'today':          return buildToday(t);
    case 'overview':       return buildOverview(t);
    case 'budget':         return buildBudget(t);
    case 'transportation': return buildTransportation(t);
    case 'parks':          return t.tripType==='aulani' ? buildItinerary_aulani(t) : buildItinerary(t);
    case 'activities':     return buildActivities(t);
    case 'map':            return t.tripType==='dlp' ? buildDlpMap(t) : buildAulaniMap(t);
    case 'countdown':      return buildCountdownChecklist(t);
    case 'photos':         return buildPhotoSpots(t);
    case 'packing':        return buildPackingList(t);
    case 'hotel':          return buildHotel(t);
    case 'runofshow':      return t.tripType==='aulani' ? buildActivities(t) : buildParks(t); // legacy redirect
    case 'settings':       return buildSettings(t);
    default:               return buildOverview(t);
  }
}

    {lat:21.6463,lng:-157.9271,name:'Polynesian Cultural Center',note:'~45 min · full day cultural experience',emoji:'🌺',color:'#ec4899'},
    {lat:21.5916,lng:-158.1047,name:'North Shore / Haleiwa',note:'~40 min · surf spots, shrimp trucks',emoji:'🏄',color:'#06b6d4'},

    {lat:21.3321,lng:-157.8019,name:'Manoa Falls',note:'~35 min · rainforest hike, 150ft waterfall',emoji:'🌿',color:'#16a34a'},

  }

  if (S.tab === 'overview') startCountdown();

function startCountdown() {
  const t = trip();
  if (!t || !t.startDate) return;
  const updateCountdown = () => {
    const now    = new Date();
    const target = new Date(t.startDate + 'T00:00:00');
    const diff   = target - now;
    const dEl = document.getElementById('cd-days');
    const hEl = document.getElementById('cd-hrs');
    const mEl = document.getElementById('cd-mins');
    const sEl = document.getElementById('cd-secs');
    if (!dEl) { clearInterval(window._countdownInterval); return; }
    if (diff <= 0) {
      if (dEl) dEl.textContent = '0';
      if (hEl) hEl.textContent = '00';
      if (mEl) mEl.textContent = '00';
      if (sEl) sEl.textContent = '00';
      return;
    }
    const totalSecs = Math.floor(diff / 1000);
    const days  = Math.floor(totalSecs / 86400);
    const hours = Math.floor((totalSecs % 86400) / 3600);
    const mins  = Math.floor((totalSecs % 3600)  / 60);
    const secs  = totalSecs % 60;
    if (dEl) dEl.textContent = days;
    if (hEl) hEl.textContent = String(hours).padStart(2,'0');
    if (mEl) mEl.textContent = String(mins).padStart(2,'0');
    if (sEl) sEl.textContent = String(secs).padStart(2,'0');
  };
  updateCountdown();
  window._countdownInterval = setInterval(updateCountdown, 1000);
}
